body:
  text: 韻府羣玉卷四元陰徑弦陰復春編上平聲十一真與諄臻同用真側鄰切説文真仙人變形而登天也馬援傳帝王自有丨東都賦背偽歸丨叔孫通縳丨儒丨鄙儒大丈夫當為丨王詳王周亞夫丨將軍漢桓溫丨英物詳啼陸景倩丨清詳清蘭亭丨本詳本杜態濃意逺淑且丨坡回視人間世了無一事丨聖真統一丨丨武帝敘傳道真嚅嚌丨丨唐志嚅而宣切天真十圍便腹貯丨丨坡嗜酒見丨丨杜韜真丨丨含道揚雄傳葆真虛緣而丨丨莊田子方寫真崔徽蒲女也裴敬中使蒲徽以不得從為恨久之成疾丨丨以寄裴詳人逼真吟得唐詩轉丨丨後村混真吹竽久丨丨韓妄真知妄為妄即丨是丨認丨為丨雖真亦妄半山語録活套本丨性丨味丨語丨任丨全丨偽亂丨樂意丨人名賀季丨知章溫太丨嶠梅子丨福鄭子丨耕岩谷下詳鄭楊太丨貴妃又曰玉丨玄丨子張志和號田丨兄弟紫荆復合真丨趙顏得女子障女名真真呼名百日即應黃道丨武陵漁人入桃源振盛也左均服丨丨詩子孫丨丨兮丨丨丨鷺李目張氣益丨又信厚也詩丨公子又動也柳島嶼疑搖丨桭屋梠也兩楹間也倀養馬者又童男女帳飲馬橐也䟴動也籈所以鼓敔者甄陶丨又察也明也安帝紀丨表門閭光武贊靈貺自丨與先韻通因於真切書厥民丨語丨民所利孟為髙必丨丘陵為下必丨川澤楊重黎天不人不丨劉歆傳丨陋就寬殷因夏造丨丨禮器所因其丨丨者本也孝經粟陳因太倉之丨陳丨相丨漢書璧無因夜光之丨丨丨至前詳投正因佛祖不立文字以心傳心有僧辭上座云某甲親附三年丨丨中也未曾聞一字曰若是丨丨一字也無傳燈水因楞嚴十六開士白佛言我等於浴僧時忽悟丨丨既不洗塵亦不洗體中間安然得無所有詳洗未了因更結來生丨丨丨坡與子由後世因欲知前世因今生受者是欲知丨丨丨今生作者是佛書十二因緣觸受愛取有生老死憂悲苦惱詳惱湮沒也聖逺言丨茵説文車重席也文茵丨丨暢轂詩虎皮也花茵學士許瑾宴花圃未嘗具幄設坐使童僕聚落花鋪坐下曰吾自有丨丨開元遺事人生如樹花或墜茵席或落糞溷詳溷鴨茵浮光多美鴨樊千里戴數車浮萍入池為丨作丨褥詳萍錦茵當軒下馬入丨丨杜醉茵殘紅作丨丨谷接茵夏侯湛潘嶽同輿丨丨人謂連璧汚丞相茵丙吉為相馭吏頻醉西曹詰罪之吉曰以醉飽之過斥人欲令安歸乎不過嘔丨丨丨車丨爾西曹第忍之本傳詳嘔活套繡丨草丨舞丨纍丨堙亦作堙湮書鯀堙洪水左井湮木刋活套埋丨諲恭也禋禮春官丨祀書丨于六宗詩克丨克祀坡不才何以助精丨精意以享為丨也或作禋姻説文壻家也女之所因女因媒而親父母因女而親故曰丨從女因聲白虎通婦人因人而成故曰丨又婚姻也詩子之丰兮注疏云婦黨為婚兄弟之黨為丨亦作姻禮六德睦姻朱陳村世世為婚丨南柯姻醉眠中山酒夢結丨丨丨坡與兵姻頗念懷祖黠嗔兒丨丨丨事詳癡闉城內重門詩出其丨闍曾子固浮陽上綺丨活套城丨帝丨重丨駰馬名詩有丨有騢我馬維丨歅人名九方丨善相馬莊辛息鄰切爾雅太歲在丨曰重光一曰昭陽記其日庚丨其味丨書從革作丨苦辛役役常丨丨杜酸辛鏻骨抱丨丨杜芳辛崖蜜助甘冷山薑發丨丨坡五辛立春日丨丨盤詳盤受辛虀臼為丨丨辭字詳絹忘辛蓼蟲丨丨左魏都賦迂辛笑勸丨丨酒間吟短李詩樂天辛太丘庾性迂嗜酒詳李延庚挹辛滁之琅邪九江之庾樓皆丨丨丨丨賔夕陽而導新月洪景盧西山記上辛季辛先甲三日為辛後甲三日為丁言自新丁寧以臨祭祀未如記郊之用辛也左宣八年六月辛巳有事太廟書武成丁祀于周廟之類又昭公二十五年七月丨丨大雩丨丨又雩後漢禮儀志正月上丁祠南郊之類學林椒桂餘辛最後數篇君莫厭搗殘丨丨有丨丨坡和曽子固詩詩話云先生和辛字韻詩窘束往返不已先生厭之故和此意謂唱首多辣氣故爾杜衡亂細辛相似亂真者蛇牀似靡蕪丨丨丨丨丨魏文帝紀活套悲丨艱丨人名高丨五帝號劇丨事燕昭王朝賈丨為祈大夫有功王室姓氏隴西徴音夏后啓封支子於莘後去草為丨周太史丨甲丨慶忌前漢人字子真破羌將軍武賢之子慶忌亦拜將軍父子虎臣之俊丨毗魏人字佐治引裾事詳裾丨勉晉人字伯力劉聰署為光祿大夫固辭曰大丈夫豈虧髙節事二姓哉丨德源字孝基劉逖薦之云枕藉六經漁獵百氏除散騎侍郎隋初不得調隱林慮山著幽居賦北史丨仲甫趙宋人字之翰知彭州課種柳蔭行路號補闕柳文武兼資奉使契丹丨氏晉羊耽妻丨聰明才鑒本新革舊也書咸與惟丨丨刑法志改過自丨器非求舊惟丨語溫故知丨大學日日齒宿意丨詳宿桓沖不好丨衣詳衣災新田一歲曰丨二歲曰丨三歲曰畬詳災鼎新丨取丨也鼎卦斬新丨丨花蕊未應飛杜禪家有丨丨日月之説尖新為文章必擺落丨丨期到古人孫樵罵童志納新吐故丨丨莊刻意食新不丨丨矣左美新揚雄劇秦丨丨王莽國號新阿新樂天以姪丨丨為子白頭新丨丨如丨傾蓋如故鄒陽傳不相知者雖頭白有如新識也相知者雖傾蓋間如舊識也白髮新梨園子弟丨丨丨長恨歌故得新物以終為始人從丨丨丨王荆公舍舊圖新丨其丨而新是丨左送故迎新丨丨丨丨之弊黃霸傳活套更丨薦丨嘗丨憐丨清丨光丨薪説文蕘也一曰大木可折曰丨詩不流束丨揚之水丨是穫丨大東樵彼桑丨白華翹翹錯丨漢廣荆公采花食實枝為丨桃源行晉畢諴然丨讀書輿薪丨丨之不見孟棘薪吹波丨丨詩凱風析薪丨丨如之何匪斧弗克詩其父丨丨其子弗克負荷左栗薪蒸在丨丨詩東山掇薪元延祖曰每灌園丨丨以為有生之役過此不思也元結傳採薪問士之子長幼長曰能丨丨矣幼曰未能丨丨也記