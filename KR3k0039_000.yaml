body:
  text: 韻府羣玉類書類提要臣等謹案韻府羣玉二十卷元隂勁弦撰其弟復春註黄虞稷千頃堂書目云陰勁弦一作陰時遇字時夫奉新人數世同居登宋寳祐九經科入元不仕其兄中夫名復春據此則時夫乃勁弦之字而中夫又時夫之兄與世所傳不同當必有據然舊刻皆題其字未詳何義也昔顔真卿編韻海鏡源為以韻隸事之祖然其書不傳南宋人類書至多亦罕踵其例惟吳澄支言集有張夀翁事韻擷英序稱荆國東坡山谷始以用韻竒險為工蓋其胸中蟠萬卷書隨取隨有儻記誦之博不及前賢則不能免於檢閲於是乎有詩韻等書然其中往往陳腐云云是押韻之書盛於宋末元初時夫是編蓋即作於是時康熙中河間府知府徐可先之婦謝瑛又取其書重輯之名増刪韻玉定本今書肆所刋皆瑛書此本為大徳中刋板猶時夫原書也明成祖頗喜其書故解縉大庖西封事稱陛下好觀韻府雜書鈔輯穢蕪畧無文彩曹安讕言長語亦曰韻府羣玉亦收之博矣其中正要𦂳者漏之如足字欠管寧濯足柵字欠青溪柵蘇峻攻青溪柵卞壼拒之高熲殺張麗華於青溪柵二字尚失之他可知也云云今以欽定佩文韻府考之陰氏之所漏寧止於是安之所舉如一葉一花偶然掇拾未睹夫鄧林之茂蔚也然元代押韻之書今皆不傳傳者以此書為最古又今韻稱劉淵所併而淵書亦不傳世所通行之韻亦即從此書錄出是韻府詩韻皆以為大輅之椎輪將有其末必舉其本此書亦曷可竟斥歟乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
