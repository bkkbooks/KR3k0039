一作冉字史雲為萊蕪長清亷詳塵丨雲字彦龍屬文下筆立成為始興内史郡中稱為神明南史丨式字巨卿與張邵為死友詳丨喬五歲執祖硯涕泣後為名儒詳硯丨曅字蔚宗仕宋為祕書丞修後漢書丨栢年答宋明帝曰臣所居亷譲之間詳譲丨縝字子良齊時人言人生如樹花隨風而墮詳溷丨質字文素趙宋大名人九歲善屬文中第官封與和凝同謂傳衣鉢詳鉢鼻吸三斗醋事詳醋丨鎮字景仁成都人薛奎守蜀還或問所得曰得一偉人當以文學名世謂鎮也長嘯却胡騎詳嘯兩入翰林四知貢舉知謚忠文丨仲淹字希文其先邠州人徙蘇州少作金在鎔賦其自負將相器業謡云西賊聞之驚破膽詳膽謚文正相小范老子胷中甲兵詳兵丨純仁字堯天文正次子元祐拜與麥舟事詳麥謚忠宣丨祖禹字淳父温公辟同編資治通鑑凡十五年書成時經筵講官第一里除翰林學士丨石湖名成大字至能人宗参大政晚歸田號石湖居士有田園雜興詩六十首皆自書之丨氏范宣子以兄女妻戴陸範䡊也從車范省聲本作范以木曰模以竹曰范模範師者人之丨丨也模不丨丨不範為不少矣揚子軌範示人主以丨丨書序帝範唐太宗作丨丨十二篇賜太子光範三伏丨丨之門韓愈活套防丨人名桓彦丨唐狄公所舉五龍之一犯説文侵也從犬已聲又干也僣也書不丨有司詩無忌丨禮左丨五不韙衆怒難丨記事親有丨而無隠事師有隠而無丨漢史秋毫無所丨汲黯傳丨顔人名咎丨春秋晉人􅢮蟲名蠭也通作范記范則冠而蟬有緌韻府羣玉卷十二
