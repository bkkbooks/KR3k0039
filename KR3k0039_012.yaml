body:
  text: 韻府羣玉卷十二元隂勁弦隂復春編上聲二十三梗與耿靜同用梗古杏切枝丨又病也詩至今為丨桑柔又直也孔叢子馬回丨丨亮直土梗魏文侯曰吾所學者真丨丨耳田子方篇猶土人也遭雨則壞榛梗唐宋王曰朕於兄弟間不至丨丨五代何必記丨丨杜萍梗丨丨相逄滕閣記强梗其丨丨原道枯梗萬初懸岩崖一彴履丨丨歐土偶桃梗孟嘗君将入秦蘇代止之曰臣來淄上見桃梗謂土偶人曰子西岸之土也挺子以為人洚雨下淄水至則汝殘矣丨丨曰不然子東園之丨丨爾刻削為人絳雨下淄水至則子漂之而去矣今秦若虎口而君入之臣不知君所出矣孟嘗君乃止戰國䇿沮澤求桔梗求柴胡桔梗於丨丨則累世不得一焉戰國䇿活套猶棄丨浮斷丨骾說文食骨留咽中也從骨更聲或作􅀈通作鯁哽説文語為舌所介也從口更聲又咽塞也漢書祝丨在此通作鯁活套悲丨寒蜩丨鯁説文魚骨也從魚更聲用骨丨字與骾字通祝鯁丨丨在前祝噎在後賈山傳字本作哽骨鯁丨丨亮直蕭瑀傳高士亷心術警悟所乏者丨丨爾長孫無忌傳忠鯁魯宗道丨丨人謂魚頭公聖宋掇遺强鯁白居易執論丨丨本汲鯁端溪硯舊坑有龍巖丨丨黄圃三石丨丨全無眼又新坑六處皆不及止三石方輿綆説文汲井聲丨從糸更廣韻井索方言自闗而東關西曰繘禮考工記胝其丨亦作䋁短綆丨丨不可以汲深井之泉荀榮辱篇脩綆汲古得丨丨韓絹綆叚達以丨為綆然布以㸑詳㸑極䋁單丨之丨㫁幹索單盡也幹井上木言為綆契傷也詳鑚桄榔綆丨丨樹皮作丨得水則柔韌嵇含録金瓶素綆後園鑿井銀作床丨丨丨丨汲寒漿古詩丙兵永切説文位南方萬物成炳然陰光以起陽氣将虧從一入門一者陽也歲在丙名游兆爾雅曰柔兆月在丨曰修觀嘉魚宂口向丨詳宂大宗丨夜書半夜也詳夜丨部詳部令丙令有先後有令甲令乙丨丨詳甲魚丙丨尾謂之丨詳丁如篆丙字也活套魏丨二相人名白乙丨秦將晉獲以歸見左傳姓氏平陽商音與邴通齊大夫丙歜漢功臣表有高苑侯丨猜丨晋大夫邴豫食采於邴因氏魯人丨氏以鐡冶富至鉅萬吉字少卿魯國人封博陽侯為丞相不問死傷問牛喘詳牛丙魏有聲漢書御史汙車茵詳茵邴原字根矩魏太祖署丞相徴事龍翰鳳翼國之重寳歆與管寜華為友怲説文憂也從心丙聲詩憂心丨丨蛃白蟫魚邴説文宋下邑從邑丙聲又姓通作丙炳説文明也從火丙聲掦君子篇言丨丹青陸贄傳論諫皆丨丨如丹青文炳其丨丨也革卦蔚炳胡為逐吾軰文字争丨丨坡秉説文秉禾束也禾二石為丨鍾又米十六石為丨又小爾雅二為丨語粟五丨詩丨鈞節南山丨彛蒸民左魯丨周禮書右丨白旄遺秉彼有丨丨大田盈手曰秉粟三秉曽子仕於莒得丨丨丨是時曽子重其禄而輕其身韓詩外傳稈一秉或取一秉丨焉左丨把也活套燭堪丨境居影切亦作竟月令備邉丨孟達乎四丨魯恭蝗不犯丨詳異蔗境顧愷之倒食甘丨曰漸入丨丨詳蔗二境犧牲玉帛待於丨丨左㐮八越境非君命不丨丨並趙宣子亡不丨丨左死生境不墮丨丨丨孟生滅境醉中雖可樂猶是丨丨丨坡招提境更宿丨丨丨杜人境不奪紙衣和尚問臨濟如何是丨丨俱丨丨曰王登寶殿野老唱歌師曰如何是人境俱奪曰并汾已信獨處一方師於言下領㫖傳燈活套異丨對丨老丨華胥丨榮辱丨儆説文戒也從人敬聲書丨于有位丨戒無虞與警字義相似互見警蕭丨唐人入相喜見曽孫㯳説文旁也謂輔也所以正弓從木敬聲事見庚韻檠字警説文言之戒也從言敬聲亦通作儆詩亦以自丨抑篇丨枕詳枕蹕警天子出稱丨入稱丨史韓安國傳機警寡辭眞吉人介石乃丨丨坡箴警衛武公丨丨於國國語鞭警倦馬煩丨丨歐清警新詩如玉雪出語便丨丨坡鶴警十歲丨丨露而鳴大戴記抱虚警慼慼丨丨丨韓句愈警對月丨丨丨谷活套規丨加丨夙夜丨不徹丨景説文光也從日京聲廣䪨大也又明也詩丨行行止注丨行明徳也今作丨慕非又景星徳星也脩景南陸迎丨丨潘安仁借景山谷有丨丨亭詩云畏景曲池煎丨丨杜人中景杭妓琴操坡善之在西湖戲琴曰我作長老爾試参禅琴問何謂湖中景坡云落霞與孤騖齊飛秋水共長天一色何謂景中人坡云裙拖六幅瀟湘水鬢掃巫山一叚雲何謂丨丨丨荅云隨他楊學士疲殺鮑參軍如此究竟何如坡云門前冷落鞍焉稀老大嫁作商人婦琴大悟即削髪為尼備要殺風景丨丨丨謂清泉濯足花上曬褲背山起樓燒琴煮鶴對花啜茶松下喝道李義山雜纂瀟湘八景山市晴嵐漁村落照江天莫雪煙寺晚鐘平沙落鴈逺浦帆歸丨丨夜雨洞庭秋月新亭風景晋名士登丨丨周顗曰丨丨不殊詳因黄庭三景内景中景外景黄庭經土圭測日景禮地官司徒詳圭古注在此人名陶𢎞丨晋宋間人隐居茅山姓氏京兆宫音於芊姓楚公族也漢初徙山東豪族關中今好畤華陽諸景是也楚有景差有續騷大招篇将丨丹字孫卿後漢人生於馮翊縱突騎以破王郎拜驃騎大軍封擽陽侯其故鄉也圖形雲䑓五丨鸞字漢伯能理齊詩施氏易作易説及詩觧文句凡著述十餘萬言丨煥有野人閒語一書宋乾徳中立郡國戒石碑民膏民脂四句取其書中語也影於丙切與景同潘安仁詩南陸迎脩景弩影李彬為汲令請主簿飲時壁上懸赤弩照杯中形如蛇薄飲之得疾謂蛇入腹中彬意丨丨復置酒於前處所見如前沈痾頓愈風俗通蛇影樂廣事詳蛇竿影上元竪一丈竿候月午影至七尺大稔六尺六寸小稔九尺一丈有水五尺歲旱三尺大旱玉堂閑話含影已佩丨丨蒼精龍杜丨丨日月之精華詳精倒影匕命承丨丨而開軒選丨丨氣去地四千里其景皆倒在下捕影求仙如繫風丨丨終不可得漢郊祀志捉影捕風丨丨谷永䟽躡影秦良馬名丨丨詳馬返影夸父丨日丨詳日搏影主父偃言匈奴獸聚馬散從之如丨丨本傳丨擎也言不可得射影含沙丨丨詳工水工也畏影丨丨而走乎日中莊對影舉杯邀明月丨丨成三人李詩山河影月中有物娑婆者乃丨丨丨其空處海水影淮南地水影月中蟾桂丨影也空處丨丨也影又云湏彌山有閻浮樹月過樹入月雜俎張三影客謂張子野曰人為公為張三中即心中事眼中淚意中人也公曰何不目我為丨丨丨雲破月來花弄影嬌柔懶起簾壓捲花影柳徑無人墜風絮無影此平生得意句也古今詩話又高齋詩話以浮萍破處見山影雲破月來花弄影隔墻送過秋千影此為三影苕溪漁隠云當以古今詩話為勝花弄影宋子京往見張子野曰欲見雲破月來丨丨丨郎中子野屏後呼曰得非紅杏枝頭春意閙尚書邪遯齋閑覧真武影宋熈寕中奏樂醴泉觀是日丨丨丨見於殿脊火珠中部從神官旗纛皆具括異志潭底影賈島詩獨行丨丨丨詩話可憐影願持照新人䨇對丨丨丨孟弔形影魏陳思王傳形影相丨五情愧陶三國志又李令伯表㷀㷀孑立丨丨相丨淵明有丨贈丨丨荅形三首序云貴賤賢愚莫不營營以惜生斯盛惑焉故極陳形影之苦言神辨自然以釋之賦塵影唐謝偃嘗為塵影丨二篇一葉百影瀛洲有影木日中視之丨丨丨丨花木録喜自顧影魏何晏粉白不去手行歩自顧影史䨇旌燭影劉沔拜大將常見燭影在丨丨上詳旌張燈相影寶厯中王山人取人夲命日丨丨丨丨知休咎言人影欲深深則貴而壽類説雜俎條融仄影周昭王時修塗國獻丹鶴以翅為扇一名丨丨一名丨丨此為羽扇之始事物紀原老翁子無影陳留富人年九十取田客女為妾一交而死後生男長男曰年尊何因有子爭財数年丙吉言真人無影丨丨丨亦丨丨又不耐寒試之果然人咸服風俗張元始年九十七生兒無影梁蕭映傳金粟影劉􅀈冩真得丨丨丨筆法愷虎頭丨丨丨神妙獨難忘杜佛有丨丨如來謂顧之所畫維摩也愷之畫一維摩百日畢工謂寺僧曰第一日開㸔者賫施十萬及開户光明照寺透窻日影有老宿見丨丨丨丨問師曰忩就日邪日就忩邪詳忩韻夣幻泡影一切有為法如丨丨丨丨詳觀金剛經活套雲丨潭丨倒簾丨梅棟丨省所景切呵禁者也夲作􅀢從門省聲或作􅂒今通作省今作丨又察也審也并丨冗官李吉甫傳丨事天公詳回丨吏不如丨官丨官不如丨事詳事杜諸公衮衮登䑓丨畫省尚書省皆以粉壁畫古賢列士曰丨丨漢官典職亦曰粉丨粉省見上薇省見紫丨丨下三省唐丨丨中書令尚書省唐丨丨丨尚書令一人掌典領百官其屬有六丨丨又後改曰中䑓又改曰文昌䑓又曰文昌都丨曰都䑓唐官志中書省唐丨丨丨中書令三人掌化天子執大政總判省事後改曰西䑓丨又改曰紫薇省丨丨令曰紫薇令舎人曰紫薇郎因樂天紫薇花對紫薇郎之句故云薇丨紫㣲省即中書省見上往黄門省唐天寶改門下省曰丨丨丨掌出納帝命紅蘭省並入丨丨丨元稹酬樂天校書所也金葉省上君白玉堂倚君丨丨丨杜南䑓北省魏髙登請以槿暹為御史中尉宋遊道為尚書左丞曰卿一人處丨丨一人處丨丨當使天下肅然監有豐有省晋頃公卒鄭游吉送葬士景伯詰之對曰舊丨丨丨丨從其豐則寡君㓜弱是以不共從其省則吉在此矣昭三十㾪瘦丨眚説文目病生翳又灾也又過丨也左不以一丨掩大徳易有灾丨復卦春秋肆大丨書人有小罪非丨白眚言之不從則有丨丨白祥聼之不聰則有黒眚黒祥漢五行志黒眚見上永于憬切説文炙水長也廣韻引也逺也又書日丨星火降生有丨高宗肜日慎厥身脩思丨臯謨詩故丨歌之一桞子謫丨州丨州産異蛇雋永漢蒯通論戰國説士權變序其説八十一自號丨史丨雋相兖反肥肉也言所論甘羙而味永也書永王逸少書偏工丨丨以其八法之勢能通一切字永字八畫也法書苑孤永吟笑還丨丨曾子固聲依永永長也長言之中有高下疾徐依之而五聲成焉書活套味丨晝丨人名谷丨漢人專攻上身皿眉永切説文巫飯豆食器用也象形與同又食器盤盂之屬憬俱永切説文覺寤也從心景聲詩丨彼淮夷璟玉光人名宋丨唐名相説文忩牖麗婁開明人名伯丨周太僕正杏何梗切説文果也地理北丨齊桓㑹盟處草木花名杏花孔子遊緇帷之林坐杏壇之上莊裴晋公午橋莊有文丨百株立碎錦坊轉林異景明皇羯鼓催花回視桃杏皆發上曰不喚我作天公可乎遺事朱陳村有杏百二十里詩話吟咏牧童遥指丨丨村古詩日邊紅杏倚雲栽高蟾果名杏實嵩山有牛山多杏百性饑饉皆湏此為命人人充飽而杏不大嵩山記董奉居廬山為人治病輙愈重者種杏五株輕者一株後以杏一器易榖一器穀少者虎逐之乃以公贍貧者號董仙杏林神仙傳後周張元南鄰杏兩株多落元園中元悉以還主史濟南郡有分流山杏大如棃黄如橘謂之漢帝杏亦曰舎杏孔氏六帖銀杏一名鴨脚葉似也京師無此王和父移植於其第歐詩註吟詠深灰殘火略相遭小苦由甘䪨最高誠齋荇説文荽餘也白莖華紫赤浮水上大如釵股詩參差丨莱池州人稱為丨公鬚盖亂生若鬚然紫荇丨丨穿腮氣慘悽韓言魚也連錢荇漢宫太一池有丨丨丨洞冥記猛莫杏切説文丨大也從大孟聲又害也惡也嚴切語威而不丨左寛以濟丨政猛苛丨丨於虎詳虎酒猛主酒者酒懦為曠官謂冷也丨丨為苛政謂熱也詳儒精猛異類服丨丨坡豪猛頽然寄淡泊誰與發丨丨坡悼前猛歛退就新儒趍營丨丨丨韓三太猛隋賀若弼下獄上数之曰公有丨丨丨嫉妬心太猛自是非人心太猛無上心太猛既而釋之寛莫若猛為政在丨其次丨丨丨昭二十人名王丨秦符堅良相蜢蚱丨蝗類復占編蚚丨草上虫賀䪨虻丨又胡丨蝦蟆屬艋舴丨小舟礦古猛切