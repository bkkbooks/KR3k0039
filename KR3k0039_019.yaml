body:
  text: 韻府羣玉卷十九元隂勁弦隂復春編入聲十藥與鏵同用藥以灼切説文治病草从艸樂聲書若丨不暝眩語季康子丨詩不可救丨前紀毒丨苦口利於病大藥苦乏丨丨資杜丹砂黄金為仙藥也狂藥晉孫季舒嘗與石崇飲傲慢過度崇欲表免之裴楷曰足下飲人丨丨責人正禮不亦藥乎乃止勿藥丨丨有喜易三世藥醫不丨丨不服其丨記聞而藥不如吾丨丨丨之也襄三十一苦言藥丨丨丨也甘言疾也商君傳嫦娥竊藥后羿妻丨丨丨丨奔月詳娥劉阮採藥丨丨二人入天台山丨丨遇二仙女詳源龎公採藥後丨丨入鹿門丨丨不反本韓康賣藥丨丨丨丨不二價詳價剪鬚和藥李勣病太宗自丨丨丨丨本服羊祜藥吳陸抗病晉羊祜饋之藥抗丨之曰豈有酖人丨叔子哉本願充一藥元行沖謂狄仁傑曰丨以小人丨丨丨石可乎样籠病不飲藥漢朱雲丨丨呼醫丨丨與李勣事同恨妻買藥北齊庫狄伏連位大將軍鄙吝妻病以百錢買藥毎丨之後伏誅史使婢丸藥晉陳壽遭父䘮有疾丨丨丨丨鄉黨以為貶議史醫誤進藥唐杜黄裳疾丨者丨丨丨疾遂甚終不怒譴史無治老藥萬病皆可治惟丨丨丨丨白無病無藥相逢更何言丨丨亦丨丨坡道吾和尚一鉢歌无可離无可着何處更求丨丨藥藥是病病是藥到頭兩事須拈却亦丨丨亦無病正是真如靈覺性傳燈曹溪智藥僧智藥至丨丨開山名寶林詳溪人名李百丨唐人㓜多疾故以名七嵗屬文詳稻姓氏漢丨崧為郎詳郎花木芍藥又名將離故將别以贈本草黑牽夷廣雅名天下者惟廣陵紅葉黄腰號金帶圍而无種有時出則城中當有宰相韓魏公王岐公王荆公陳太傅皆然后山叢話玉盤孟南禪資福兩寺一嵗最盛有白花正員如覆孟下十餘葉盛之如盤因易名云玉盤孟東坡詩序蔡繁卿守揚州作萬花㑹用花十餘萬枝漁隠叢話揚州朱氏園種丨丨五六萬株花盛時作錦亭以待遊者逾月不絶芍藥序孔常父云唐詩人如盧仝杜牧張祐之徒皆居廣陵日久未有一語及丨丨者是花品未有若今日之盛也吟詠丨丨當堦翻謝元暉浩態狂香昔未逢紅燈爍爍緑盤龍韓要與牡丹為近侍邵雍兩廂鋪氊毺五鼎調丨丨韓晩秋郾城諸丨丨根主和臟又辟毒氣故合於蘭桂以助食礿説文夏祭也从示勺聲新春祭也春物未成其祭尚薄一云煮菜以祭記春祠夏丨易西隣禴祭躍説文从足翟聲詩踊丨用兵中庸鳶飛魚丨爵躍雲將東游邇遭鴻濛方將拊髀丨丨而游莊在宥鳳躍蔚然而虎丨丨李漢文劒躍雷煥子業持丨經延平忽劒丨墮水化龍詳劒金躍大冶鑄丨踴丨曰我且必為鏌耶詳冶距躍魏犫丨丨三百曲踊三百百音陌詳踊阜螽躍草虫鳴則丨丨丨選物騰躍丨痛丨丨食貨志痛甚也史記躍作踊籥説文本作龠樂之竹管三孔以和衆聲也从品龠詩傳云丨竹為之長三尺如笛三孔廣雅七孔又云六孔詩右手執龠與籥同丨舞笙鼓孟管丨之音南籥季札見舞象箾丨丨者左葦籥簀桴土鼓丨丨伊析氏之樂記明堂豳籥禮籥章注丨國之地夏籥丨丨序興仲尼燕居丨丨文舞也序更也鼓籥天地之道猶丨丨郎顗傳鑰説文闗下牡也月令謹管籥與鑰同牡鑰西園丨丨夜沉沉以漢五行志注牡是出籥者又云牡所下閉者以鐡為之魚鑰丨丨未拔清夜永坡夜歸丨丨者取魚不瞑目守夜之義金鑰黄庭經玉匙丨丨常完堅詳匙關鑰魏傅嘏曰鄧颺外要名利内无丨丨皆敗徳也史北門鎖鑰冦準鎮大名府北使曰相公望重何不在中書公曰皇上以朝廷无事丨丨丨丨非準不可國老閒談不為扃鑰唐元徳秀愛陸渾佳山水居之丨丨墻垣丨丨无僕妾嗜酒陶然史自繫衆鑰漢吏部張允家貲萬計性吝丨丨丨丨如環佩聲後郭威入京師墜井而卒續世說自持管鑰唐徐岱為給事中性吝至丨丨丨丨史納四金鑰唐朱滔王武俊田悅李納僭王丨丨丨丨於囘紇曰四國啓閉出納惟命史瀹漬也洽也又疏丨關滌也莊疏丨而心龠量名容千二百黍爚說文火飛也从火龠聲一曰藝也又震震丨丨西都賦煜爚要華電之丨丨思遊賦融爚彌丨丨以隠處兮賈誼賦彌逺也丨明丨光也略離灼切說文經略土地从田各聲孟願聞其丨書嵎夷既丨王略侵敗丨丨成二將略桓沖慮符堅内侵曰謝安不諳丨丨史兵略識丨丨魏相傳三略黄石公丨丨七書謂上中下三計經略天子丨丨昭十方略趙充國圖上丨丨本厓略夫道難言為汝言其丨丨莊知北遊裴垍丨丨疏薦三十許人詳裴脫略豪傑初未遇其跡或丨丨李領略力士可丨丨谷耜有略有略其丨詩略磨刃也本作䂮多大略後景恭少慷慨丨丨丨史蜉蝣渠略丨丨一名丨丨詩注活套武丨才丨英丨人名王景丨名猛沈昭丨且食蛤蜊詳蜊䂮磨刀詳略掠奪取也活套抄丨捎丨雲鬢丨脚居勺切與足韻通看軟脚郭子儀自同州囘詔大臣就宅置丨丨局人率三百千出有賜曰錢路反有勞曰丨丨楊國忠傳赤脚一婢丨丨老无齒韓陽春脚宋璟如有脚丨丨詳春元和脚桞公權在元和間書有名故劉禹錫詩桞家新様丨丨丨且盡薑芽歛手徒本集元祐脚后山詠徐伷書肯學黄家丨丨丨注徐清蓬萊女官詩效謝體書效山谷妍妙可喜古釵脚筆法如丨丨丨詳痕鐺三脚周貫欲李生同脩道不從貫云頑鈍天教合作丨從他丨丨豈能行詳鐺煨鴨脚烹茶丨詩丨丨谷抱馬脚班超使西域至于闐王侯以下號泣丨丨丨不得行乃詔超為都䕶史飛豹脚風定軒窻丨丨丨雨餘闌檻上蝸牛坡豹脚蚊也狼啖脚晉張邈嘗奉使夢丨丨一丨索紞曰脚肉被啖為却字後果不行索紞傳夫鐵脚平生丨丨丨道價喧宇宙后山長蘆應天禪師至一邸有娼女為母所迫入其房不去師跏趺逹旦叢林因謂之丨丨丨尺三汗脚顧雲大順中求髙逢休諫議與劉子長僕射並不及雲但云顧雲等擬將一丨