body:
  text: 韻府羣玉卷十三元隂徑弦隂復春編去聲一送獨用送蘇弄切説文遣也將也隨也又贈行曰丨詩薄送我畿齎送莊子將死曰吾以天地為棺椁萬物為丨丨詳棺行者丨居者丨漢食貨志裝送前鮑宣嘗就桓少君父學父竒其清苦以女妻之丨丨資賄甚厚賔送在者天一方日月老丨丨黃一卷懷友贈送丨丨文公于渭之陽渭陽株送富人鬬雞走馬弋獵博戲亂齊民乃徴諸紀令相引類千人名曰丨丨徒入財者得補郎漢食貨為根株所送當充徒役者入財即補郎也目送四人趨出上丨丨之留侯世家即四皓縱送抑丨丨忌詩發矢曰丨從禽曰丨它送丨丨亦千金陸賈傳非槖中物故曰丨丨不迎送五代桑維翰作相過裴皥皥丨丨不丨或問之皥曰我見桑公於中書庶僚也桑公見我於私第門生也郡國間談太守梁桞之官有勸皇甫謐錢之者謐曰栁為布衣時迎送不出門今作郡送之是貴城陽太守而賤桞非吾心所安也詳迎孔釋送丨子丨氏親抱丨二子歌臨軒送姚崇每見便殿上為之興去輒丨丨以丨本賫百錢送劉寵被徴五叟人丨丨丨丨詳錢會米肉送邴原遊學臨别師友以其不飲丨丨丨丨原曰本能飲但以荒思廢業爾詳飲敘别近送隋牛𢎞為太常楊素出擊突厥與𢎞别𢎞送至中門素曰大將出征故來丨丨何相送之丨𢎞楫而退白衣冠送荆軻得利七首入秦知其事者皆丨丨丨丨之史活套風吹丨百程丨鳳馮貢切説文神鳥也天老曰丨之象鳩前後雞蛇頸燕頂龜背魚尾五彩髙六尺雄曰丨雌曰凰多赤色者丨多青者鸞多黃者鵷多紫者丨九苞六象七德五文六帖行鳴曰歸嘻止鳴曰提扶飛鳴曰即都六帖所居積石千里河出其下天為生食其樹名瓊枝以琳琅為寶莊羽蟲三百六十丨為之長語丨兮丨兮威鳳丨丨為寶宣帝紀鳳有威儀也金鳳漢宣帝以皂蓋車賜霍光至夜車上丨丨亡去曉乃還郡黃君仲北山羅得一鳯詣闕俄飛入光家車上續齊諧記鐡鳳朝元閣上酒醒時臥聽風鸞鳴丨丨坡老鳳丨丨池邊蹲不去詳老么鳳倒挂緑毛丨丨坡梅小鳳賜茗時時開丨丨坡宫人剪金為龍鳳貼茶上蠟鳳旋看丨丨戲僧虔詳炮鳳烹龍丨丨玉脂泣李白題鳳嵇康與吕安善後來值安不在嵇喜延之不入丨門上丨字而去喜以為欣不覺為凡鳥也朝陽鳳詩卷阿唐韓瑗褚遂良死內外諱言者二十年御史李善感始上疏極諫時人謂丨丨鳴丨韓瑗傳潁川鳳黃霸為守時鳳集丨丨漢書銜詔鳳石季龍與皇后在觀上有詔書丨木鳳口中放數百丈緋繩回轉飛下鄴中記植竹待鳯晉符堅時謠云鳳凰山阿房鳳非梧桐不棲非竹實不食乃丨梧桐丨數十萬於阿城以卜之慕容中小字丨至是陷堅城止阿房也六帖吹簫致鳳肅史及秦女弄玉事詳簫吹笙作鳳詳笙薛氏三鳳丨元敬與從兄收族弟德齊名稱河東三鳳唐史崔氏兩鳳北齊丨陵為侍中與弟仲文同日受拜時云兩鳳速飛史魏氏雙鳳隋丨䬲二子景義景禮並有才行世稱雙鳳史助修五鳳韓浦與弟詩丨爾添丨丨丨樓詳樓如雞比鳳齊王僧虔子慈謝鳳子超宗謂慈曰卿書何如虔公慈曰慈書比大人丨丨之丨丨超宗狼狽而走史放梟囚鳳後陳耽上言今公卿所舉所謂丨鴟丨而丨鸞丨劉陶傳燕巢龍鳳有人家曰鳳雛飛去又有丨丨赤丨子長尺許騰躍飛去金華子年號元丨漢昭帝唐五丨宣帝儀丨髙宗人名燕赤丨宫奴也趙后通之姓氏邵陽宫音顓頊氏官有鳳鳥氏以官為氏花木金丨花菊詩呼為菊婢因得名張宛丘吟詠自卵至翼亦數月云云一墜驚飛反丹穴文與可鳯德何其哀驚飛下幽草劉功甫貢古送切説文獻也從貝工聲又稅名書任土作丨爾丨包茅不入僖四孟五十而丨歲貢古者取士必使諸侯丨丨蔡雍傳九貢太宰以丨丨制邦國之用禮嬪貢器貢幣貢材貢貨貢服貢遊貢物貢苞貢江橙解丨丨谷人名子丨姓氏廣平宫音端木子貢之後丨禹字少翁前琅琊人以明經潔行徵為博士後遷光祿大夫詔曰生有伯夷之廉史魚之直王陽在位丨丨彈冠詳冠贛説文賜也從貝贛省聲徐曰端木賜故字子丨贛説文水名出豫章㔶説文小杯也從二贛聲羾飛至也甘泉賦登椽欒而丨天門弄盧貢切説文㺯玩也從奴玉詩載丨之璋斯干龔遂傳丨兵潢池漢文曰鄧通吾丨臣詳臣老萊子丨鳥親側詳鳥三弄桓伊丨丨詳笛雅弄梁桞惲彈謝安琴為丨丨史曲弄琴操丨丨皆合於歌唐禮樂志撫弄陶潛蓄素琴每有酒適輒丨丨史嘲弄萬象困丨丨坡含弄丨飴丨孫詳飴金石弄宋宗少文善琴古有丨丨丨為諸桓所重文帝遣樂師就受之史摶沙弄攫土丨丨為此丨坡以印弄髙祖丨御史丨丨之詳弄弱不好弄夷吾年幼丨丨丨丨僖尤活套戲丨敢丨礱磨也哢鳥吟聲啽哢栁乞巧文丨丨飛走晴哢屋角聞丨丨谷凍多貢切説文仌也仌丨東聲孟無丨餒之老記東風解丨禮記呵凍李白撰詔誥時大寒帝勑宫嬪執牙筆丨之天寶遺事忍凍愛雪長丨丨坡雲凍西山雪淡丨將丨坡詩海凍慕容皓將討慕容仁髙詡曰前此海未常凍自仁反以來連年凍者三矣天欲使吾乘海氷襲之從之遂禽仁鑑短綆凍采蘭秋蓬深汲井丨丨丨谷琥珀凍蟹孹鵝子黃酒溫丨丨丨谷銀瓶凍素綆分碧丨丨丨坡運筆不凍北齊陳元康作軍書其時天寒雪深颯颯丨丨丨及丨俄頃數紙史書棟説文極也從木東聲易上丨下宇係辭左丨折􅀈崩史諸葛亮鬱為時丨乾棟丨丨傾而三光北馳粹崔融啓楹棟里中多嘉樹與世作丨丨谷騎屋棟宋蕭思話十許歲好丨丨丨打細腰鼓鄰曲患之後折節有令望史未能易棟唐裴延齡德宗曰浴堂殿一棟將壓欲易之丨丨也延齡曰陛下以本分錢治殿數十尚不乏況一棟哉史活套梁丨居連丨蝀詩篇蝃丨止奔也衛文公以道化其民涷暴丨雨湩説文乳汁也從水重聲事見上聲控苦貢切説文丨引也從手空聲告也制也王喬丨鶴詳鶴磬控抑丨丨忌大叔于田上騁馬下至馬引控胸奴傳丨弓丨弦活套情丨空語回也屢空師空不宜空我丨節南山空窮也困窮我氏也篇空酒誥之丨俄丨焉注缺也揚子潭影空丨丨丨人心唐詩韻會入在此天宇空起看冥鴻飛乃見丨丨丨谷鞚馬勒飛鞚黃門丨丨不動塵杜青絲鞚古樂府白馬歌宛轉丨丨丨照曜珊瑚鞭類説果下鞚杯傾笛中吟帽拂丨丨丨坡溫嶠執鞚晉丨丨時王敦反明帝在東宫將出戰嶠丨丨諫止陳茂捉鞚隋丨丨初髙祖為周將與齊師挑戰茂止之丨馬丨帝斫其額流血詞氣不撓帝謝之史活套朱絲丨粽作貢切俗你粽以菰葉褁米解粽京師以端午為丨丨節以粽葉長者勝短者輸歲時雜記傳粽爭丨九子丨皇作續干春王沂公楊梅粽綵索盤中結丨丨丨裏紅歐黃甘粽梁范雲使魏李彪為設甘簾丨丨丨隨盡彪笑曰范散騎小復儉之一盡不可復得史九子粽粽子形製不一有角粽錐粽筊粽筒粽稱鎚粽丨丨丨風土記稱鎚粽見上百索粽唐五日有丨丨丨文昌雜録益智粽盧循遺劉裕丨丨丨裕報以續命湯鑑鬼目粽宋江夏王義恭見廢帝狂悖謀廢立帝覺之率羽林執其弟斷折支體挑取眼睛以蜜漬之為丨丨丨史活套玉丨楚丨緵九罭罟也㚇鳥飛斂足偬倥丨一音千弄切困貌甕烏貢切説文罌也又作從瓦公聲易丨敝漏井金甕宋渭南耕者得主父偃七甕丨銀甕復道諸山得丨丨杜酒甕周顗藉其家絮數簏丨五丨而已詳絮又丨丨化為人求酒事詳滿及器韻禰衡云荀彧可強與言餘皆丨丨飯囊爾金樓子飯甕童謠二月刈禾傷旱九月喫糕正好十月洗蕩丨丨隋五行志豐年之詳坡助爾歌丨丨釀甕武后杖王后蕭良娣投丨丨中詳醉露甕黃帝時丨堯時存貯碼瑙丨中時淳則滿時澆則竭詳露算甕有貧人止能辦販隻甕中心計曰此甕賣之若干可販二甕自二化四其利無窮遂喜而舞不覺甕破小説蜥蜴甕置丨丨於丨祈雨事詳雨夫子甕後鍾離意為魯修丨丨車入廟拂几席劍履男子張伯除堂下草土中得玉璧七枚伯懷其一以六枚瘞堂下床首有懸丨意門戶曹此何甕曰丨丨丨有丹書人莫敢發意發之得素書云後世修吾書董仲舒護吾車拭吾履發吾笥會稽離意璧有七張伯懷其一本畢卓甕卓為吏部比舍郎釀酒熟卓潛夜至甕下盜飲之為掌酒者所縛明旦乃知吏郡也本秃筆甕孫智永學書積年丨丨十八丨尚書故實藏書甕唐房琯與道士邢和璞出逰至夏口村坐古松下和璞使人鑿地得甕中所丨劉師德與永禪師丨謂琯曰頗憶此邪因悵然悟前身為永師也坡詩序灌畦甕漢陰丈人為圃畦抱甕而丨力多功寡子貢曰有械于此其名桔橰詳機覆酒甕陸機聞左思欲作三都賦曰其成當以丨丨丨爾左思傳覆醬甕楊雄著太玄當時不免丨丨丨後魏史醯雞甕丨丨丨天詳雞人鮓甕地名在歸州岸下黃命輕丨丨丨頭船黃虀甕貧士有三百甕丨丨詳虀豚破甕魏管輅有人失妻輅卜之令於束陽城門候擔豚人至與共鬬豚走逸追之丨入舍突丨主人丨婦從甕中出六帖繭如甕扶桑大丨丨丨盎詳蠶奉漏甕周子曰救趙之急若丨丨丨沃焦釡也詳釡鳴曉甕金井鹿籚丨丨丨坡文字甕趙普為相屏後設一大甕凡有投利害丨丨貯其中節則焚之通衢因此得謗聞見録道士坐甕王老者慕道有老道士造之忽遍身瘡瘍曰得酒數斛浸之即愈遂為置酒滿甕丨丨丨丨中三日鬚髮皆黑如童子曰能飲此酒可仙去時方打麥全家飲之忽風動雲蒸一時輕舉空中猶聞打麥聲集仙傳與張開光事同詳小兒擊甕司馬公與羣兒戲一兒墜大甕水中羣兒驚去公以石擊甕水送出兒得不死至今京洛間為丨丨丨丨圖冷齋夜話藏金青甕隗蛁卒後有詔使至筮卦謂其妻曰賢夫丨丨五百斤盛以丨丨埋在堂屋下掘之得金又詳金流錢欹甕建安人見山下數錢丨出至山半有大甕丨滿而丨於是推正石之取五百餘金歸將再盡取而亡其丨夜夢人曰錢有主向為甕欹以五百雇爾正之爾唐餘録釀酒抱甕羊雅舒冬月丨丨令人丨丨速得味好雞跖集城號鐡甕潤州圖經丨丨丨丨城打破醬甕百丈師因馬大師致醬三甕師集衆以拄杖指甕云大衆道得即不丨丨道不得即打破衆無對師乃打破歸方丈百丈語録活套潑春丨蟻浮丨洞徒弄切説文疾流也從水同聲韓竹丨何年有周顗腹空丨無物詳腹藻洞魚朝恩有洞房四壁安琉璃板貯江水及萍藻魚蝦號丨丨南康記乳洞南山丨丨乳滴作飛仙狀詳乳小有洞玄中之洞三十六所第一曰丨丨清虛之天詳有朱明洞羅浮有深洞幽邃旁達約數千里號丨丨丨華陽洞李允川政和間至和州遊近郊不覺墜穴中黑如夜稍進漸明石池中荷花爛熳天日晃曜有石棊局聞誦經聲不見人已而忽至道旁僧寺問僧乃滁州境也已是七日才一晝爾其所至乃丨丨丨也夷堅志猗玕洞元結逃亂入丨丨丨稱丨丨子玕雲俱反詳白鹿洞在廬山詳鹿寒居洞韓愈燕喜亭記云云腹空洞周頭丨丨丨無物詳腹絧鴻丨緁獵羽獵賦注相通貌動韻會云合上聲韻通詷􅢽丨急言也恫偬丨不得志慟説文大哭也增韻哀過動心痛他貢切説文病也又傷也隱也楚也悼也賈誼䇿可為丨哭西銘癢疴疾丨哀痛公私之積猶可丨丨賈誼子心痛北齊裴訥之在并州母在鄴心痛而而訥之是日心亦驚痛請急而還史唐裴敬彛心痛倍道歸而父卒史孫心痛齊宗元卿早孤養於祖母祖母病元卿在逺心痛大病大痛小病小痛女心痛顧愷之畫鄰女以棘針釘其心丨丨丨愷因致其情遂從之詳針念前痛戢翼丨丨丨坡詩齲齒痛孫夀善為丨丨丨不欣狀詳齒飲未痛一丨百觚嫌丨丨坡孰若頸痛晉王彬從兄敦入石頭彬數敦云云敦大怒王導勸彬起謝彬曰自腳