白木柄劖斷也鑿也韓造化何以當鐫丨巖五銜切岸也曰丨廊者殿旁高廡又險也左制丨邑也欃初銜切彗星曰丨衫所銜切小𥜗也碧衫亂點餘花唾丨丨坡夢詩汗衫燕朝衮冕有曰紗中單漢王與項籍戰丨透中單改名丨丨炙轂子涼衫趙宋渡江時為白丨丨濕青衫江州司馬青衫丨白樂天顔郎衫丨真卿問范氏尼曰吾得五品否尼指示紫絲布曰丨丨丨色如此明皇遺事面如衫謝泌戲胡旦飲酒面赤白舍人丨色丨丨色詳僕縑易衫雙道茂見李晟以二丨丨茂丨請題襟膺曰他日為信後道茂受朱泚偽官出丨襟示晟得原死詳赦比紅衫楊大年不知丨丨丨兒詩事乃羅虬所為百篇筆談詩求二衫梁郅溉為太守任昉以丨丨丨丨段云為惠當及時無待秋涼日史冬衣葛衫袁充丨初尚丨丨丨客戲之云云詳葛七斤布衫僧問趙州萬法歸一一歸何所州云我在青州作一領布衫重丨丨活套朝丨征丨春丨舞丨芟説文刈草也除草曰丨禮宗伯掌丨禮一耒歲之丨左丨夷藴宗活套夷丨鋤丨詩篇載丨春藉田祈社稷也周頌監古銜切孟管叔丨殷詩何用不丨節南山書三丨叛有蟹無丨州詳蟹願罷團監邭謨獻三十字一字言一事言團者丨丨團練使言監者丨丨監軍詳字活套神明丨凡符咸切説文最括也從二從了二偶也了古文及也左序發丨以言例聖凡凡人未見丨書不凡薛勤造陳仲舉其父出迎勤曰足下有丨丨子吾來候之詳子楚凡丨王與丨君坐少焉丨左右曰丨亡者三言有三敗亡徴凡君曰凡之亡不足以喪吾存丨之存不足以存存由是觀之則丨未始亡楚未始存也莊田子方未識荆凡定熟存坡渢風中庸之聲帆或作帆通作帆雲帆張丨丨馬融傳繡帆劉濬曰舫百棹皆丨丨青簾多載妓女詳舫錦帆隋煬帝以丨為丨布帆顧長康作殷州佐請假還東苦求丨丨至破冡洲遭風幾敗作箋與殷云行人安穩丨丨無恙也􅣜帆丨背有骨如扇乘風而行名丨丨其衆如牌􅀢亦名􅀢牌番禺雜記上胡遘切作蟹赤壁帆周瑜於丨丨中江舉丨餘舟以次而進鑑活套風丨蒲丨征丨挂丨孤丨半丨片丨楚丨帆馬疾步嵌丘銜切丨岩山險貌韻府羣玉卷八
