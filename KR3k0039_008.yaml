body:
  text: 韻府羣玉卷八元陰徑弦陰復春編下平聲十一尤與侯幽同用尤羽求切説文異也過也語言寡丨為政不丨人效尤鄭伯丨丨亦將有咎莊尤而丨之左拔尤東都信多才十朝取一人焉丨其丨暮取一人焉丨其丨韓大尤懼為丨丨左蚩尤丨丨神農臣始起九治作鎧戟戈矛韻會一三黃帝臣獸身人語後叛大戰于涿鹿殺之今畫其形於旗上名丨丨旗又彗星亦名丨丨旗姑尤聊攝以東丨丨以西其為人也多矣昭二十丨丨齊界一水名石尤戴叔倫贈裴明州知君未得去慚愧丨丨風容齋隨筆打頭逆風也唐人多用之殊尤丨丨之境柳物有尤夫有尤丨足以移人左活套悔丨愆丨譴丨人名嚴丨王莾時人諫伐胸奴獻三䇿姓氏吳興徴音或曰丨遊同稱或曰石姓誤傳為丨或曰丨起於仇丨仇皆怨之義俱無所據閩人避王審知諱故沈姓去水為丨者趙宋江東寧國多有諸丨仕宦有至翰林尚書八座疣説文贅也皮上結肉或作疣揚子吾以黃帝堯舜為疣贅懸疣彼以生為附贅丨丨以死為決疣潰癰莊大宗師疣胡亂反瘡疣隨事生丨丨韓規矩為丨丨谷決疣我有一言能丨丨坡千疣頸附丨丨詳茄郵説文境上行書舍從邑垂垂邊也一曰丨之言遇使所過也詩是曰既醉不知其丨注過也義與尤同置郵丨丨傳命馬傳曰丨步傳曰丨孟子日月行丨丨黃督郵主諸縣罰負郵殿糾攝之韻會州主簿郡丨丨並今録事參軍百帖陶淵明不折腰郡丨丨詳采桓溫主簿善别酒好者曰青州從事惡者曰平原丨丨平原有鬲縣言至鬲上住也世説詳州識丨丨馬許馬星郵丨丨無壅粹大水記白郵相思自成韻不必寄丨丨坡殿郵殿最亦曰丨丨郵最也韻會致書郵殷浩投人所寄書於水曰殷洪喬不能為人作丨丨丨詳書地理高丨宋改名杜丨白起被誅處訧説文罪也從言尤聲憂於求切説文愁也本作憂從心頁聲􅡣心形於顔靣故從真又頁首也心􅡣則髮白樂以忘丨必有近丨孟丨民之丨載以天下為已丨舟君子有終身之丨詩我心則丨馳如有隱丨柏左內寧外丨癙憂丨丨以癢正月病也離憂歌舞寬丨丨李百憂丨丨感其心歐買憂胡為好奇者無事自丨丨孟生憂晉范宣子言談未嘗及老莊客問人丨與丨俱生此何出宣子曰出莊子至樂篇客曰君言不讀老莊何由識此曰丨時嘗一覽也史杞國憂丨丨有丨天地崩墜詳墜漆室憂魯丨丨邑女丨魯君老太子幼鄰婦曰此大夫之憂也女曰魯有患婦女安所避乎詳葵與魯監門女中夜涕泣憂衛世子不肖事同千歲憂人生不滿百長懷丨丨丨選壯士憂萱草兒女花不解丨丨丨孟書消憂樂琴丨以丨丨陶詞酒消憂甘泉道中有蟲口齒悉具東方朔曰此古秦獄地積憂所致積憂者得酒即解取蟲置丨中即丨述異記何以解憂惟有杜康曹操傳愛生憂佛言人從丨丨丨從憂生怖若忍於愛何憂何怖四十二章經草木忘丨萱草也優詩布政丨丨南既丨既渥信山語孟公綽為趙魏老則丨漢明帝贊𢎞人之度未丨俳優東方朔枚臯好詼諧上以丨丨畜之孔子戮丨丨朱儒家語倡優楚之鐵劒利而丨丨拙詳拙伶優伎窮老丨丨坡狎優宋華弱與樂轡少相丨長相丨又相謗也也擾調戲左襄伊優後趙一傳丨丨北堂上曲媚骯髒倚門邊亢直言佞者親直者棄秦優肯為雨立求丨丨也丨人丨旃詳郎學優丨而丨則仕仕而優則丨語十八活套德業丨禮數丨耰摩田器語丨而不輟韓未得歸鋤丨熟耰豫深耕而丨丨之其木繁以滋詳養借父耰丨丨丨鋤慮有德色賈䇿寸田耰丨丨自可丨坡麀牝鹿孟丨鹿攸伏禮父子聚丨留力求切説文止也從田行亞聲又駐也孟為王丨目留因丨固丨高祖漢高帝紀形留神往丨丨選苛留王莾令吏民出入持布錢以别符傳不持者厨傳勿舍關津丨丨而問是何人停留之周留丨丨水牛也廣志封留張良丨丨侯本馬留説法丨丨為察訪詳關候也又京師以雜物布地遣沐猴認得之即曰道著也丨丨倦遊録亦以喻舉子扶留東風丨丨左吳都賦注草名本草云藤名柔滑甘美賈胡留甘作丨丨丨詳胡任去留委心丨丨丨陶詞十日留牽挽當為丨丨丨坡頃刻留且得丨丨丨荆公五不留李泌曰臣有丨丨可丨遇陛下大早任臣太重寵臣太深臣功太高迹太奇肅宗紀為魚留馮歡應丨有丨丨坡黃栗留丨鸝也詩黃鳥疏江山留蘇子美久失意詩云家在鳯凰城闕下丨丨安用苦相丨又書其旁云丨丨丨人也人留丨丨也詩話挽不留鄧侯丨丨丨詳耒留一作耒三起三留唐蔣伸奏對伸丨丨帝丨丨之曰他日不獨留卿矣未幾拜相史活套遲丨淹丨繫丨滯丨挽丨邀丨茶爪丨截髮丨抱靴丨地理陳丨鄭邑名騮赤馬黑毛尾亦作詩騏是中紫騮行人鞭丨丨谷黃騮覔得丨丨被繡鞍善和坊裏取端端詳嶺端端妓名又劉旻與周世宗戰敗旻乘丨丨以金銀飾廄號自在將軍詳廄如意騮德宗馬名丨丨丨詳駿果下騮猶得追間丨丨丨歐呼童羈我丨丨丨荆公漢廄有丨丨馬高三尺駕果樹下乘之故名霍光傳注榴陸機與弟書張騫使塗林安石國得丨故名石榴安榴一云來從海外新羅國名海丨丨一種名寶珠丨若榴丨丨競裂蜀都賦丨丨石榴也廣雅丹榴金滋折丨丨曽子固擘榴回道人丨丨皮題詩詳貧山石榴鄭蜀名丨丨丨坡詩注十月榴炎州氣序異丨丨丨始華劉後村草木榴花衡州法華寺丨春秋皆發酉陽崔元徽見數美人曰李氏陶氏又緋衣少女曰石醋詳幡吟詠誰家巧婦殘針線一拶生紅尉不開王禹稱濃緑萬枝紅一點動人春色不須多荆公在翰苑石丨止一花一朵佳人玉叉上祗凝燒却翠雲鬟杜牧石丨半吐紅巾蹙坡詞榴實取丨汁停杯中數日成美酒扶南傳齊安德王延宗納妃母薦二丨於帝魏收曰丨多子欲王子孫衆多帝大喜北史張載賦云紫房獨熟頳自圻鏐金之美者書厥貢丨鐵遛逗丨飂高風流説文水行也孟同丨合汙天地同丨四海橫丨語惡居下丨書惟受責俾如丨泰誓安流若比君心是丨丨樂天細流河海不擇丨丨逐客書倒流詞源丨丨三峽水乘流丨丨遇坎還止坡詞臨流丨清丨而賦詩去來詞九流谷梁序丨丨分而微言隱農儒道陰陽法名墨縱橫雜素流顔師古拜祕書監抑丨丨先貴勢風流王儉云丨丨宰相惟有謝安勝流尚有西齊接丨丨坡條流詔裴度丨丨聞奏松窗雜録承流縣令所使丨丨宣化也董策樛流望崑崙以丨丨揚雄傳上音鳩猶周流也民流政散丨丨詩桑柔玉虹流水作丨丨丨坡萬里流濯足丨丨丨選千文流我有一寸鈎欲釣丨丨丨韓翠欲流山染衣巾丨丨丨荆公金石流大旱丨丨丨土山焦莊第一流晉桓溫問劉真長惔曰會稽王談更進邪劉曰極進然是丨二流中人桓曰丨丨丨是誰曰正在我輩世説詩之流賦者古丨丨丨班西都賦序銀一流丨八兩為丨丨後食貨志漱石枕流晉孫楚傳少時謂王濟曰當枕石漱流誤云丨丨丨丨濟曰流非可枕石非可漱楚曰枕流欲洗其耳丨丨欲礪其齒本投鞭斷流苻堅曰丨丨於江足以丨其丨詳江飲犢上流許由洗耳水濱巢父牽犢欲丨曰子茍求名譽汙吾丨口牽丨丨而飲之詳犢投士濁流朱全忠朝士三十餘人盡殺之於白馬驛投尸於河曰此輩常自謂清流宜投之濁流鑑勇退急流趙宋錢若水謁陳搏搏曰當作神仙有紫閣老僧曰不然他日富貴時但能急流中丨丨爾玉瓉黃流瑟彼丨丨丨丨在中鬯圭為柄金為勺以飾流照酒黃故曰黃流急流不流丨丨水上丨丨谷寂住閣溪水西流僧一行通大衍算法聞天臺國清寺僧術精往求之至寺竊於門間窺之見僧布算曰當有弟子求吾術須門前水西流乃至一行趨出請教僧視丨丨舊東流忽丨丨遂授其術松窗雜録競注不流肇法師物不遷論旋嵐偃嶽而常靜江可丨丨而丨丨如急流水望如活靜流急不見非是無流楞嚴常出山生隨意急流水上不流黃活套碧丨清丨中丨東丨周丨丨力丨星丨璧丨説如瀏水清貌鶹梟也又鵂丨名角鴟又名訓猴訓狐亦名夜遊女凶者輒鳴於屋莊鴟鵂夜撮蚤察毫末晝出瞑目不見丘山互見梟旒説文垂玉也冕飾禮五冕圖衮冕王十二丨上公九丨鷩冕王九丨三公八丨侯伯七丨毳冕王七丨孤卿六丨子男五丨希冕王五丨大夫及諸侯之孤各四丨玄冕王三丨互見就勻陸佃云王五冕皆十二丨珠旒晚登玉墀侍丨丨歐公前旒聖主冕而丨丨家語綴旒為下國丨丨長發風旒參旗偃丨丨谷珊瑚旒魏明帝冕旒改用丨丨珠三國志活套冕丨宸丨凝丨璪丨垂丨瘤肉起病趙王倫目下丨事詳怪宿瘤丨丨採桑詳桑楠瘤杉贅丨丨詳贅人瘤北齊徐之才有以骨為刀把者之才曰此丨丨也問之曰古冡見髑髏額骨有文理故用之史割瘤宋朱齡石舅頭有大瘤齡石同其眠密丨之立死史如龜瘤梁侯景左足上肉瘤狀丨丨戰應剋捷丨隱起分明如不勝瘤低及王僧辨至石頭瘤隱陷肉中史劉説文殺也書一人執丨顧命丨斧屬虔劉丨丨我邊垂左劉殺也貙劉立秋肆兵習戰陳之儀名丨丨后禮儀志嘗新始殺食曰貙膢天子入圃射牲祭廣曰貙丨祭祀志劉一音危朱切古者貙膢漢曰丨丨貙虎屬以立秋日祭獸王者亦以此日獵獸祭廟也膢劉皆祭名劉又取殺之義也毗劉捋采其劉詩桑柔桑葉稀踈日丨丨遏劉勝殷丨丨詩丨止也丨殺也炎劉丨丨之未奮孟序赤劉丨丨之九會命岱宗漢光武紀依劉王粲來荆州丨丨表史詳樓安劉丨丨氏者必勃漢紀為劉左袒者丨丨氏漢紀曹劉目短丨丨墻古詩子建公幹也元劉未怕丨丨妨獨步半山詩元微之劉夢得也詳步髯劉劉景文美丨人稱丨丨與東坡倡和坡集三劉劉原父弟貢父及原父之子奉世字仲馮為丨丨劉􅀈字凝之號西澗先生子恕字道原恕子羲仲亦為丨丨服劉晉趙王倫篡位殿上有異鳥不知名有素衣小兒言是丨丨鳥明旦失人鳥所在倫目上有瘤時以為妖史詩篇公丨召康公戒成王也正大雅姓氏彭城宫音陶唐氏之後受封於劉裔孫劉纍事夏孔甲在夏為御龍氏商為豕韋氏周為唐杜氏杜伯子隰叔奔晉為土氏孫士會適秦後奔晉處者為劉氏煓周大夫食采於丨亦為丨氏士會之後徙豐沛至豐公生煓生漢高祖丨纍丨丨學耰龍於豢龍氏昭二十九丨敬初姓婁勸高帝都關中賜姓劉號奉春君丨向字子政本名更生擢諫大夫校天祿閣丨歆字子駿與父向領校祕書王莾篡位歆為國師丨寬仕後漢蒲鞭事詳海內稱為長者字文饒丨寵字榮祖太守一錢詳錢丨昆字桓公風滅火事詳火虎渡河事詳虎丨毅稱上漢德論安帝拜議郎丨表字景升少號八俊丨宏字終嘏兄弟三人號洛中三嘏詳嘏丨牢之字道堅為謝元將攻苻堅百戰百勝號北府兵丨暾字長升為左丞正色立朝三臺清肅丨宏字和季劉公一紙書詳書丨琨字越石枕戈待旦志梟北虜詳奏胡笳走賦詳笳丨輿字慶孫稱越府長材詳材丨毅字希樂一擲百萬為司𨽻校尉守令望風投印綬丨殷字長盛事曾祖母王氏孝盛冬生堇丨伶字伯倫荷鍤自隨詳鍤著酒德頌丨瑀字茂琳一蹙自造青雲何至與駑馬爭路詳遲丨堪字宏仁為侍中宋文帝曰四賢同管喉舌丨穆之字道和性敏捷旦至日中答書百函詳函丨孝綽小字阿士七歲屬文號神童齊人丨孝標名峻博極羣書號書淫丨紆字彥度與兄敲卜築鍾山劉孝標曰紆超超越俗如半天朱霞敲矯矯出塵如雲中白鶴丨元明作縣令曰食一升飯莫飲酒詳飯丨延明郭瑀曰吾欲覔一快壻遂以女妻延明詳席丨蕡字去華直言對䇿不第詳第丨叉作冰枉雪車詩詳車丨晏字士安八歲獻頌號神童漕運如神馬上鞭算丨禹錫字夢得登博學宏詞科作玄都觀桃詩詳桃丨餗字鼎卿父子三人更涖史官著史例