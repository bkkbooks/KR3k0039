body:
  text: 韻府羣玉卷十一元陰勁弦隂復春編上聲十五潸潸壬版切淚下貌綰烏扱切説文惡也一曰絳也緭也繫也秋蛇綰字字若綰丨丨羲之傳墨綬綰紐金章綰丨北山文人名漢武帝竇趙丨衛丨腸紀嬰好儒術推轂漢人旡他丨版布綰切説文判也从片反木片拍丨圖注以丨為之今户籍謂户丨或作板板事見拍槧版丨丨長三尺即牘牒也同名編版李翰屯田紀績頌丨丨之民三耗其一負板式丨丨者語户口板籍縮板丨丨以載綿詩索丨其築丨金鈑丨丨六弢莊子詳弢鈑與板同假版謹奉還所丨左丞相諮祭酒丨晉華譚傳丨丨未通班黄凡王封拜謂之板官選陸機表注陳有板咨議㕘軍板長史之類丨丨班品之卑者官志擲板逢萌初為亭長時尉過萌迎拜既而丨丨嘆曰大丈夫安能為役遂之長也學焉投板范滂丨丨棄官笏也露板齊明帝曰上馬能擊賊下馬作丨丨㫿傳修期耳北史歌板低昂赴節隨丨丨坡記事板宋朝張文定公知開封府舊為尹者皆置板丨丨公不用黙記數百人以次決遣吏民以為神墓誌答五板桓𤣥并西夏領荆江二州二府一國於時五處賀雪五板俱入𤣥即丨板後皆燦然成章世説龜茲板邢和璞善心筭房琯筭終身之丨事邢言病起於魚飱木材用丨丨後悉驗雜俎相手板宋庾道愍精丨丨丨山陽王休祐屢以言語忤意道愍丨其丨丨曰此乃甚貴然使人多愆忤史倒執手板桓温將移晉室呼謝安王坦之欲於座害之既見坦之汗流沾衣丨丨丨丨安從容就席謂温曰安聞天下有道守在四夷明公何須壁後置人耶温笑曰正自不能不爾晉書本傳拄頰手板王徽之丨丨看山事詳頰黄門手板齊恩倖棊母珍之在西州有相手板者云當貴毎以此言動帝瑜之又丨丨即帝問西州丨丨何在珍之曰此是丨丨丨丨官何須問帝笑史封侯白版丨丨者衆印不供至有丨丨者僉載誤觸響板蔡確傳有侍兒名琵琶公毎叩響板鸚鵡輒傳呼其名又詳鵡索金以板晉隗炤善易臨終書板遺妻子曰後五年有詔使來姓龔頁吾金以板丨之詳金灌城三板智伯攻圉晉陽而丨之丨不没者丨丨沉竈産蛙民旡叛意鑑花𤓰榖板宋京師七夕以小板傳土種粟生苗復置小茅屋花木作村落之態謂之穀板又以𤓰雕刻成花謂之丨丨夢華録禪板龍牙師問翠㣲如何是祖師意翠㣲曰與過丨丨來翠㣲接得便打詳蒲團檐板更往参尋莫丨丨山谷送吕上座參玉板東坡嘗邀劉器之丨丨丨師謂笱也詳筍活套民丨仕丨牙丨詩篇丨凡伯刺厲王也變大雅赧奴版切説文面慙而赤也从赤聲孟丨丨然活套愧丨戁説文敬也从心難聲又悚懼也詩不丨不悚僩下赧切武貎詩瑟兮丨兮荀陋者俄且丨注丨猛也韓詩解摘了瑟丨撊忿貎左丨然授兵登陴睅合叛切説文大目也左丨其日注出目也晥明貎詩牛丨彼牽記華而丨丨又鮮好貌詩晛黄鳥莞小笑貌語丨爾而笑矕母板切目丨丨也又視貌韓親戚競覘丨又山名馬融廣成頌右丨三塗撰雛切孟自丨其法度之言桞文謹丨平淮夷一篇或作篹前藝文志輯而論篹度撰盛丨丨張知白神道碑石中立急問曰是誰撰盛卒對曰是丨丨滿堂大笑湘山野錄詞人撰丨丨解丨清河頌兵馬行産所簡切説文生也从生彦省聲漢祖紀不事生丨孟恒丨恒心異産今乘丨丨僖十五屈産丨丨之乘詳璧十家産露臺百金中人丨丨之丨詳臺百家産徒干五諸侯不置丨丨丨李萬金産指相賀言此是丨丨丨韓罵畜産後劉寛嘗遣蒼頭市酒良久大醉而還客不堪丨曰丨丨寛遣人視奴疑必自殺曰此人也丨曰丨丨辱孰甚焉史恣人破産盧坦為河南尉時杜黄裳為尹召坦曰某家子與惡人遊破産合察之坦曰凡居官亷雖大臣无厚蓄其能積財者必剥下以致之如子孫善守是天富不道之家不如丨其不道以歸於人黄裳驚其言人名鄭子丨賢大夫吕丨呂后族嵼選連岡岩以蹇丨山屈曲貌滻水在京兆入韓使我耕㶚丨限胡簡切杜且盡樽前有丨杯酒限陶侃飲丨有定丨常懽有餘而限已竭或勸少進曰曾有丨矣亡親見約故不敢踰夲鐡門限隋僧智永善書人求題頭門限穿穴乃以鉄葉裹之號丨丨丨文房四譜都人踏破丨丨丨坡又人無百年期强作千年調鑄丨作丨丨鬼見拍掌笑古詩過户限謝安破符堅喜甚丨丨丨不覺屐齒之折詳屐及棊居户限宋劉瑀曰仕宧不出當入不入當出安能長丨丨丨上南史本傳南北限魏文帝伐呉見波濤洶湧曰嗟乎此天以長江限丨丨也本詳注一水限隋文帝曰豈可限丨衣帶丨不拯之乎本簡古限切説文牒也从竹間聲詩降福丨丨書臨下以丨語居敬行丨太丨狂丨易易丨之理得國語大禮必丨青簡火炙簡令汗出取易書謂之汗簡吳祐傳注汗簡見上白簡傅𤣥性急毎有奏劾或值日暮棒丨丨坐以待旦悚踊不寐臺閣生風晉本傳又云丨丨簡畧狀也南史任昉傳注霜簡御史出持丨丨入奏天闕粹李嶠疏金簡禹發丨丨玉字吳越春秋言通水之理蠧簡古漆丨丨坡折簡晉王凌面縳水次曰卿直丨丨召我我何敢不至而乃引君來乎司馬宣王曰以卿非丨丨可呼故也魏畧李宻非丨丨所能致擲簡揺毫丨丨自不供頃刻靑紅浮海蜃韓迪簡丨丨在王庭書簡大也茍簡安於丨丨唐禮樂志梁園授簡丨王兎丨雪下丨丨於司馬曰抽子秘思為寡人賦之南史執簡太史書崔杼弑齊君崔子殺之云云丨丨聞太史盡死丨丨以往詳史陰功授簡漢何比干有老姥年百八十餘之避雨雨甚而衣不濕比干延入乃曰君先有丨丨今天賜之䇿如簡長九寸丨之曰子孫佩者富貴言訖不見幽明錄無恤袖簡趙簡子長子曰伯魯幼曰丨丨書訓戒之詞以授二子三年而問之伯魯不能舉辭簡已失問無䘏誦其辭甚習求其簡出丨中於是以之為後鑑吳恢竹簡後丨祐父丨為南海大守祐年十二恢欲殺青丨丨以冩書祐曰大人逺任海濱其俗多珍怪此書若成即載之羔兩為國家所疑恢竒之人名蘇丨丨即蘇小也詳小孟丨盧仝謝孟諫議茶歌山丨習池事詳地韓丨晉使韓簡視師姓氏范陽宮音明左傳晉大夫狐鞫居食采續邑因號續丨伯漢有丨卿尚書學丨雍蜀人字憲和為從事中郎常為談客往來使命拜為昭徳將軍諌先主罪有釀具者詳具柬説文分别之也又選也釋也通作簡書簡厥修記簡不帥教者韓粹美無可丨坡詗丨盡寒枝不肯棲棧仕限切閣木為路事見諫韻輚卧車通作棧詩有丨之車僝説文其也本作僝从人孨聲今作丨書方鴰丨功剗初限切杜意欲鐘叠嶂韓贈張籍文草紹編丨韓勿丨勿敗韓愈賛丨偽以真李丨却君山好僧削髪為丨草通作鏟丳燔肉器韓如以肉貫丨眼五限切説文目也从目艮聲天眼與丨作丨行光明盧月蝕海眼石笋之下是丨丨泉從石中出成都記漆眼晉杜乂王羲之日之曰膚如凝脂眼如㸃丨神仙人也青眼阮籍字嗣宗能為丨白丨見禮俗之士以白眼對之哭藉母䘮稽喜弔之藉不見白眼喜不悦而退肉眼鄭光業狀元及第有人謝曰當時不識貴人凡夫丨丨戎眼丨丨何曽眩落坡謂王丨嵬眼瑶翻碧瀲丨丨耳韓宗師墓誌換眼陶榖少時夢數吏云奉符丨丨吏求錢十萬安第一眼榖不應又云錢五萬安苐二眼復不答吏曰止安第三眼即以二丸納入眼中既覺眼深碧後相者曰好貴人骨氣奈一雙鬼眼何必不至大位乗異記五眼髙昂曰吾四子皆丨丨詳上符生無一目父健以識言三羊丨丨應符立為太子晉載記互見淚反眼丨丨若不相識詳石獨眼李克用一目𦕈故名丨丨龍詳龍蟹眼丨丨已過魚眼生颼欲作松風鳴坡茶詩一鼎水煎紅丨丨崔珏茶詩鴝眼端硯有丨鵒丨黄白相間黳眼在内謂之沽眼四旁浸漬不甚睛明謂之淚眼形體畧具内外皆白謂之死眼東坡笔録鵝眼梁末有丨丨錢千里眼後魏楊逸為光州刺史廣設耳目善惡畢聞咸曰楊使君有丨丨丨史百姓眼謂民目眠字也詳獨眡館事石稜眼桓温眼如紫丨丨詳似讀書眼丨丨丨如月罅隙不照坡謝方眼梁謝善勛工書醉輒張目大罵號丨丨丨史㸃龍眼金陵二畫龍丨一丨丨須臾龍破壁上天不㸃眼者在詳中鶴眼秘書省有落星石薛少保畫鶴賀監草書䘏餘令畫鳯元和中韓公武為秘書郎挾弹丨丨一丨時謂五絶職林禽偷眼霜丨欲下先丨丨林逋酒滿眼為君沽丨丨丨酤杜滿眼酤酒器也天無眼五代漢蔡王信髙祖從弟曰吾嘗謂丨丨丨主上孤立幾落賊手史不掛眼余老嗜讀書餘事丨丨丨坡傳神在眼顧虎頭云丨丨冩影都丨阿堵中東坡傳神記謂眼也渾身是眼朱貞曰嘗謁貴人不禮題格子屏風曰道格何曾格言糊又不糊丨丨摠丨丨還是識人無談苑抉子胥眼吳殺伍子胥將死曰丨吾眼置吳東門觀越兵之入刺瞎人眼隋魚賛事詳瞎慧眼梁江紑父舊患眼紑夢僧云飲丨丨水必差蒨乃舍宅為寺乞賜嘉名武帝以丨丨為名乃修故井取水洗眼煮藥逆差史碧眼達摩眼紺青色稱丨丨胡僧髙僧傳隻眼須具兩丨丨照破兩頭事莫只常帶一丨丨向一邊行百丈語録通身眼丨丨是丨通身手詳手三隻眼埋没蓬蒿丨丨丨谷波若眼晉沙門罍瞿持一錫杖曰此是丨丨丨奉之可以得道人或藏其杖大哭閉目須臾起而取之人竒其神史趙州眼凌行婆問浮杯和尚盡力道不得底句還吩咐阿誰和尚云浮杯無剰語婆云某不恁地道師問婆婆斂手哭云蒼天中間更有寃苦師無語婆云語不知偏正理不知倒邪即禍生也後有僧舉似與南泉云云婆哭云可悲可痛後又舉似與趙州趙州云我若見這臭老婆問教口啞却婆聞云趙州自合喫婆手裏棒後趙州哭云可悲可痛婆聞合掌嘆云丨丨丨放光明明照天下傳石頭㸃眼長髭禅師参丨丨云嶺頭一尊功徳成就也未師曰成就久矣只欠丨丨丨丨曰莫要丨丨麽曰便請石頭乃翹一足師禮拜云云曰某甲所見如洪爐上一㸃雪𫝊灯看經遮眼僧問藥山為什麽丨丨師曰我只圖丨丨傳灯燭薫兩眼北齊祖埏徙光州張奉禮希意以丨丨丨丨失明後主時拜左僕射與陸媪連結兩眼不見物而勢傾朝野史草木龍丨子果名云茘枝過則熟故號茘枝奴一名龍目左思賦旁挺尨目側生茘枝云云山谷辯云太冲自言十年作三都賦皆賁土物之貢至如尨目亦不知其失盖尨目惟越有之吟咏龍丨與茘枝異出同祖父端如柑與橘未易相可否云云生疑星隕空又恐珠還浦圖經未嘗説玉食逺莫數坡左思賦詠名初出王局揄揚論豈頗劉彦沖琖阻限切亦作盞又作􅊦侍玉盞地一破則不冘詳地韓使立盤丨夏琖丨曰丨殷曰斚周曰爵韻㑹紫金琖牡丹詩有國色朝酣酒天香夜染衣句明皇謂妃子曰粧臺前飲一丨丨丨酒則此詩可見矣松窻雜錄上元燈盞丨丨盗富家丨丨置床下令人有子本草醆阻限切説文酒濁而凊清蛊齊也記醴丨在户十六銑與獮同用銑蘇典切金之澤者曰丨曰弓金史謂丨又鐘口兩角丨毨説文選也仲秋鳥獸毛娀可選取以為器从毛先聲書注丨理也毛更生整理也洗説文洒足也从水先聲又潔也又丨丨律名易以易丨心一音在此姑洗季春律中丨丨月令洗㓗也言修㓗方物揮洗扳足丨丨揖酈生之説漢祖叙傳輟洗酈食其謁沛公方踞床使兩女子洗生長揖不拜曰不宜倨見長者乃丨丨謝之本兩女洗見上跣説文足親地也从足先聲䘮則徒跣祭則不丨主恭也燕有丨主歡也徒跣蕭何下廷尉赥出丨丨入謝本鄧通丨丨謝申屠嘉本王羆露髻丨丨擊賊詳捧袒跣丨丨不肯成梟盧杜謝遏跣丨丨夏月仰卧謝公卒來丨出屋外方躡履問訊公曰汝可謂前倨後恭一靴一跣藍采和丨脚丨丨脚丨舞拍扳踏歌續仙傳互見歌腆他典切説文設膳丨丨多也从肉典聲又厚也