body:
  text: 韻府羣玉卷三元隂勁弦隂復春編上平聲七虞虞元俱切說文騶丨也从虍吳聲書儆戒無丨禹謨四方無丨畢命孟有不丨之譽離婁易備戒不丨革左我無爾丨於假道丨軒虞道光丨丨緯文八虞文王詢于丨丨國語周丨士皆為丨官也山虞丨丨掌山林之政令獸人令禽于虞中之謂令得禽者置虞人所立虞旗中澤虞掌國澤政令者禮招虞丨丨人以旌孟萬章驩虞丨丨如也孟憂虞悔吝者丨丨之象也易師虞出入自爾丨丨書君陳丨衆也謂反覆從爾丨度也騶虞似虎白質黒文尾長於身不踐生芻不食生物日行千永平里君有至信之徳則見仁如丨丨詩宋元嘉及前蜀間皆見白帖武生克殷後㪚軍左射貍首右射丨丨貫革之射息也禮活套艱丨疎丨姚丨歌丨詩篇騶丨鵲巢之應也人名叔丨成王封充丨孟子弟子摰丨我非皇甫謐門人如摰丨姓氏陳留角音商舜國號虞子均封虞因氏丨閱父為周陶正賴其利器用也左丨卿躡蹻擔簦說趙一見賜黄金百鎰白璧一雙再見為趙上卿史記著書八篇丨翊字升卿為朝歌長見盤根鉗節事詳根為武都太守増竈破羌詳竈丨延後漢人初生有物若匹綀升天及長腰帶十圍力能扛鼎丨翻吳人字仲翔㑹稽人為侍御史習經於枹鼔之間講論於戎馬之上丨溥晉人字允原篤志典墳謂學之染人甚於丹青丨愿字士恭為晉安太守清亷得見越石詳石丨世基字懋世博學善草隸孔奐曰南金之貴屬在斯人北史丨世南越州人世基弟字伯施文章贍博文行祕書事詳書暗疏列女傳詳傳太宗稱其五絶詳絶丨允趙宋人戰退金主亮劉錡執允文于曰朝廷養兵三十年今日大功乃出儒者我輩愧死矣愚說文戇也語顔子如丨柴也丨古之丨今之丨之上智下丨傳邦無道則丨中庸夫婦之丨詩哲人丨唐王吉民至丨若神莊大智若丨惷愚三赦曰丨丨秋官錢愚丨丨論譏蕭宏貪吝詳神八愚栁子作丨丨詩紀溪石上愚愚溪愚丘愚溝愚水愚池愚亭島及栁子也二愚佛地㫁丨丨百丈語錄西家愚邴原曰君謂僕以鄭為東家丘以僕為丨丨丨夫邪詳􅉌宋人愚得燕石以為大寶詳石一得愚愚者千慮必有丨丨愚溪愚本名冉溪桞子改曰丨丨應同栁州栁聊使丨丨丨坡移山愚太行王屋二山愚公面山居惡而欲移之詳山禺說文禺毋猴屬一曰日在已曰丨中又畨丨地名今廣州縣髃髆前骨鸆鸅丨澤中鳥名似水雞娛說文樂也詩聊可與丨以禮自丨莊鼔瑟足以自丨歡娛相與博塞為丨丨杜康娛竟嵗年以丨丨韓復志細娛翫丨丨賈䇿極娛窮懽丨丨西京賦清讌娛綢繆丨丨丨謝靈運恱耳娛天下无正聲丨丨即為丨樂天活套鐘鼔丨詩酒丨麌牡􅍪澞陵夾水也嵎說文封丨山名在吳楚汪芒之國隅說文陬也从􅊟禺聲詩三星在丨綢繆維徳之丨抑老大方無丨亦作嵎孟虎負嵎三隅舉一隅不以丨丨反語四隅經營丨丨准南四方也海隅至于丨丨益稷坤隅鐃歌曲驛騎馳丨丨桞丘隅止於丨丨大學東隅馮異失之丨丨詳馮西隅日在丨丨選坐隅鵩止丨丨詳鵩鄉隅滿堂飲酒一人丨丨則一堂為之不樂漢刑法志趨隅樞衣丨丨曲禮滿隅五子不丨丨一子丨朝晏子春秋三孱不丨丨黄詩言孱懦之夫雖多曾亦不足充丨一丨也娵隅郝隆作南蠻參軍詩丨丨躍清池此蠻語謂魚也詳語亷隅近文章砥礪丨丨記儒行丨稜也丨角角必有稜也夢曰布被起丨丨坡雪詩觀隅丨室者丨其丨隅之巍然直方則其中必端莊宏䴡栁送杜留後活套城丨邊丨山丨天丨庭丨西南丨芻窗隅切說文芻刈草為也包丨東草之形作蒭非記蹙路馬有誅上執丨注藁也孟丨豢注羊食曰丨犬食曰豢選蘭蕙化為丨丨狗未陳詳狗束芻綢繆丨丨詩負芻沈猶有丨丨之禍孟作亂之人生芻郭林宗母憂徐穉弔之致丨丨一束而去林宗曰此必徐孺子也丨丨一束其人如玉吾无徳以當之飛芻秦欲攻匈奴使天下丨丨輓粟薪芻委人掌斂丨丨地官牧芻求丨與丨而不得孟馬青芻肯訪浣花老翁无為君酤酒滿眼酤與奴白飯丨丨丨杜苾芻善覺要覽僧曰丨丨草名體性柔軟引蔓旁布馨香逺聞不背日光故以喻出家人龍芻穆王東海養八駿處草名丨丨類說人名劉伯丨較天下水以惠山為第一無武夫切說文世數之積也亦作无書懋遷有丨語有若丨我獨丨本之則丨左毋謂秦丨人孟以其所有易其所丨有無太初丨丨無有無名莊秋水希星乍丨丨杜山色丨丨間歐詞虛無揚雄賛老𣆀著丨丨言丨乘丨丨而上假大人賦指㸃丨引路歸杜入無忽出有而丨丨選文無相別贈以丨丨當歸草也古今注識之無白居易生七月能展書指之無字雖試百數不差本傳草色無丨丨遥看近却丨韓一事無咸陽客舍丨丨丨杜有酒無借問丨丨丨杜南無丨丨者諸佛世尊各號音聲悲花經無無徳山到溈山直山法堂從西過東從東過西顧視曰丨丨傳錐也無去年無卓錐之地今年丨丨丨詳錐面部三無常侍李寛有盧相士云無子無宅無家金華子活套絶丨儋石丨蕪薉也楊惲傳丨穢不治薼蕪掩以錄蕙被以丨丨相如賦香草似蛇床園蕪田丨將丨陶平蕪懷古視丨丨杜青蕪整屐步丨丨杜春燕雨露洗丨丨杜繁蕪剪其丨丨孝經序范萊蕪釜中生魚丨丨丨詳塵活套荒丨榛丨苔丨寒丨丨巫男曰覡女曰丨春官司丨掌羣丨之政令說卦兊為丨書時謂丨風語不可以作丨毉又山名丨山十二峯傴巫丨丨跛覡巫古者以疾廢人主卜筮祝荀王制神巫鄭有丨丨曰季咸莊焚巫魯大旱公欲丨丨尫臧文仲曰非旱備也僖二十一暴巫大旱魯穆公召縣曰天子而問焉曰吾欲丨丨而奚若則不雨而望之愚婦人不已䟽手檀弓下投巫西門豹丨丨為河伯娶婦事詳婦衡巫南接丨丨文選大巫不謂矜余力還来謁丨丨杜桑田巫晉丨丨丨曰不食新矣左人名易牙姓雍名丨齊人知味姓氏平陽商音風俗通云氏於事者巫下陶匠是也丨咸伊陟賛於巫咸作咸又四篇巫咸又王家書丨賢殷人書丨捷漢翼州刺史丨扱趙宋樞參毋止也語子丨意丨必記丨茍得丨茍免丨雷同書帝曰丨誣說文加也从言巫聲語焉可丨也滕文下邪說丨民左亦又近丨莊非愚則丨矯誣丨丨上天書活套夸丨厚丨䍢無罟也于羽俱切說文於也莊於丨以蓋衆天地夸延也易于邾婁考公之喪徐君使容居耒吊含曰寡君使容居坐含有司曰諸侯之耒辱敝邑丨則丨丨則于丨丨雜者未之有也記檀弓含不便賤者君行則親含徐僣稱王自比天子丨謂臣禮子謂君禮雜者居以臣欲行君禮也丨以䜴反錞于形如鐘以和鼓字作釪亦作于也有自蜀得此莫識斛斯微曰此丨丨周禮注芒筒振之聲極清衆乃嘆服職官分記諸于獨衣絳縁丨丨元后傳大掖衣今袿衣之類軒于庵閭丨丨相如賦蕕草臭草也蔓于亦蕕草也爾雅單于匈奴號象夫丨丨然廣大也益又丨丨曲秋風捲入小丨丨李甫詩友于丨丨兄弟語山鳥山花吾丨丨杜于蒍于唐元徳秀𤣥宗命二百里内縣令刺史以聲樂集徳秀惟樂工十人聨袂歌丨丨丨帝異之曰賢人之言也木于則于易則易丨丨丨見前易于来于于于于然而丨韓工宰相書覺于于其卧徐徐其丨丨丨莊帝玉篇寐安之狀覺音覈人名何易丨唐人為縣令挽船事詳船董安丨性緩佩弦詳佩姓氏河内羽音周武王第二子邘叔後以國為氏國丨定國字曼情東海郯人父于公髙門詳車定為廷尉天下無寃民詳寃為丞相封平西侯丨禁魏人字文則太祖曰雖古名將何必加之丨謹字思敬耆年碩徳位至三公平梁作平梁歌十首歌之丨栗碑武藝過人劉裕號曰黒矟公丨勁字鍾葵自粟碑至勁數世貴盛一皇后四贈公三領軍二尚書令三開國公丨字允元後周太師與戴符買山錢百萬丨公異朱泚平為李晟作露布曰臣肅清宮禁祗奉園陵鍾簴不移廟貌如故徳宗咨嘆覆姓鮮丨子姓殷後周封箕子於朝鮮支子伸食采於于因氏鮮丨世榮漁陽人立忠節北史鮮丨侁趙宋人字子駿閬州人為東京轉使務寛大司馬光曰福星也安得百子駿布之天下乎淳丨棼夢南柯大守事詳柯淳丨髠齊人善滑稽滅燭留髠詳燭鵠飛獻空籠詳籠豚蹄祝田詳蹄杅浴器荀丨圓則水圓丨方則水方竽坡我今廢學如寒丨久不吹之澁欲無盂說文飲器也坡一勺清泉滿石丨覆盂四海安於丨丨滑稽傳右盂宋公為丨丨鄭伯為左盂襄十年田獵陣各楚之制将獵張兩甄置左右司馬兩甄猶言兩翼左傳注唾盂醉後哀歌擊丨丨坡詳盂刻盤盂丨丨丨銘几杖文中子孔甲所作字體謂盤盂丨銘黄帝史漢田蚡學盤盂諸書玉盤盂芍藥花員如覆盂下餘葉如盤盛之名丨丨丨詳藥水一盂龎參為太守郡人任棠以薤一本丨丨丨置戸下參曰丨欲吾清也詳薤酒一盂禳田者持一豚蹄丨丨丨曰五榖皆熟所待者狭所欲者奢詳蹄羽化杯盂栁公權貯杯盂一笥緘識如故而器皆亡笑曰丨丨矣詳杯鉢盂戲取江河入丨丨坡詩釪錞丨樂詳于竽說文管三十六簧从竹于聲笙大者曰丨小者曰和記仲夏樂師調丨月令選萬籟真笙丨看與笙韻通齊王好竽丨宣丨丨丨必三百人丨吹南郭先生不竽者而之三百人之中以吹竽食祿宣丨薨後王曰寡人丨丨欲一一吹之南郭乃逃韓子好竽鼔瑟詳瑟商丘吹竽丨丨子好丨丨牧豬七十不娶詳猪玗似玉爾雅東方之美者有醫無閭之珣丨琪焉人名唐元結號猗丨子雩說文夏祭樂于赤帝以祈甘雨从雨于聲左龍見而丨威五阿房賦耒丨何龍大雩命有司丨丨帝習樂也記月令舞雩風乎丨丨語國大旱則師巫丨丨禮司巫呼雩童男女名八人舞而丨丨穀梁傳邘周國名武王子所封吁况于切說文驚也書帝曰丨詩云何丨矣活套嗟丨戲丨長丨壯士丨後人丨人名州丨衛公子有寵好兵訏大也詩丨謨定命又詭也盱張目兩眼張眶丨韓小人喜恱貌又丨水􅵼商冠也􅀈憂也旴日始出癯其俱切說文少肉也从肉瞿聲亦作臞相如傳形容甚臞坡白髯紅帶老不丨谷更問黄鷄肥與丨子夏癯丨丨入見先王之義則榮之出見富貴之樂又榮之戰於胷中未知勝負故丨今義勝故肥詳肥及戰列仙癯丨丨之儒居山澤間形容甚丨相如傳簞瓢癯或曰囘丨丨丨如之何曰丨丨丨茹亦山睢也何其丨揚修身瞿說文鷹隼視也人名商丨四十方有五子許夫趙丨服松脂得仙姓氏松陽徴音兒河東裴桃娶蒼梧丨寳女丨莊傳陵人為晉叅軍丨童桃源萬壽宮瞿童升天見有入跡壇衢爾雅四達謂之丨茍揚朱哭丨塗天衢何丨之丨易康衢丨丨童謡莊讓王亨衢丨丨照紫泥杜髙衢步先哲之丨丨閑居賦九衢歸騎紛紛滿丨丨樂天六衢丨丨商賈事也太𤣥經三衢衢州以州西丨丨山為名活套雲丨通丨脩丨花丨紫丨堯丨交丨栁丨人名唐丨世稱善哭詳哭劬勤也勞也詩生我丨勞朐說文脯脡也从月句聲申曰脡曲曰丨曲禮左丨右未注屈中曰丨又臨丨齊郡山名鸜丨鵒鳥詳鵒句須丨地名躣行貌絇屨頭繩也記玉藻童子不屨丨戵㦸屬軥車軶兩邊左射兩丨而還鼩說文精丨鼠名从鼠句聲方朔傳鼱丨之襲狗􅨎羽曲也儒人朱切說文柔也衛士之稱記丨有席上之珍語君子丨小人丨揚君子通天地人曰丨書序秦坑丨聖儒其人丨丨史倉公傳鴻儒後儒林傳醇儒賈山傳臞儒詳丨俗儒丨丨不達時宜前漢腐儒丨丨敗乃公事詳印鄙儒若真丨丨叔孫通侏儒藏紇敗於狐駘國人曰侏儒丨丨使我敗於邾襄四注短小也東方朔曰丨丨長三尺奉一囊粟臣朔長九尺亦一囊粟詳粟陽城為道州刺史州産丨丨歳貢于朝城奏曰州民盡短若以貢不知何者可供自是罷之欂櫨丨丨進學解梲杜也漢儒丨朝之丨惟賈生而已選劉歆書章