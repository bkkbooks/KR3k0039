body:
  text: 韻府羣玉卷六元陰勁弦陰復春編下平聲六麻獨用麻莫霞切説文麻枲也从林从广林人所治也在屋下厂廡厰之形也於其下治麻詩蓻丨如之何制麻凡赦書徳音立后建儲大誅討拜兔三公宰相命將並用白麻不用印㑹要唐翰林志云中書用黄白二麻為綸命其後翰林専掌内命中書所出獨得用黄麻其白麻皆在北院草麻唐韓偓宰相韋貽範還位偓曰腕可斷麻不可丨本黄麻丨丨似六經杜把麻唐通事舍人宣語多不知書宣讀輒失句度故用拾遺團句以助之謂之丨丨六典壞麻唐李甘遷御史曰李注何人得宰相白麻出我必丨之本徳宗欲相裴延齡陽城為諫議曰白麻出我必丨之哭於庭遂不相本傳蓬麻丨生丨中不扶自直荀丨心賴倚丨桞漚麻東門之池可以丨丨詩石勒與李陽爭丨丨池相毆擊詳拳胡麻天台丨丨飯詳源固麻百濟國號王都城曰丨丨詳魯哭麻唐欲用李磎為相劉崇魯沮之及麻出崇魯掠大丨史又見壞丨下雨如麻丨脚丨丨未斷絶杜亂如麻平生悲歡事頭緒丨丨丨谷衣敗麻晉王延母丨以蒲穰丨丨史沸粥紛麻唐獨孤及曰百揆隳刺如丨丨丨丨史兄草弟麻錢惟演拜相從丨希白丨麻金坡遺事閣下生麻鄭珏與李愚同為學士鄭丨丨一麻丨李曰承旨入相矣霜降成實乃白麻也是夜制出拜相紀異貪黷賜麻唐滕王嬰蔣王揮皆丨帝賜諸王綵各五百段敕曰滕叔蔣兄自解經紀不須賜帛與麻二車為錢緡二王大慙出本傳及朝野僉載活套絲丨宣丨詩篇丘中有丨思賢也逐莊王不明賢人放周姓氏上谷商音齊大夫丨嬰之後又丨注論語唐左司郎中丨察太原狀云石趙凉州刺史廣平丨秋之後唐元功臣左金吾大將軍涼國公丨嗣宗賜姓李氏改名延昌蟆説文从虫莫聲皮蝦丨百粤以為上味疥者最佳云不可脫去此錦襖子齊卞彬賦紆青拖紫名為蛤魚世比令僕也沈文通知杭州禁食蝦丨漢靈帝鑄天禄蝦丨吐水轉入宫詳蛙事蛙媚蟆夭丨丨得瞽疾盧月蝕金背蟆㑹見林中丨丨丨簡齋如長慶中中秋夜人見林中匹練乃丨丨蝦丨疑月中者刳妖蟆可丨丨丨癡腸盧决拆癡蟆須臾癡蟆精兩吻自丨丨盧晉恵聞蟆丨丨帝在華林園丨蝦丨鳴曰為官乎為私乎晉本紀車尺遮切説文車輿輪之總名詳見魚韻注又牙車牙所載也牙汗邪滿丨叟蝶鳴鳳車聲而揮丨詳雪車劉叉作氷柱丨丨二詩見韓愈出盧仝孟郊右韓詩麴車道逄丨丨口流涎杜酒車選張平子南都賦騰丨丨而斟酌注以車載丨書車恵施多方其丨五丨莊天下張華移居載書二十丨天車光景不可囘六龍轉丨丨李河車陰真君金液丹歌北方丨正氣名丨丨一名丨是水取水一斗鐺中以火炎之致聖石九兩其中初成姹女後成紫色名紫丨丨白色曰白丨丨青色曰青丨丨赤色曰赤丨丨亦名黄芽蓋擊又法黄河水逆流運輔車丨丨相依左牙車也兩車老夫不舉酒嚥𠻳鳴丨丨谷釣車醉裏長歌揮丨丨元次山繰車村南村北響丨丨坡水車魏馬鈞初作丨丨灌園翻車魏馬釣作丨丨令童兒轉之以灌圍更出更入巧倍於常史阿香車有人宿道邊一女子家一更聞唤丨丨推丨忽驟雷雨明日視宿處乃一新塚搜神記霹靂車收麥事詳麥羲和車無由反斾丨丨丨韓麻二車唐賜丨丨丨與滕叔蔣兄作錢貫詳麻十牛車文章六經來汗漫丨丨丨谷白牛車法達念法華經三千部問六祖經説二車大牛車丨丨丨如何區别祖曰汝自迷背不如坐却丨丨丨更於門外覔三車傳燈詩篇有女同車刺忽也之不昏於齊無大國助人名李左丨漢人韓信用其䇿破燕姓氏京兆角音漢丞相田千秋以年老詔乘小車出入省中號丨丞相後因氏丨𦙍字武子晉人聚螢照書慱學知名恕坐史中無車公不樂詳樂丁路頭代人評獄寛北禽名鬼丨即車載亦名逆鶬下暝則飛鳴能收人魂氣昔有十首為犬所噬餘九首其一常血滴人家則凶正月七日多度人家捩犬耳滅燭禳之嵗時記蒲子之弋速雙鶬於青雲之際列奢式車切説文張也从大者聲又侈也左驕丨淫泆盧至精至好且不丨紛奢秦愛丨丨阿房賦髙奢盛推雲夢以為丨丨相如傳刺奢蜉蝣丨丨也曹詩蘭奢王導為相只周旋人過一生嘗有坐客二十許人逐一稱讃獨不及一胡僧并台州臨海人二人不悦導徐顧臨海人曰自公之來臨海無復人矣又謂僧曰丨丨丨丨乃胡語之褒譽者於是二人亦悦朱語録世説作丨闍未知奢闍孰是阿奢竇懷貞再娶韋后乳媪王每奏請輒自署皇后丨丨不慙世謂媪壻為丨丨六帖馬融奢方惡丨丨丨栁冨不奢馬周䟽貧不學儉丨丨學丨史繒錦示奢吳甘寜以丨丨維舟或割弃以丨丨也史服廉怪奢王吉世清廉而好車馬衣服鮮明天下丨其丨而丨其丨詳衣持狹欲奢淳于髠曰禳田者操一豚蹄祝曰五穀皆熟欀穰滿家臣見其所丨者丨所丨者丨詳蹄人名伍丨楚人為平王所殺子丨美女趙丨趙將善用兵畬火種田也活套新丨燒丨賖貰買也范至能詩奉丨癡獃千百年詳癡坡無價青山為我丨稚子賖隣人有美酒丨丨夜能丨杜酒須賖如今九日至自覺丨丨丨杜去國賖為農丨丨丨杜向市賖遣人丨丨丨香粳杜詩活套貸丨寛丨一徑丨望眼丨邪以遮切説文琅邪郡名从邑牙聲俗作耶漢時呼韓耶單于來朝汙邪禳田者曰丨丨滿車丨丨下地也見蹄莫邪丨丨為鈍金字本並從金賈誼賦無因附此詳劒琅邪刈丨丨之稻事李百樂七嵗知其詳稻若邪丨丨溪傍採蓮女選綬若若邪牢邪石邪五鹿客邪印何累累丨丨丨丨詳印毗邪爾時丨丨大城中有長者名維摩詰深殖善本維摩經又佛家有丨丨居士釾鏌丨通作邪詳邪枒木名子殻可為器斜褒丨二水名又梁州谷名爺亦作㸙俗謂父曰丨唐駙馬輩呼髙力士為丨杜見丨背面啼盧憑仗添丁莫惱丨通作耶國㸙唐竇懷貞納韋后乳媪為妻世謂媪壻為阿㸙人或謂丨丨軒然不慚史書遮主奢切説文遏也从辵庶聲高帝紀三老丨説邀遮闗吏相丨丨李親戚讙要遮李邀要義同肉陣遮楊國忠選肥婢於前遮風詳風蘇莫遮坊邑相率為渾脫隊駿馬胡服名丨丨丨唐宋務光傳說周遮矍鑠誇身健周遮丨話長樂天又鵲丨丨丨誰能遮脩鱗半已沒去意丨丨丨坡詳嵗蛇兩手遮丨丨莫丨瓶裏雀語録活套藏丨霧幙丨舉扇丨嗟手邪切説文咨也本作从言差聲猝嗟項王意烏丨丨漢紀咄嗟石崇作韭萍虀丨丨可辦詳虀來食嗟茍禄無補報幾成丨丨丨谷賢人嗟嵗在龍蛇丨丨嘆丨詳起末路嗟俄成丨丨丨栁活套含丨稱丨咨丨詩篇猗丨刺魯莊公也以不能防閑其母人名子丨彼留子嗟詩罝説文兎网也从网且聲肅肅罝屢嘆恢恢網頻摇丨丨丨栁八紘罝安得丨丨丨以道獵衆智谷活套觸罘丨詩篇兎丨后妃之化也蛇食遮切説文仓毒蟲虺屬象形云蝮丨黄黒色毒最烈虺形短而扁毒亦甚大者為蟒又莊子蝍蛆甘帶小丨也蜈蚣以氣禁丨抱雄黄辟丨並朴巴蛇吞象山海經夢蛇斯干鬭蛇内蛇與外蛇鬬於鄭南門之外内丨死而鄭厲公入左捕蛇永州之野産異蛇王命嵗賦其二募能丨之者當其租入有蔣氏者専其利三世矣云云視其缶而吾丨尚存則弛然而卧栁文杯蛇樂廣嘗有親客曰前䝉賜酒方欲飲見丨中有丨既飲而疾於時向南㕔壁有角弓畫作蛇廣復置酒曰復有所見否曰如初廣乃告之沉痾頓愈本畫蛇丨丨添足適累其天奧論電蛇丨光時掣紫金丨坡嵗蛇欲知垂盡丨有似赴壑丨脩鱗半已沒去意誰能遮况欲繫其尾雖勤知奈何坡守嵗秋蛇如春蚓丨丨蕭子雲書驚蛇法書苑釋亞棲善草書每云飛鳥入林丨丨入草髯蛇宋虞愿為晉安太守有遺丨丨者放之二十里外蛇夜還牀下復送四十里綬笥蛇後許曼開丨丨有兩赤丨走後為邊將詳笥杜預蛇晉丨丨醉卧嘔吐人竊窺之見一大丨垂頭而吐史母産蛇後竇武丨丨并産一丨送之林間及母卒將窆大蛇自榛莽中出以頭擊柩流血俯仰若哀泣之容有頃去史常山蛇率然者丨丨之丨也擊其首則尾應擊其尾則首至擊其中則首尾俱至孫子兩頭蛇孫叔敖兒時見丨丨丨殺而埋之白母曰間見丨丨丨者必死恐後人見之乃殺而埋之母曰爾有陰徳必有陽報後為楚相列蚿憐蛇丨丨丨曰吾以衆足行而不及子之無足莊蛻殻蛇犖犖确确丨丨丨坡水車漢祖斬蛇後人見一嫗夜哭曰吾子白帝子也化為蛇當道今赤帝子斬之本靜江黄蛇丨丨灘中雷公逐一丨丨人以石投之蛇鏗然有聲乃得一銅劎詳劒袖裏青蛇丨丨丨丨膽氣粗吕詩亦劎也梨中赤蛇李知誥事詳梨松下龜蛇丨丨丨丨緑骨輕坡松根入土千嵗為茯苓如龜蛇石窟大蛇馬援征五溪營壺頭暑甚中病穿岸為室避暑尋卒後丨丨有蛇如百斛大船云援之餘靈史睡蛇佛遺敎經譬如黒蛇在汝室睡當以持戒之鈎早并除之丨丨出可安眠井中蛇賓頭盧説法經云昔人行曠野為象所逐入一丨丨藏井有四毒丨欲螫其身當知此人苦惱不可勝數鉈短矛華户花切榮也輝也華萼之丨音義與花同今雖間附此用者辨之禮樂記英丨發外劉向傳榮丨至今鬱華丨丨之仙與日同居雞跖翠華建丨丨之旗相如上林賦東華不如丨丨軟紅香土坡詩注詳土丨丨門百官出入之門南華莊子為丨丨真人書曰丨丨經九華青陽縣南丨丨山峯巒異狀其數九始號九子山李白號丨丨東坡號李正臣異石曰壺中丨丨葢九峯玲瓏雜録金華黄初平牧羊至丨丨山得道詳羊宣華憶向丨丨夜倚闌范石湖蜀宫名鈆華丨丨不御洛神賦粉也瓊華却將燕石報丨丨坡石華水物有玉珧海月士肉丨丨郭璞注賦皓華肺神丨丨字虚成黄庭髮神曰蒼華鬢華學道無成丨已丨坡舜華顔如丨丨詩木槿也水華荷花名古今注井華兒童汲丨丨杜革華韓愈有下邳侯丨丨傳言牛紛華子夏出見丨丨盛麗而悦入聞夫子之道而樂二者心戰詳肥及戰瓣華上丨丨以交紛張平子西京賦丨音葩文采也才華皇甫湜祭桞子丨丨醖藉咀華含英丨丨韓無華悃愊丨丨宣帝紀萼緑華丨丨丨者九疑山得道女羅郁也顔色絶整晉昇平三年降羊權家真誥吏而華李生豈所謂丨丨丨者耶韓送李判官言其能文又能斷吞日月華丨丨丨丨自有五色流霞入口中真誥男服日象女服月象使人聰明朗徹五臟生華長生不死内景經法華丨丨山樵夫得青蓮掘地視之一童子花自口出是人生誦華嚴經致此勝果因名其山詳山法達念丨丨經六祖曰心迷丨丨轉心悟轉丨丨詳轉優曇華其人甚希有過於丨丨丨疏云鉢名瑞應三千年一現則金輪王出法華經詳曇空中華譬如病目見丨丨丨圓覺經見狂華目睛瞪以發勞則於虛空别丨丨丨楞嚴風法華京師開寶寺僧姓張好酒及法華經號為張法華言語散亂不矜細行又呼丨丨丨坡詩注曹溪南華僧智藥於丨丨上流開山云當有無上法寶來此演法乃六祖丨丨也詳溪活套菖丨即蒲芳丨物丨中丨京丨年丨英丨浮丨為國丨詩篇白丨周人刺幽后也得褒姒黜申后逸裳裳者丨刺幽王也小棄賢絶功臣小雅白丨孝子絜白也詩皇丨君遣使臣也雅苕之丨大夫閔時也戎夷交侵師旅並起幽王變雅人名子丨人公西丨人鄧仲丨名禹西漢人張丨晉魏丨唐善書昭丨王晉卿家妓名詳絃陰麗丨南陽人光武初悦之又見執金吾車騎甚盛嘆曰仕宦當作執金吾娶妻當得陰麗華即位立為后張麗丨陳後主妃門當時亦笑丨丨丨不知外韓擒虎坡譁説文讙也从言華聲諠譁也書聽無丨活套囂丨啾丨喧丨一笑丨四座丨驊馬名桞人仰驥中丨瓜古華切説文㼌也象形廣雅龍蹄獸掌羊駁兔頭挂髄蜜筩大班小青皆丨名詩綿綿丨瓞杜丨嚼水晶寒顔