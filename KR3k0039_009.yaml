body:
  text: 韻府羣玉卷九元隂徑弦隂復春編上聲一董董多動切一丨之用威注督也詩丨正治官左丨振擇之注正也栁示民農實丨丨骨董羅浮仙老取飲食雜亨之名飯丨羮仇陸道士詩授醪丨丨羮鍋內掘窖盤遊碗中池筆記作谷董非盤遊事詳窖活套朝丨賈丨姓氏隴西角音黃帝之後已姓躝有飂叔安生丨父舜賜姓董氏好龍左丨狐孔子曰丨丨古之良史也書法不隱左丨父丨丨甚龍多歸之乃擾畜龍曰豢龍氏士丨公三老丨丨遮説漢祖紀丨仲舒前廣川人治春秋為博下帷講誦三年不窺園為漢儒宗有王佐才丨宣後漢人字孝平為洛陽令人擊豪強京師歌曰枹鼓不鳴董少平強項事詳項丨允蜀字休昭遷侍中専獻納之任丨陽丨丨三世同居詔榜門曰篤行董氏之閭南史劉瑜傳丨昭字公仁趙太祖嘗引坐問計有才略世之奇士丨遵誨范陽人趙太祖使守通逺軍蕃漢悅服帝賜真珠盤龍衣蠓母總切即醯雞也列子蠛丨生朽壤之上郭璞云丨飛磑則天風春則天雨詳磑曚詩麻麥丨注茂盛貌懵心亂孔康董切説文孔穴也又孔竅之孔張氏别出空韻詩亦丨之章禮考工記函人眠其鑽空莊秋水四海之在天地不似礨空之在大澤乎注小穴也並音丨但監韻丨字下舊亦注穴也今故附此眼孔桑維翰愛錢上曰措大丨丨小與錢十萬貫塞破屋子矣書言故事曰安祿山傳帝為起帝祿山丨丨大腹孔晉佛圖澄丨旁有一丨以絮塞之夜讀書拔絮孔中光照一室齋時孔中出五臟六腑洗之帶孔沈休文言巳老病丨革常移丨詳腰百孔丨丨千瘡隨亂隨失韓與孟簡書毛孔平生不平事盡向丨丨散盧茶歌佛以四大海水入一丨丨維摩經針九孔七夕執九孔丨五色線向月穿之先過者為得巧也詳針顔苦孔丨丨丨之卓揚何多周孔見一刺史即周孔之丨胸中擾擾丨丨丨也韓心在鼻孔三藏得慧眼趙州將丨丨三藏丨丨上不見為太近詳心無孔鐵椎無心即是道似一個丨丨丨丨始得詳椎活套姬丨桑丨鸞丨九丨心九丨比干笛無丨姓氏角音魯國宋丨父嘉之後丨安國前漢丨氏有古文尚書丨丨以今文讀之因以起其家丨先字子夏前漢人賜靈壽杖歸老丨僖後漢時與崔駰同遊太學拜為蘭臺今丨穎達字仲達唐冀州人為司業撰五經正義子志孫惠元三世為司業時人美之丨道輔趙宋時為寧州推官真武像有蛇穿其前郡將帥其屬奠拜之丨丨持笏碎蛇首而去一郡皆驚三丨文仲武仲平仲史學尤精工於集句空注見孔韻總作孔切説文聚束也從糸匆聲詩百祿是丨長發總角丱兮書丨朕師無丨貨寶盤庚賦納丨本作稅詳􅀈藝文志丨羣書林總林丨而生總丨而羣栁文兼總丨丨條貫兒寬傳填總機務丨丨唐陸贄傅銓總丨丨平允宋景傳龜五總殷踐猷號為五總龜千嵗丨聚問無不知也詳龜活套分丨統丨人名江丨隋人偬倥丨困苦也一曰事多愡悾丨𢤂禾聚束也通作總書禹貢賦納總注禾藳也總馬鬣又丨角嵸巃丨山貌汞胡孔切本作澒水銀也淮南子白礬生白澒又大水貌真汞河上奼女得少則飛注河上則丨丨也參同契流汞白鹿原頭山月出寒光潑眼如丨丨坡詞鉛汞東坡云坎離交刖生分則死離為心坎為腎龍者汞也精也血也出于腎虎者鉛也氣也力也出於心真人曰正坐瞑目調息以久則丹田濕而水上行火為水妃熱必從之所謂龍從火裏出也旬日外腦滿而腰足輕常捲舌上舐懸癰久則汞下入口咽送直至丹田久則化為鉛所謂虎向水中生也志林盤走汞落筆縱橫丨丨丨坡蓊烏孔切草木盛貌相如傳覩衆樹之丨夢黃一曰草可染滃雲起貌漢書霧丨雲蒸琫補孔切佩刀上節曰丨下曰鞞詩鞞丨容刀公劉鞞丨有珌珌詩傳天子玉丨珧莑草盛貌玤石次玉唪大笑詩瓜􅚩丨丨多實也籠力董切竹器藥籠元行沖謂狄梁公曰下之事上譬如富家儲積脯臘膎胰以供資膳參木芝桂以防疾疾今門下充為旨味者多矣願以小人充一藥石可乎仁傑曰君正吾丨丨中物不可一日無也贈一籠蘇子由謫髙安創東軒號東軒長老坡因子由壻過髙安寄詩云丨君丨丨牢收取盛取東軒長老來子由復之東軒只是虛空物何處人家籠解盛動徒總切易寂然不動繫辭一待時而丨左相時而丨隱元年坡妙語時飛欲丨雷動漢士丨丨雲合揚解嘲風動四方丨丨禹謨目動使者丨丨而言肆誘我也左齒動丨牙丨搖韓治動曹參傳嚴延年之丨丨黃次公之治靜詳靜羣動陶詩日入丨丨思食指動鄭子公事左詳指風幡動一僧云丨動二云丨丨六祖曰風幡非動動自心爾詳幡活套情丨舉丨機丨傾丨洞記洞洞乎屬屬乎注孝敬心至也丨又澒丨相通貌山丨之在去聲挏説文推引也漢有丨馬作酒前禮志給太官丨馬酒又百官志江如淳曰主乳馬以韋革為皮兜數斗盛馬乳丨取其土肥因名丨馬詳酒桶他孔切又音動木器受六升黃熟桶皮堅而中腐形如桶謂之丨丨丨香葉廷圭香譜吟易箍桶二程入蜀至太慈寺有箍桶者曰丨丨數就揖之挽歸質所疑酬答如響問其姓名不答徑去食物滿桶張僕射齊賢每食肥肉數斤罷相知安州與客食厨吏置一大桶竊視所丨如其物投桶中至暮浸漬丨丨歸田録雅樂如桶詳雅二腫獨用腫之隴切説文癰也從肉重聲擁腫莊子樗木丨丨不中繩墨匠者不顧詳樗疣腫嘉言寫清越愈病失丨丨韓會合種類也詩誕降嘉丨左盧蒲嫳曰豫髮丨丨奚能為昭三將種朱虛侯章曰臣丨丨也請得以軍法行酒有吳廣曰王侯丨相寧丨乎漢書易種無俾丨丨于兹新邑書盤庚美種五穀者種之丨者也孟隴種丨丨而退荀遺失貌大宛種初得花驄丨丨丨社書九種丨分九丨漢書瓜果種二月朔為中和節民間以青囊盛百縠丨丨之丨相遺曰獻生子李泌傳食十八種李令公一丨丨丨丨詳二韭又二十七種菜謂三韭詳韭茂先有種張華被害劉頌哭之慟聞華子得逃喜曰丨丨卿尚丨丨也史踵説文追也從足重聲一曰往來貌又足後追迹繼丨也旋踵計不丨丨相如傳繼踵兄弟丨丨相因循詳馮姓曳踵車輪丨丨曲禮謂行不絶也決踵莊子曽子居衛捉襟而肘見納履而踵決曵履而歌商頌放踵摩頂丨丨盂企踵遐方丨丨莊之丨丨國人行腳跟不著地如人跂足也山海經息以踵真人之丨丨丨衆人之息以喉莊玉無踵西風吹好句珠丨本丨丨坡詩又詳玉奔蹄踵區區射聲利浩浩丨丨丨曽子固寵丑隴切説文尊居也從宀龍聲一曰愛也恩也書説命啓丨納侮鄧禹傳纍世貴丨天寵承丨丨也易師卦席寵丨丨惟舊書畢命妬寵丨丨而負恃盤谷傳傷於寵貴臣常病丨丨詳飽活套新丨矜丨固丨帖丨劉丨受一錢事詳錢隴説文大阪也在天水者最大因以名州殽隴關中左丨函右丨蜀張良傳垂隴鄭伯享趙孟于丨丨左得隴既丨丨復望蜀邪光武紀瓦隴荒林無空枝函丨有髙丨荆公雪鶴書赴隴北山移文活套關隴壟説文丘丨也又冢也禮適墓不登丨又田中髙處陸勝傳輟耕而之丨上又亦作壟孟隴斷而登之又通作龍漢書活套耕丨畦丨麥丨擁於隴切説文抱也阮籍傳子夏居西河而文侯丨篲漢周昌傳帝方丨戚姬亦作雍面雍樹馳詳樹雪擁丨丨藍關詳雪虛器擁徒擁丨丨漢書壅選道路無丨前武紀丨於上聞亦作雍詩維塵雍兮囊沙壅韓信丨丨丨水上流擊龍且正塗壅丨丨丨底孟序活套青丨蔽丨􅎵煩丨冗而隴切説文冗散也從宀人在屋下無田事也進學解丨不見治李德裕傳能簡冗官衰冗豈帷慕亷退實自知丨丨坡間冗超然正自得何由顧丨丨歐避卧井丨丨荆公簿書冗一掃丨丨丨活套煩丨貟丨蝟丨食何丨茸草生貌闒茸丨丨尊顯兮賈誼傳􅂒不肖也或作踏􅂒􅂒荒茸誰與雄丨丨韓聨句蘢茸叢以丨丨前相如傳上來孔切聚貌氄毛盛也書鳥獸丨毛歐使我意紛紛重直隴切孟任天下之丨萬章功疑惟丨書輜重丨厠也軍糧什物雜厠載之故曰丨丨光武紀注又云丨謂衣車丨謂載重物車鈞重千丨為丨枚乘傳首重此丨丨則彼尾輕李石傳四重言重行重貌重好丨揚子修身嚴重為人丨丨袁安傳雅重徑正丨丨韓侯傳居重丨丨馭輕陸贄傳九鼎重誰言一身輕自待丨丨丨韓蟬翼重丨丨為丨千鈞為輕騷卜居金帶重君亦自嫌丨丨丨坡雲髻重插花丨丨丨丘山重萬牛回首丨丨丨杜古柏行活套莊丨持丨推丨歸丨冢知隴切説文髙墳也從勻豕書丨宰周官汲冢漢丨丨得古文晉荀朂傳文冢劉説復愚為文不忍棄其草聚而封之作丨丨銘唐文粹舊學鄙丨丨坡筆冢僧智永有舊筆頭數石瘞之號退丨丨晉史玄冢揚雄死弟子共起墳名曰揚冢又曰丨丨家譜青冢胡中草白王昭君冢上草獨青號丨丨漢書山冢丨丨崒崩正月山頂也馬冢滕公佳城事詳城黃耳冢陸機事詳大鸚鵡冢明皇有白丨丨號雪衣娘子死瘞之號丨丨丨詳鵡好發冢漢廣川王去疾丨丨丨發晉靈公冢得玉蟾蜍腹容五合水以為書滴西京雜記宿王弼冢陸雲夜迷路至一家便室宿見一美少年與談老子辭致深逺向曉辭去行十里問昨丨處乃丨丨丨雲自此談老殊進本傳坐者為冢禰衡言語悖逆操怒送與劉表臨發衆人為祖道乃相戒曰衡悖慢無禮今因其後至以不起折之衡至衆人莫肯興衡大號衆問其故曰丨丨丨丨卧者為尸尸丨之間能不悲乎本傳詩禮發冡儒以丨丨丨丨莊外物言遊説之士借詩書之言以文其姦而發人之冢也龎德公上冡司馬德操詣丨丨丨值其丨丨德操竟入堂上呼其妻子速作黍須臾德公還不知何者是客詳客活套荒丨奉扶隴切説文奉承也從半從六半聲獻也記丨三無私禮丨玉帛左丨酒醴易丨天時任延傳履正丨公推奉傾心丨王導傳孫供奉唐昭宗有弄猴隨班起居賜緋號丨丨丨詳候活套甘旨丨人名翼丨前漢應丨後漢捧兩手承也亦作奉檄毛義丨檄詳檄唐楊炎夢丨日唐功臣贊丨月天門倦遊録韓魏公夢以手丨天者再後果輔英宗神宗西施病心而顰其里醜婦見而美之亦丨心而顰詳顰許由手捧水飲詳瓢記祭義孝子如執玉如丨盈活套腹屢丨茗甌丨覂或作泛漢紀泛駕之馬詳駕勇余隴切説文氣也一目揵也從力甬聲勇者用也共用之謂丨語由也好丨公治記知耻近勇中庸賣勇申包胥曰功成受賞是丨丨也遂逃賞左詳申賈勇髙固入晉師曰欲勇者丨豫餘丨左成二程勇鷙蟲攫搏不丨丨者程猶量也儒行大勇聞丨丨於夫子孟養勇孟施舍之丨丨也上勇有丨丨者中勇者下勇者荀性惡大敵勇漢光武見小敵怯丨丨丨本清直勇趙宋傅獻肅公堯俞溫公稱曰丨丨丨三德吾以欽之畏焉儒者勇鄭畋舉進士被賊將王璠率衆三萬攻畋畋乃設伏破之帝曰朕知畋不盡丨丨之勇乃爾本傳匹夫勇此丨丨之項羽傳狶勇王莾時募兵名豬突丨丨詳突習勇柏孝長曰勇可丨也詳習欒氏勇欒王駙曰州綽邢蒯勇士也宣子曰彼丨丨之丨也尊乃勇漢王尊為東平相謂王曰皆言王勇顧但負貴如丨丨丨爾本謂魏勃勇魏勃教齊王反召問勃股戰而栗灌嬰熟視笑曰人丨丨丨丨妄庸人爾前五王傳活套仁者丨人名班丨超之子也涌説文騰也亦作湧泉涌漢二師將宣刺山而丨丨前漢戴胃言若涌泉本傳舍人思若涌泉並淨戒寺出泉人出之則丨丨彌甚詳泉潮涌山亂寒丨丨曾子固水涌風起丨丨赤壁賦洶湧魏伐吳見波濤丨丨詳限踊説文跳也從足甬聲禮喪記劈丨注男丨女劈金踊丨丨躍曰我且為莫邪則為不詳之金詳金曲踊晉魏犫顛怒爇僖負羈氏犫傷於胸公欲殺之犫曰以君之靈不有寧也距躍三百丨丨三百乃舍之左僖二十八距躍言距地向前跳而越物過也百音陌猶勵也言每跳皆勉力丨丨謂向