body:
  text: 韻府羣玉卷十五元陰勁弦陰復春編去聲十三問與焮同用問云運切説文訊也从口門聲又聘也禮小聘曰丨又姓襄州有之左夕以訪丨昭元管子堯有衢室之丨漢書文帝丨鬼神又丨錢榖丨决獄詳獄語不丨馬耕當丨織當丨婢詳面載酒丨竒詳酒天問楚辭有丨丨篇多問髙長曰為我丨丨趙君聲猶云十萬問訊詳重問平鄭曰若丨丨以召之問聘問之厚幣僖十聞問問者缺焉久不丨丨詳缺清問皇帝丨丨下民吕刑下問不恥丨丨語宿問无丨丨大不俟經宿茍畧待問善丨丨者如幢鍾詳鍾佯問齊景公曰東海棗華而不實何也晏子對云云公曰吾丨丨爾對曰丨丨者亦當佯對詳對不可問光武時天下墾田不實帝見陳留吏牘上書云潁川𢎞農丨丨河南南陽丨丨丨云云河南帝城多近臣南陽帝鄉多近親本死傷不問丙吉道逢丨丨丨丨逢牛喘問之詳牛人名宋之丨有文章詳絶紊説文亂也書有條而不丨抆拭也絻喪冠又祖丨之服聞聲所至也記言丨則入書无窮之丨令聞丨丨今望詩聲聞丨丨于天詩仁聞丨心丨丨孟汶説文水出琅邪至安丘東入濰一云出泰山西南入泲書浮于丨在汶吾必丨丨上矣語貉踰汶丨丨丨則死詳貉運王問切説文遷徙也从走軍聲又動也轉輸也又行也用也一曰地南北謂之丨又丨祚也又姓出姓苑陶侃丨甓詳甓郢人丨斤詳斤天運丨丨如車轂渾天儀海運大鵬丨丨則將徙于南溟詳鸚四運誰揮鞭䇿驅丨丨萬物興歇皆自然李謂四時運行廣運丨丨五里國語地東西曰丨南北曰丨廣去聲流馬運木牛丨丨丨諸葛亮人名謝靈丨晉人詳姓氏䩵攻皮治鼔工丨人為臯陶暈日光氣也又日月旁氣本作煇周禮眡䘲十運謂一䘲二象鎸監瞢彌叙隮想也曰暈丨丨五色晉天文月暈以蘆灰環月缺其一面丨丨亦隨而缺詳灰後魏晁祟為太史令天興五年丨丨左角崇云角虫將死是歳天下牛死者十七八糜􅎷亦多死虎乳丨生丨谷鐙暈夢覺燈生丨韓宿龍宫灘眉倒暈剩看新翻丨丨丨未應泣别臉消紅坡蜀中大慈寺璧畫明皇按樂十丨圖丨丨眉名也註犀角暈丨丨丨盈尖詳尖詠月韻説文和也單出為聲成文為音音員為丨吕静丨集夏侯該陽休之杜素卿丨畧隋陸法言廣丨唐孫愐唐丨折全一堂丨例如蜂腰丨杖鼓丨腰韻之類甚多强韻王筠能用丨丨詳趂韻下趂韻梁史稱王筠善押强韻然又往往有丨丨之失蔡寛夫詩話四聲韻沈約作文用宫商將平上去入丨丨製丨有平頭上尾蜂腰鶴膝之名號永明體曰約誤丨丨譜梁武帝問周捨何謂丨丨捨天子聖哲是並史競病韻曹景宋賦丨丨丨詳病轆轤韻單丨丨丨者單出單入兩句換韻雙丨丨者雙出雙入四句換丨葫蘆韻謂前韻少後韻多倒押韻丨丨丨如韓愈碧流滳瓏玲光景何鮮新杏花兩株能白紅及用慨慷莽鹵之類甚多寛韻窄韻退之作詩丨丨則泛入旁韻丨丨則因難見巧愈險愈竒詩話次韻依韻唐人賡和有丨丨用韻丨丨次韻是效其次第韻依韻同在此一韻中爾用韻用彼之韻不必次之如昌黎陸渾山火詩之類温公詩話大韻小韻詩病丨丨如聲鳴為韻上九字不得用驚傾平榮字又病丨丨除本韻一字外九字中不得兩字同韻如遥條同句也詩苑類格御詩四韻唐白鹿觀丨丨序云人題丨丨後者罰三杯李宗楚等謝曰既陪天歡不敢不醉景龍文館記刻燭四韻丨丨為詩丨丨則刻燭寸詳鉢賦三十韻梁謝㣲三刻丨詩丨丨丨史詩重用韻如八仙歌丨丨船眠天前韻韓退之庭揪押三間字甚古詩如阮籍秋懷押兩歸字之類如此多詞疊用韻如山谷阮郎歸詞丨丨四山字之類益北征韻袁宏北征賦直冩字韻一句尢勝詳冩不工有韻秦少游云子美詩冠古今而無韵者殆不可讀曾子固文名天下而有韻者輙丨丨歐公落韻丨丨年十七隨州取解以丨官丨不収東朝雜録雙聲疊韻宋謝莊口辨王𤣥謨問何者為丨丨丨丨莊曰互䕶為丨丨磝碻為丨丨捷速如此史李迪落韻景徳中丨丨賈邊省試迪丨丨邊以當仁不讓于師論以師為衆王文正公曰迪過可恕邊務穿鑿誤後生遂收迪黜邊東齋記事賦依次用韻宋太平興國三年始詔進士律丨並以平仄丨丨丨丨長編吳彩鸞冩唐韻書生文蕭遇仙女丨丨丨歸鍾陵貧不自贍彩鸞曰我為丨孫愐丨丨運筆如飛曰一部售五千盡又為之龍興職方策逺韻唐韋夏卿好古有丨丨風韻落盡江梅餘半朶依然丨丨合還它誠齋活套幽丨險丨員姓氏人慕伍員因姓五丨半千字榮期舉童子科後舉八科皆中歴事唐君有淸白節封平原郡公丨嘉静唐開元中張嘉貞薦苗延嗣善四人皆位清要語曰金吾四俊苗吕崔貟丨浩唐貞元龍虎榜中人丨髙唐徳宗時殿中侍御史鄆説文河内沁水郷又州名餫野饋訓許運切説文説教也从言川聲又誡也又姓書皇祖有丨説命學於古丨詩四方其訓之抑酒訓後魏高允集往世酒之敗徳者為丨丨史十年教訓越丨丨丨吳其為沼乎詳沼活套聖丨垂丨家丨貝丨糞方問切説文棄除也又嵗也月令丨田疇又除也記曲禮為長省丨左傳丨除先人之敝廬到既祖彦之以擔丨自給詳臭狼糞丨丨煙直上故烽火用之雜組剔糞羅㑹以丨丨致冨人號雞肆詳肆花落糞人生如樹花同發隨風而墮有丨茵席有落丨溷詳溷佛頭糞陳師錫序五代史半山曰釋迦丨丨上不堪着丨婢擔糞王衍妻貧鄙吝丨丨丨詳郎得財夢糞殷浩或曰将涖官而夢棺將丨丨而丨丨何也浩曰官本臭腐故將官而夢尸錢本糞土故將得錢而夢穢本學仙惡糞費長房从壺公入深山于羣虎中留獨處長房不恐又卧于室屋以朽索懸萬斤石于心上衆蛇嚙索且斷長房不移翁撫之曰可教矣復令食糞糞中有三虫臭穢特甚意惡之翁曰恨于此不得道長房辭歸翁與一竹杖本御史嘗糞唐郭𢎞霸為侍丨丨時大夫魏元忠病僚屬省候𢎞霸視便溺即桑指丨騐疾輕重賀曰廿者病不瘳今味苦當愈元忠惡其佞暴語于朝史便便溺一作液父病嘗糞梁庾黔婁丨丨醫云欲知差劇但丨丨甘苦黔婁輙甞之史着碁擔糞林逋曰世間事皆能惟不能擔糞與丨丨耳詳棊解藥以糞後李傕數請郭汜大醉汜疑㩁藥之絞糞汁飲之乃解史如願投糞商人有婢名丨丨有求悉致之後因商撻之走入糞土中不見詳願不除室糞陳蕃室有糞丨丨曰大丈夫當掃除天下安能事一丨乎奏賣馬糞唐少府監裴匪舒丨請丨丨丨計嵗得錢二十萬緍劉仁軌曰恐後代稱唐家丨丨丨非佳名也乃止世説爲奴掃馬糞五代唐姚洪閬州董璋及執洪洪曰老賊爾昔為李七郎丨丨丨丨得一臠殘炙感恩不已今為節度使何苦反邪史僨僵也左牛丨於豚上詳瘠又鄭伯車丨于濟亦作焚左象有齒以丨其身活套單丨奮説文翬也又揚也詩不能丨飛蝟奮羣盗如蝟毛而奮唐書僆奮未成雞丨絶有力丨爾雅上音練雞少者曰丨絶有力者名丨子房奮秦亡丨丨丨詳恥人名石丨漢九卿馴行孝謹賁覆敗之將忿詳吻韻醖於問切説文釀也又吻匀九醖丨丨甘醴十旬兼漬南都付注丨丨十旬皆酒名九宗廟八月飲酎用丨丨大牢正月作酒八月成曰酎一曰酻西京雜記戀良醖王綺待詔門下省成問何樂曰良醖可戀爾詳戀緼枲也紼也又奥也見吻韻煴以火伸物藴見吻韻積也習也愠説文怒也恚也恨也語子路丨見又三巳之旡丨色公冶殄愠肆不丨厥丨綿詩解愠舜作五弦琴歌曰南風之薰兮可以丨吾民之丨兮南風之時兮可以阜吾民之財兮家語郡渠運切秦罷列侯為三十六郡取百粤乂置四郡前漢合百三丨後漢百五丨孰郡思安困乏者從置荆揚丨丨後樊準傳劇郡老守便丨丨坡股肱郡漢季布上曰河東吾丨丨丨故特召君本酒泉郡班超曰臣不望到丨丨丨但願生入玉門闗史南柯郡淳于棼夢槐安國王曰丨丨丨不理屈鄉為守累日達郡詳槐大小南郡劉之亨代兄之遴為南郡太守荆土懷之不稱名號丨南郡丨丨丨梁史送人作郡羅友乞郡於桓温曰臣昨見一鬼柳榆曰只見汝丨丨丨丨不見人送汝去作郡温笑以友為襄陽守棊賭郡宋文帝與羊保奕賭郡保勝補宣城太守羊保傳分扶問切别也又圴也散也又分位也記丨毋求多左丨魯公以大路大旂氣分自三光五岳之丨丨栁文序分散也韻㑹入在此吳分劍氣吐丨丨谷揣分司空圖丨丨二宜休詳休推分王導任真丨丨自如也鑑僑札分魯肅指米輿周瑜遂結丨丨之丨詳未活套名丨職丨天丨緑丨處丨星丨隨丨憤語不丨不啓發丨忘食並上去兩音焮香勒切炙也又爇也左行火所丨後山三年不舉觴吻頰煙火丨靳居焮切説文當膺也一曰吝也又固也驂靳王猛笑謂東郭書曰吾從子如丨之有丨定九靳車中馬也猛不與書争言我從書如驂馬之隨靳也悔不小靳崔烈入錢五百萬為司徒及辭帝曰丨丨丨丨可至千萬嵇康固靳丨丨臨刑曰苦𡊮孝尼求廣陵散吾丨丨之詳散姓氏西河徵音丨尚楚愇臣譛害屈原丨歙漢祖定无功位次歙弟十封信陵侯丨恒唐景龍中為侍御史斤詩丨丨其明注察也又呉漢傳丨丨謹質隠于靳切築也又隈也賈山傳丨以金椎又隈也孟子丨几而卧活套隈丨􅀈依人也近巨靳切説文附也从辵斤聲又親也此親丨之丨書民可丨丨天子之光漢書季布使酒難近並在此逺丨之丨在吻韻十四願與慁狠同用願魚怨切説文大頭也从頁原聲又欲也念也思也乂顗望也一曰毎也雖也書敬修其可丨禹謨詩適我丨兮野有蔓草吾詞富貴非丨丨枕如願吕翁盧生同邸方蒸黄粱翁取枕授盧曰丨此榮適丨丨生但記身入枕中未幾登第出將入相五十年富貴婢如願有商人見清湖君君問所須但乞如願君許之後得一婢名丨丨商有求悉致之後因正旦如願晚起商撻之走入糞壤中不見今人正且君以細䋲繫偶人投糞中云今如願歳時記一云青洪香火願平生功名意囘作丨丨丨後山愿説文謹也語侗而不丨左丨吾甚愛之書丨而恭或作原語鄉願徳之賊孟其惟鄉原皆作愿人名盧从丨名覆金甌詳甌李丨盤谷詳谷怨於願切又恚也恨以也又悔也毒也語直報丨書結怨于民泰誓左又誰敢丨詩思我小怨市怨丨丨結禍蘇秦産怨楊國忠丨丨天下房琯傳徼怨我則不徳而丨丨于楚宣十二己怨與其有諾貢寧有丨丨表記己謂不許也宿怨不丨丨焉孟恩怨趙宋王曾謂大臣恩欲歸己怨使誰當歸田􅀈丨丨相爾汝韓徳怨知罃曰无怨无丨不知所報詳報適怨義山瑟詩莊生曉夢迷蝴蝶丨也望帝春心托杜鵑丨也下句清和詳煙紅怨曾聞葉上題丨丨詳禁香怨粉愁丨丨晁次膺詞鶴怨帳空兮夜丨丨詳文緑珠怨喬知之妾碧玉借與武承嗣教歌舞不還喬作丨丨丨寄之碧玉飲泣而卒詳玉睚眦之怨范雎一飯之徳必償丨丨丨丨必報嗔怒見齒曰丨丨猶有嫌怨晉鄭黙事上以禮御下以和而丨丨丨丨丨丨故者子以之為難史畹田畝三十為丨又阮韻販方願切説文買賤賣貴者从貝反樊噲丨繒屠狗稗販筭丨丨之民唐省陸贄傳謂小販隻甕販貧人筭販丨詳甕劵去顆切説文契也又綣也謂以木牘為要約之書以刀剖之屈曲犬牙韓子曰宋人得遺契而數其齒鐵劵漢祖與功臣剖符作誓丹書丨丨金匱石室譛五代朱友謙晉荘宗拜尚書令賜丨丨恕死罪後為伶官所被殺族其家妻張氏以丨丨示使者曰此不知為何語史左劵蘇代謂田軫曰公常執丨丨以責于秦韓史田敬仲世家劵虞卿操其兩權事成操丨丨以責史記驛劵唐以前館驛並給傳往來開元中始給紙劵青箱雜録焚劵孟嘗君遣馮煖収債于薛臨行問市何物君曰吾家寡有者市之煖召債主合劵丨之還君問市何物曰市義而