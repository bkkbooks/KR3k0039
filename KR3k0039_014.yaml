丨丨史餕熟食又食餘曰丨又食人之餘曰丨記丨餘不祭畯説文農夫也又曰農神也田畯丨丨至喜詩田大夫即嗇夫也六遂之長髙者為大夫卑者為士蓋農田之俊者寒畯鄭薰舉引丨丨士類多之畯本作雋睃明也早也㕙狡兔駿説文馬之良調者又大也選魏都賦兾北填廏而駔駿八駿穆王欲使車轍馬迹遍行天下乘丨丨馬奔戎為右造父為御廣記驊騮騄駬赤驥白兔獟渠黃騟盜驪山子一云赤驥盜驪白義渠黃驊􅀈騟驗山子緑耳牛駿何偃轡疾丨丨馭精爾詳遲神智駿唐德宗二馬曰丨丨丨曰如意騶杜陽編老猶駿蕭溧陽馬雖丨丨丨梁元徐妃百子駿司馬光曰安得丨丨丨布之天下乎詳于姓謂鮮于也馬不願駿唐李懷逺位宰相乘欵段馬曰吾幸其馴不願他駿史按圖索駿世之慕駿者不求之馬而必是圖之似故終不能有得於駿也桞八駿圗説瞬舒閏切説文開闔月數探也又目動也又説文髯髮也又注亂髮也莊終日視而目不瞚瞚與瞬同王戎視目不丨選橅四海於一丨舜説文草名楚謂葛秦謂蔓孟丨何人也丨又虞人名漢張敞殺絮丨詳兆蕣説文木槿朝榮暮落者亦作舜詩顔如丨華閏如順切説文餘分月也五嵗再丨二曰元命苞三年一丨以起紀易五嵗再丨門閏晉伐鄭十二月癸亥門其三門閏月戊寅濟于隂阪襄九杜預云此年無閏月戊寅是十二月二十日疑閏為門字閏月玉為五字月為日字晉攻鄭門門各五日自癸亥至戊寅凡十五日也繆辨丨丨之非察陶隂之厄閏黃楊遇閏退二寸故云丨丨詳楊門玉為閏李盛作安南守夢人擲玉於門盛曰丨丨閠字也必有榮閠暴富貴玉箱雜記潤説文水也丨下又丨澤又益也又州名大學富丨屋德丨身書水曰丨下語浸丨之譖詩膏丨天下木潤玉在山而丨丨大戴記礎潤山雲蒸柱丨丨淮南玉潤晉衛玠妻父樂廣時以為婦翁水清女壻丨丨梅潤緑綺韻低丨雨丨史波潤邇天漢之丨丨文粹芳潤文章潄六藝之丨丨張衡傳朗潤慈明外丨叔慈內丨後荀議傳九里潤後郭伋守潁川帝勞曰賢能太守去帝城不逺河潤丨丨冀京師并蒙福也本順食閏切説文馴也又從也不逆也又和也亦作慎鴻毛遇丨風聖賢頌理順怡然丨丨左序委順生非汝有是天地之丨和也性命非汝有是天地之丨丨也莊子百順福者備也備者丨丨之名祭統大順聖人成天下之丨丨揚韻府羣玉卷十四
