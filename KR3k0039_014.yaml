body:
  text: 韻府羣玉卷十四元隂徑弦隂復春編去聲八霽與祭同用霽子計切説文雨止也從雨齊聲又史宋世家曰雨曰丨詞名秋丨光霽丨風丨月詳坐威嚴霽丙吉與魏相書相善其言為霽威嚴魏相傳活套開丨新丨濟説文渡也通也又相丨也以舟船行曰丨賙梂也又上也益也又事遂也書若丨巨川𢎞康丨小民蔡仲孟乘輿丨人左以水丨水監丨蒼生汔濟小狐丨丨需其尾易丨水周也一曰幾也旋濟不能丨丨詩濟止也同舟濟郭林宗與李膺丨丨而丨詳舟酒徒蔣濟魏時苖為夀春令謁治中蔣濟會其醉不見苖還刻木為人署曰丨丨丨丨日夕射之常林傳活套匡丨卦名水在火上既丨君子以思患而豫防之初九曳其輪濡其尾無咎六二婦喪其茀勿逐七日得九三髙宗伐鬼方三年克之小人勿用六四濡有衣袽終日戒九五東鄰殺牛不如西鄰之禴祭實受其福上六濡其首厲火在水上未丨君子以慎辨物居方初六濡其尾吝九三曳其輪貞吉六三未丨征凶利涉大川九四貞吉悔亡震用伐鬼方三年有賞于大國六五貞吉無悔君子之光有孚吉上九有孚于飲酒無咎濡其首有孚失是人名檀道丨唱籌量沙詳沙帝都計切説文諦也王天下之號也又天之神也孟則可以祀上丨古帝丨丨命武湯詩夭也望帝杜鵑詳鵑銅馬帝光武破降丨丨賊因號丨丨丨史止秦稱帝魯仲連聞趙欲尊秦為帝為言秦稱帝之害詳紛因鬼見帝蘇秦曰謁者難見如鬼王難見如天帝今臣食玉炊桂丨丨丨丨詳桂遨遊二帝馬援丨丨丨丨間本活套心丨酒丨疐去本也記削瓜士丨之諦審也膽諦魏韓宣文帝曰此有丨丨之士也後至九卿史帝欲不諦後李雲上書曰帝者諦也今政日損丨丨丨丨邪帝震怒史四諦苦謂生老病死集謂聚集骨肉財帛之類滅謂壞滅道謂修行此名丨丨謂其理審諦非徒説也經云見苦斷集因滅修道龍舒心經記蒂瓜當也固蒂老子曰是謂深根丨丨長生久視之道丨橘中一叟曰橘中之樂不減商山但恨不得深根丨爾詳橘秋蒂齊謝朓曰邈若墜雨飄似丨丨史霜蒂坡和山谷今君已度世坐閲丨中丨柿蒂紅袖織綾誇丨丨詳梨柢説文木根從木氐聲底一云木之根曰丨詳嚏説文悟解氣也從口疐聲鼻氣詩願言則丨注俗人嚏云人道漢藝文志有嚏耳鳴雜古鼽嚏季秋行夏令民多丨丨月令上音求謂病塞鼻窒頻嚏白髮蒼顔誰肯記曉來丨丨為何人坡活套噴丨劑在詣切説文齊也通作齊前藝文百藥齊和砭劑武為救世丨丨唐儒行鍾乳劑賜丨丨一丨唐髙馮傳丹半劑隂長生士馬明生授太清神丹經合丨服丨丨不樂升天周行天下隂馬皆後漢時人神仙傳龍香劑玄宗御墨曰丨丨丨一日墨上有小道士如蠅而行上叱之即呼萬嵗曰臣墨之精黑松使者凡世人有文者墨上皆有龍賓十二上神之以墨賜掌文官記聞齊和也又酒以度量節作者曰丨五齊丨丨三酒禮泛齊醴齊盎齊緹齊沈齊火齊丨丨必得禮生熟調也疊又丨丨珠名似雲母重而開色黃赤别之如紗穀之重沓丨丨磊落堆金盤韓詩詠葡萄也耕耘變齊耘而滅裂之亦滅裂而報來年變齊深其丨而熟耨之其木繁滋詳養謂變其法齊同也嚌嘗也書太保受同蔡丨唐文藝傳嚅丨道真懠怒也詩天之方丨穧穫刈也一曰撮也刈禾把數詩此有不斂丨薺丨菜事詳上聲眥目匡也事詳置韻替他計切説文廢一偏下也也從廢也滅也代也又委靡獻替丨可丨否元稹傳隆替足下出處足觀政之丨丨王羲之傳陵替下丨上丨文十一活套淪丨興丨􅠷褓也詩載衣之丨剃除草月令季憂燒丨涕泣也亦作洟記不敢唾洟餘事並詳上聲鍾出涕晉惠帝時殿前六丨皆丨丨五刻止傷賈后弒楊太后也史武夫流涕可為流涕賈䇿唐奉天制書丨丨悍卒無不丨丨史剃鬋髮大人曰髠小兒曰丨或作鬄剃第特計切次丨也又但也次丨又丨宅食邑不滿萬户不得作丨酈食其傳丨言之又科丨漢書召信臣舉髙丨甲第宣帝賜霍光丨丨一區有甲乙次第本傳升平第唐栁仲郢每遷必烏集丨丨丨詳烏假官第唐王涯為翰林學士帝數幸其第以所居逺詔丨先宅里丨丨諸學士莫敢望史角巾還第王導曰若元規來吾便丨丨丨史溷子一第唐元結舉進士楊浚見其文曰一第丨丨爾有司得子是賴果擢上第丨言人登第才髙曰丨溷子史劉蕡下第蕡對䇿詆宦者考官不敢取李郃曰丨丨丨丨我輩登科能無厚顔本無解及第唐劉蛻劾令狐綯丐子滈未嘗舉進士妄言已解天下謂之丨丨丨丨史不得一第梁太祖初為節度謂母曰宋五經平生讀書丨丨丨丨有子為節度使無忝也太祖父誠以五經教授鄉里故云史弟説文順也語鄉黨稱丨焉之道孝丨而已矣亦作悌出則丨丨孟堯舜兄丨之在上聲死悌唐宗室行逺弟行芳請代兄戮遂俱死稱為丨丨史易也云愷丨人名宋之悌喬勇詳絶悌豈丨娣女弟又丨姒詳紙韻睇目小視也禘五嵗一丨祭其祖之所自出以其祖配之記禮不王不丨魯丨非禮禮運遞説文更易也又傳丨俗作遞云迢丨之丨遰去也又迢丨也逺也一曰避也締結不解丨秦論合從交杕説文樹貌又盛貌杜木獨生詩丨踶踏也衛足也漢武紀馬或奔丨題視貌一曰顯也詩丨彼脊令逮及也又記威儀丨丨棣説文白丨也有赤丨詩詁詩緝所訓常丨唐丨是二物詳韻會又詩柏舟威儀丨丨詩篇常丨燕兄弟也小雅砌七計切階丨也鳴砌蚯蚓江東人呼歌女亦曰丨丨古今注雨砌凄涼羅敷館風壁頽丨丨坡丨丨墮危芳少遊風砌丨丨護危花活套玉丨軒丨蛩丨切衆也又一丨大凡也一曰權時也以刀丨物漢平紀一丨滿秩注妻以女嫁人曰丨語可丨也以其兄之子丨之細蘇計切文帝紀俱棄丨過三細丨丨不宥君陳罪雖小三犯不赦也五細楚子使棄疾為蔡公申無宇曰五大不在邊丨丨不在庭詳大詩細後漢趙臯著吳越春秋丨丨蔡雍讀丨丨以為長於論衡史謹細唐席豫性丨畏與子弟屬史書不作草字或曰此丨事答曰細不丨况大事乎本拜其細穆叔舍其大而重丨丨丨詳拜房杜細楊已取名瞭然使户曉者盡丨丨之丨邪房杜贊入粗細後魏李普濟學涉有名為大守語曰丨丨入丨李普濟史壻説文夫也從士胥聲二曰有才智之稱又長也史記黃氏情注東洛間謂丨為倩子壻趙王禮甚卑有丨丨禮史僚壻江東呼同門為丨丨爾亞壻兩壻相謂為丨丨爾雅亦曰友壻快壻郭瑀曰吾欲覔一丨丨詳席玉壻女壻丨潤詳潤贅壻淳于髠齊之丨丨敬宋玉敬𢎞為太守之郡妻弟相玄要之𢎞曰我不能為桓氏丨丨别船送妻彌年不迎史七壻郭子儀丨丨皆賢唐史十女壻晉劉𢎞都督荆州朝廷以𢎞壻夏候陟為襄陽守𢎞曰若必姻親然後可用則荆州十郡安得丨丨丨本桃源壻劉阮入丨丨有仙客持桃來慶女丨詳源乘龍壻女壻近丨丨社賢翁壻昌黎壻李漢文樂廣壻衛玠公趙宋趙參政昌言壻王正旦文正壻韓忠獻億殊李侍郎虛已壻晏晏殊壻冨弼乃有佳壻唐權德輿女妻獨孤郁憲宗嘆德輿丨丨丨丨史羿五計切説文羽之丨風謂箭乘風而疾也猶翳也古諸侯后丨書有窮后丨語丨善射楊雄賦丨氏控弦姓氏濟郡羽音詣候至也造也堄睥丨女墻詳睨睨邪視中庸丨而視之睥丨字不一主父偃傳睥丨之寃必報故久立史魏其傳辟倪兩宮間女史侯生見其客朱亥俾堄又杜詩睥丨登哀柝蓋墻窺箭眼處慱雅作埤堄褐父睨旨酒一盛兮余與丨之丨丨之詳祭平立睨鴈騖行丨丨丨丞丞涉筆惟謹詳丞寱瞑言也唐元結有丨論譏諫官不言莊不得夢必且丨焉計古詣切説文審也算也張良傳誰為陛下畫此丨者圜橋億萬丨詳橋令與丨偕詳偕年計一丨之丨在於春一日之計在於晨纂要一丨之丨莫如樹穀十丨之丨莫如樹木終身之計莫如樹人管子日計見上注早計汝亦太丨丨見卵而求時夜見彈而求梟炙莊心計何柢丨丨不差升合詳算祕計平城之圍陳平知閼氏妒忌造木偶人舞埤間閼下氏慮冒頓下城必納之乃退軍史云丨丨鄙其䇿爾樂府竒計陳平六出丨丨史受計丨丨甘泉宫武帝紀千嵗計生世能幾何已作丨丨丨后山終身計見年計下大飽計飢寒未可知已作大丨丨坡牙籌計王戎執丨丨算詳籌丨與婦計楚王欲以優孟為相孟請歸丨丨丨之詳去聲相甲侵計建中末獨孤彥自淮泗至佛寺有二丈夫一人身長黑衣稱姓丨名丨丨第五一人身短青衣姓曾名元云云彥悟曰曽之文以瓦附曽為甑甲者東方丨乙木第五假午字以午附木杵字也丨丨者語為金截金截為鐵杵乎果于朽壤中得鐵杵及甑宣室志上計下計漢黥布反薛公曰使布出丨丨山東非漢有也出于中計勝負之數未可與知出於丨丨陛下安枕而卧矣史郡國上計凡郡常以春行所至縣論課殿最嵗盡遣上計范雎傳注走是上計齊王敬則舉兵東昏在東宫見征虜亭失火謂敬則至急裝欲走敬則聞之曰檀公三十六䇿丨丨丨丨蓋譏檀道濟避魏事史活套良丨乘丨姓氏丨然越人詳丨有功趙宋紹興中獻所著晉鑑繼説文續也孟為可丨也梁惠上記中庸善丨人之志碧繼剡人賈博于鏡湖芰荷中見二叟一呼丨丨一呼篁棲叟望見賈遽揖之化為鷺去樹萱祿後難繼宋文帝曰四賢同管喉舌恐丨世丨丨詳舌無來無繼貫休見常重胤傳神曰前丨丨人後丨丨者活套狗尾丨音書丨繫説文丨維也一曰絍也亦作係易係遁有疾厲左以事丨日薊本作􅠥地名又姓漢丨子摩挲銅狄詳狄髻祖珽丨巾金叵羅詳羅鳯髻周文王時名丨丨始皇時名望仙髻漢名迎春髻同心髻芙蓉髻隋名九真髻唐名平蕃髻長樂丨又作偏丨子炙轂子螺髻詳螺髙髻後馬廖上疏吳王好劒客百姓多瘡瘢楚王好細腰宫中多餓死城中好丨丨四方髙一尺城中好廣眉四方且半額城中好大袖四方全四帛本椎髻梁鴻妻孟光妝飾入門鴻不答妻曰妾自有隱居之服乃更為丨丨布衣荆叉布裙鴻大喜詳叉亦作結椎結箕踞陸賈傳一撮之髻其魋如椎義髻楊貴妃以假丨丨為飾好服黃裙後謠云丨丨拋河裏黃裙逐水流外傳兩髻王導拜司空桓廷尉作丨丨葛裙路邊窺之詳超墮馬髻孫夀善為丨丨丨詳收錦絞髻梁周𢎞正少時著紅褌丨丨丨踞寺門聽藏法師講法法師大相賞狎史新興髻趙合德乃飛燕妹與合德皆絶色召入宫新沐沉水香為卷髮號丨丨丨趙后外傳芙蓉髻見鳳髻下拋家髻唐末婦人作丨丨丨唐志手擁髻伶玄買妾樊通德談趙飛燕姊妹事以丨丨丨凄然泣下肉髻世尊從丨丨中湧出百寶光楞嚴五髻五臺山五峯聳出像菩薩頂丨丨活套雲丨係胡計切説文繫束也從人系聲又聨絡也孟丨纍其子弟易枸丨之隨卦系單子頸詳頸燕足丨縷詳燕或作結張釋之傳結襪讀曰係通作繫械繫漢祖丨丨蕭相國本帛書繫鴈足繫丨詳鴈赤繩係丨丨丨足昏因事詳繩金印係丨丨丨肘詳口系胡計切説文絮也又緒也繼也聨屬也世丨亦作繫漢書漢帝本丨丨易繫于苞桑活套象丨褉除惡祭水上盥潔也又祓除不祥也修褉王羲之蘭亭丨丨觀褉晉元帝初鎮建康上已丨丨王導諸名勝皆騎從吳人紀贍等覘之咸驚史契苦計切説文大約也又合也易聖人易之以書丨韓子宋人得丨密數其齒互又鑽龜也詩爰丨我龜丨劵事見劵右契執丨丨記曲禮兩書一札同而别之左契聖人執丨丨而不責於人老子古者刻契合符以為信木契丨丨銅魚起兵唐明皇紀燔契李上兼出粟萬斛貸鄉人屬年穀不登士謙對責家丨丨曰責了矣明年責家賚償士謙不受隋史參同契魏伯陽作丨丨丨二卷其説似解周易其實論作丹之意神仙傳互見丹托末契陸機嘆逝賦丨丨丨於後生選活套天