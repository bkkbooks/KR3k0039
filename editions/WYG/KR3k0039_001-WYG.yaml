body:
  text: 韻府羣玉卷一元隂勁弦隂復春編上平聲一東獨用東徳紅切説文動也从日在木中漢志丨方陽氣動在夾漈鄭氏曰木若木也日所升降在上曰杲在中曰東下曰杳一曰春方也記禮器大明生於丨詩朿山我來自丨床大雅緜自西徂丨孟決諸丨方則丨流莊順流而丨行坦腹丨詳床道東漢鄭𤣥事馬融辭歸融曰吾丨丨矣本易東丁寛學易於田何寛東歸何曰丨巳丨矣本乃東夏枯草名丨丨冬至後生五月枯本草活東科斗丨丨爾雅蝦蟇名急就章曰欵東亦曰欵凍以其凌寒而生丁東丁當珮聲或謂丨丨詩緝東即當也小東丨丨大東杼軸其空詩言大小皆取於東國闑東賓入不中門公事自闑西私事自丨丨記玉藻門東呌怒索飯啼丨丨杜謂庖厨丨在丨天東鼔角漏丨丨杜秀句滿丨丨荆公牆東避世丨丨王君公逢萌傳漢隠士王應仲也江東項羽敗還無面目見丨丨父老袁淑謂謝莊曰丨丨無我卿當獨步丨丨日暮雲杜山東丨丨出相山西出將漢史丨丨老癃思見徳化賈山遼東管寜自欲老丨丨坡寧至丨丨依公孫度避難若將終焉河東章瓊勅日給丨丨酒一升北史本傳移民丨丨孟丨丨吾股肱郡後甬東越滅呉使呉王居丨丨左哀二十膠東張敞為丨丨相漢書征東蜀馬超魏張遼諸葛誕晉王渾皆為丨丨將軍苻登謂雷惡地曰雷丨丨其聖乎晉鎮東蜀趙雲魏胡威諸葛誕皆為丨丨將軍史平東晉杜預王濬皆為丨丨將軍史齊以張壊為丨丨將軍密防王敬則敬則曰東今有誰只是欲平我爾然東亦未易可平史斗柄東丨丨丨而天下春淮南子馬首東欒黶曰吾丨丨欲丨乃歸下軍從之㐮十四水必東丨萬折丨丨茍在宥鴻溝東割丨丨以丨為漢西為楚漢祖紀畝盡東晉人曰必使齊之封内盡東其丨左成二官名東馮緄開綬笥有兩赤蛇分南北走許曼筮之曰三嵗後當為邊將丨有東丨後為遼東守吾欲東漢王曰丨亦丨丨爾安能鬱鬱久居此乎韓信傳梟徙東丨謂鳩曰我將東丨西方皆惡我聲詳徙川障東障百川而東之韓日映東丨没丨丨太𤣥日沒反照東也東復東家住錢塘丨丨丨李賀問在東王導問王述在東米價述不答詳價呉河東丨善為丨丨太守反叛者聞之丨丨丨來望風降㪚南史冦巴東寂寞丨丨丨坡萊公授巴東令呼丨丨丨湘山野録施家東西施所居有東丨丨西施家詳施葬桑東裴俠遭父憂擇地忽聞空中人曰丨於丨丨北史瀼西瀼東杜甫居丨丨復居丨丨人在丨丨東坡瀼音襄有文者東尹翁歸河東守田延年行縣至平陽召故吏令丨丨丨丨有武者西閲數十人尹獨曰翁歸文武兼備惟所施設本住西住東陸機參佐廨三間士龍住東頭士衡住西頭世説宿西食東齊女欲東家食西家宿詳宿在西笑東還如瞽者望長安長安丨丨向東丨僧皎然扶桑更東徐嶷送日本使還絶域將無外丨丨丨有丨扶桑東有碧海十洲記石言勿東丨丨於陜若言丨丨也晉劉曜松忽向東𤣥裝法師西域取經手摩靈岩寺丨曰吾西去汝可西長若歸即東向使弟子知之及去其枝年年西向一年丨丨丨弟子曰吾師歸矣果然號摩頂松大唐新話活套海丨陜丨齊丨籬丨鄱丨瀍澗丨五雲丨詩萹大丨刺亂也詳小東下人名陸丨景祐中為太子舍人獻文望賜館職賜進士出身擲勅不受東丨妓名竇鞏悼妓詩惟有側輪車上鐸耳邊長似呌東丨抒情集姓氏平原徵音舜七友東不訾之後涷説文水出發鳩山入于河爾雅夏暴雨謂之涷楚辭使丨雨兮洒塵又瀧丨沾漬貌蝀螮丨􅀈螮丨謂之虹同徒紅切説文合也从􅜪从口又􅜪重覆也一曰爵名祭以酌酒齊也共也孟公孫丑善與人同盡心下膾炙所丨也姓所丨也詩告子上得我心所丨然又有丨嗜焉滕文公上巨屨小屨同價我稼既同二之日其丨易乾卦丨聲丨氣中庸丨軌丨文丨倫左成廿八近不偪丨定四無違丨書詢謀僉丨禹謨四海㑹丨禹貢是之謂大丨洪範亦作仝雷同母丨丨曲禮蟻同蜂聚丨丨選笛賦子同丨丨生公曰是其生也與吾同物命之曰丨左言同日生孫同鄭𤣥丨手文似已名小丨又云𤣥與孫並丁夘嵗故名本傳阿同一旦扣門呼丨丨坡子由小字同叔殷同廣行人掌丨丨秋官又丨見曰丨丨丨六服盡來朝也趣同行合丨丨千里相從行不合丨不丨對門不相通淮南儀同後周伊婁穆字奴千周文曰奴干面作丨丨見我矣即拜丨丨參同魏伯陽著丨丨契論作丹意詳丹尚同墨子著丨丨三篇一同百里也列國丨丨左亦曰縣同三同劉孝標云予與馮敬通有丨丨不遇一也剛直二也俱有忌妻三也互見異字四同李摯與李敏同姓同嵗同門乂同年及第故詩云契分丨般丨六同六律合陽聲丨丨合隂聲律以竹同以銅言助陽宣氣與之同也禮大司樂典同掌六律丨丨百同王畿方千里積丨丨也禮戴師注事事同樂天寄元微之一生休戚與窮通處處相隨丨丨丨據亦同齊侯曰梁丘據與我和夫晏子曰丨丨丨也焉得為和左昭二十將無同王衍問阮瞻聖教與老莊同異答曰丨丨丨詳語面不同人心不同如其丨焉㐮三十一萬不同吹有丨丨丨莊活套度量丨庶言丨利害丨好惡丨歩驟丨尊酒丨臭味丨輕重丨多寡丨年號大丨梁髙祖人名盧丨號玉川子銅説文赤金也从金同聲一曰金之一品漢律厯志凡律度量用丨者取其為物至精不為燥濕寒暑變節不為霜露風雨改刑也酉陽雜爼山上有薑下有丨鐵魏證傳以丨為鑑可正衣冠膽銅丨水浸鐵成丨曰丨丨長編井銅鑿丨得丨買奴得翁詳奴青銅張鷟文猶丨丨錢萬選萬中員半千傳素絲悲丨丨歐水面磨丨丨曽鞏籠銅丨丨鼓報衙栁鄧通銅丨丨相當貧餓死文帝曰富通者在我賜蜀丨山得自鑄錢後有罪寄死人家崔烈銅丨丨入錢五百萬為司徒問其子鈞曰議者何如大人少有英稱議者嫌其丨臭首山銅漢帝采丨丨丨鑄鼎荆山下柏梁銅漢武起丨丨臺立丨柱仙人掌承露本虎符銅漢銅丨丨發兵遣使唐銅魚符詳符物為銅天地為爐萬丨丨丨鵩賦半通銅五兩之綸丨丨之丨皆有敇揚子綸綬也銅印也謂嗇夫印綬活套漏轉丨白錬丨有翬丨桐梧桐子可食青桐似梧桐無子白桐花黄紫色宜琴瑟爾雅曰櫬桐榮桐又赬桐夏花紅如火刺桐出泉州花先葉後則五穀熟今壓油者名岡桐又西域胡桐淚可汗金銀詩椅丨梓漆又卷阿梧丨生矣于彼髙岡孟拱把之丨梓孤桐嶧陽丨丨書青桐王義方置宅指庭中丨丨一雙曰此應酬直召宅主付錢四千瑣言剪桐成王與唐叔虞燕居援桐葉丨珪曰以封汝周公請封曰天子無戲言吕氏春秋爨桐呉人燒桐以丨蔡邕請為琴號焦尾活套井丨絲丨枯丨僮説文男有罪曰奴奴曰童女曰妾本作童从辛重省聲辛辠也徐曰童即罪人之子沒官供給使者今文作丨漢書注滇􅈎之地多出丨僕賈䇿今民賣丨者詩被之僮僮悚敬貌峒禹迹之内三崆丨黄帝問道處在汝州杜詩崆丨小麥熟在臨洮又其一在安定廣成子住崆丨千二百年筒韻㑹筒訓竹名筩訓㫁竹然唐人已用詩筒郫筒愚見二字可通用詩筒白樂天元微之唱和以丨著丨林逋集注郫筒蜀郫縣出大竹截以盛酒閉以藕絲包以蕉葉信宿香達于外曰丨丨酒杜酒憶丨丨不用沽郫音皮飯筒楚人五日竹筒貯米祭屈原坡丨丨仍愍楚翠筒丨丨初窒棟詳棟釣筒谷日落幾家收丨丨錢筒坡在黄日以丨百五十作一塊用不盡者貯竹丨中詳义連筒杜丨丨灌小園生龜脱筒山谷云俞清老欲為僧丨丨丨丨恐難堪忍後數年儒冠自若詳僧筩説文㫁竹也事詳見筒韻聽鳳竹筩伶倫取嶰谷之竹吹之為黄鍾之宫制十二筩丨丨之鳴自此黄鍾宫皆可以生之是為律本前律厯受書銗筩趙廣漢守潁川為銗筩投書其後民相告訐本若今盛錢筒可入不可出寄書竹筩陸機竹筩盛書係黄耳犬至家詳犬吸酒碧筩魏鄭公慤率賓佐避暑取荷葉盛酒刺葉與柄通屈莖如象鼻傳丨之名碧筩盃文帝紀童説文未冠者本作僮記十五成僮僮子也史記使僮男女七十人俱歌今作童又獨也言丨子未有室家者也又十五以下謂之丨子語互鄉丨子闕黨丨子書伊訓比頑丨詩狂丨恣行列堯游于康衢聞兒丨謠蜀先主舍東南一木丨丨若車葢乂宛丨即寄生草竒童李泌七嵗被召明皇方與張説觀奕説請試方圖動靜曰方若棊局圓若棊子動若棊生靜若棊死泌荅曰方若行義圓若用智動若騁才靜若得意説因賀得奇童神童賈黄中七嵗丨丨及第李昉詩七嵗丨丨古所難賈家門户有衣冠終童終軍入闗棄繻年二十餘號丨丨黄童黄香九嵗失母思慕憔悴號曰天下無雙江夏丨丨韓丨丨白叟青童倚樹招丨丨李乂仙人丨丨君又丨丨肝神黄童脾神黄庭阿童童謠云丨丨復丨丨銜刀浮渡江王濬小字丨丨羊祜因表留監軍為順流計晉聖童漢任延年十一明詩易春秋號丨丨頭童丨丨齒豁韓宛童女蘿曰丨丨爾雅又云老秃鶖五尺童丨丨丨子羞稱五伯仲舒䇿八百童前巴寡婦清富至童丨丨人山不童史八老還童淮南王安八公詣門王使閣人難之丨公曰王薄吾丨今則少矣八公皆變為童子門吏驚報王北面叩首八童子復為老人授王丹經三十六卷與王白日升天雞犬䑛藥亦升天故雞鳴天上犬吠雲中神仙傳為兩郎童越人生男女必貨視之童區寄者十一嵗二豪刼持虚所賣之童同一豪睡取其刃殺之一豪將殺童童曰丨丨丨丨孰若為一郎童云云童又殺一豪刺史竒之栁區寄傳名聞兒童兒童誦君實走卒知司馬坡夢賜玉童王相國丨人領一綠衣童子曰汝有憂民之心丨此丨丨為宰相子是夕夫人孕生慶之湘山野録活套桑下丨心猶丨詩篇狡童刺恣也權臣擅命姓氏雁門宫音顓頊生老童因氏丨恢字漢宗為不其令虎傷人捕虎論罪遷丹陽守後漢瞳目童子重瞳堯眉八彩舜目丨丨淮南項羽亦丨丨又隋魚俱羅丨丨煬帝忌而誅之又南唐李煜一卷目丨丨又五代東漢劉旻丨丨方瞳丨丨壽千嵗詳方紺瞳丨丨綠髪仙翁也神仙傳綠瞳唐㸃戛斯古堅毘國其人赤髪丨丨李陵居其地生而黑瞳者必曰陵苗裔史青瞳黄眉翁丨丨詳眉月如瞳徐穉九嵗人曰丨中無物當益明徐曰丨人眼中有丨子無此必不明世説龍瞳鳳頸武后赤脈干瞳袁天罡曰竇軌丨丨丨丨為將必多殺唐書活套雙丨兩丨坡侗揚子倥丨顓䝉注無知也曈日欲出朣月欲出絧布名罿魚綱艟朦丨戰船又舟名穜説文禾先種後熟本作種今文作丨陸徳明曰禾重是重穋字或單作重詩黍稷重穋是也潼説文水出廣漢梓丨北界水經注今華州華隂縣南入墊江又州名潼川府本唐梓丨郡又闗名通典本名衝闗言州衝華山之東後因丨水遂名闗衕通街犝説文無角牛通作童易童牛之牿􅩫説文無角羊通作童詩俾出童羖􅀈馬酪氃氋丨㪚毛貌詷説文共也一曰諏也㢥繫船杙􅔓舟名鮦魚名爾雅鰹大者丨丨貪以死餌詳豚中陟弓切説文和也从口丨上下通也一曰平也書建丨又允執厥丨中庸時丨左受丨以生漢書制丨二千石謂滿也天中端午為丨丨節人中丨丨長一寸壽一百相書唇也土中自服于丨丨書召詰宅中丨丨圖大東京賦禺中日出暘谷至衡陽曰丨丨淮南子近午也環中樞始得其丨丨以應無窮莊齊物是非反覆相尋無窮也惠中秀外而丨丨盤谷序熱中不得於君則丨丨孟賦中中禹貢考中中盧承慶考課一官遭風失米曰考中下其人自若改曰非力所及丨丨丨云云又改云寵辱不驚考中上詳辱時一中徐邈曰臣不能自懲丨復丨丨之詳聖射奉中司丨丨丨注士鹿中大夫兕中刻木如兕虎而伏背上立園圈以盛筭者曰中記射事飾中舍筭禮春官太史鄉射禮君國中射則皮豎中於