body:
  text: 韻府羣玉卷十六元陰勁弦陰復春編去聲二十三禡獨用禡莫駕切説文歸行所止恐有慢其神下而祀之曰丨从示馬聲詩是是丨式貉禮縣師祭表貉則為位亦作伯詩既伯既禱罵説文詈也从网馬聲穎果卿丨賊詳古子丨母詳乳嫚罵漢祖丨丨儒生趙王傳又陸賈前説詩也帝罵之善罵四皓曰下輕士丨丨臣等義不辱張良傳笞罵髠刖丨丨賈誼傳夲作傌官長罵醉即騎馬歸頗遭丨丨丨杜贈鄭廣文䖍為廣文舘學士性嗜酒不治事故也隣妻罵人有挑其丨之丨者長者丨之少者報之後其夫死而娶其長者曰在人欲其報我在我欲其罵人後馮衍傳馬亦罵彼馬罵此馬曰塞此丨丨丨彼馬曰眇詳眇捶地大罵禰衡詣曹操坐大營門以杖丨丨丨丨吏曰外有狂生言語悖逆操怒送與劉表史行酒怒罵灌夫於田蚡坐上丨丨至灌賢賢方與程不識耳語又不避席夫丨丨曰平生毁程不識不直一錢今日長者為壽乃效兒女曹呫囁耳語本王述受罵謝無奕極罵丨丨述正色面壁不動半日謝去時人嘆其性急而能有容世説醉人推罵得罪以來與漁樵雜處徃徃為丨丨所丨丨輙自梧漸不為人識東坡答李端叔書訶佛罵祖詳祖活套笞丨嘲丨駕古訝切説文馬在軛中从馬加聲語不侯丨大駕漢制丨丨屬車八十一乗鶴駕王子喬周靈王太子晉也吹笙作鳳鳴後於緱氏山乗白丨而去故太子之丨曰丨丨宫曰白鶴列仙傳再駕文王丨丨降祟左三駕晉丨丨而楚不龍與爭襄九别駕漢制丨丨從事史一人刺史行部别乗一乗傳車故曰丨丨漢書互見驥十駕驥一日而千里駑馬丨丨亦及之矣荀子夙駕星言丨丨詩定之方中獨駕阮藉率意丨丨不由徑路詳途枉駕徐庶曰此人不可屈致將軍宜丨丨顧之葛亮傳勸駕漢髙詔賢士大夫能從我游者吾尊顯之御史中執法郡守身丨而為之丨遣詣丞相税駕李斯曰吾未知所丨丨史舍車曰丨倉駕唐畢誠李徳裕忌之累官駕部外郎倉部郎中時以丨丨二曹為辱諴如處美官史泛駕丨丨之馬􅘆弛之士漢武紀晏駕宫車丨丨漢天文志天子當晨起方崩稱丨丨者臣子之心猶謂宫車晩出也俗士駕請回丨丨丨為君謝逋客北山移文嵇吕命駕晉吕安與丨康友毎一相思輙千里命駕嵇康傳架亦作枷記不同椸枷㦸架柳仲郢毎遷必鳥集丨丨皆滿詳烏禁架後徐登但行丨丨所療皆除葉法善傳即丨術陰陽占繇符丨之術間架唐徳宗初税丨丨稼説文禾之秀實為稼莖節為禾从禾家聲一曰在野曰稼種之曰丨歛之曰穡詩我丨既同又大田多丨司稼丨丨掌巡邦野之稼禮木稼寜王卧疾引諺語曰丨若丨達宫怕吾其死矣果然舊唐書即丨冰木介躬稼禹稷丨丨孟學稼樊遲語嫁説文女適人也从女家聲坡隨宜了昏丨梁鴻釋對不丨詳叙漢辰負女孫五丨又丨怨丨禍丨非難嫁富家女易嫁太早輕其夫貧家女丨丨嫁晚孝於姑樂天不再嫁梁寡婦髙行者梁貴人欲取之乃割鼻曰所不死者不忍幼嗣重孤也劉長卿卒妻有男十五而夭乃刑耳自誓不嫁六帖後陰喻妻荀爽名采早寡父母强嫁與郭奕偽與郭奕歡以粉書扇曰屍還陰氏自縊死房𤣥齡微時病謂妻盧曰吾病革君年少不可寡居善事後人盧泣剔一目以示信𤣥齡愈禮之終身崔儈妻盧氏斷髪不嫁婦取不嫁漢蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求丨何取曰丨丨丨者通曰求臣亦猶之也史不來後嫁晉重耳將適齊謂季隗曰待我二十五年丨丨而丨丨互見隗價亦作賈孟巨屨小屨同丨聲價丨丨益廣後靖王傳索價少室山人丨丨髙兩以諫官徴不起韓言李渤飾價孔子為政三月粥羔豚者弗丨丨善賈求丨丨而沽諸語連城價自許丨丨丨韓蒲葵價謝安鄉人有丨丨扇五萬安取執之丨數倍詳扇馬増價蘇代曰有賣駿丨者三旦人莫與言伯樂視之去而復顧價丨十倍詳馬唐酒價宋真宗問近臣丨丨丨丁晉公曰杜詩云連來相就飲一斗恰有三百青銅錢是一升三十也玉壺清話問米價王導辟王述為中兵屬導丨江東丨丨述張目不答導曰王掾不癡人何言癡西園諧價當差之官者皆至丨丨丨丨後張讓傳雞林詩價白居易詩人爭傳之丨丨國相篇易一金詳林洛陽紙價左思三都賦成競相傳寫丨丨丨丨貴詳賦伯休守價後韓康字丨丨賣藥不二價有女子從康買藥康丨丨不移女子曰公是韓丨丨邪乃不二價康嘆曰我夲欲避名今女子乃知有我遂遁入山中後漢書金同土價齊髙祖曰我治天下十年使黄丨與土丨價本通米増價盧恒為宣歙觀察使榖價日増或請抑之恒曰宣歙土狹榖少若價賤則商船不行益困矣監趙宋趙清獻公抃知越州兩浙旱蝗禁增米價公獨牓任増價糶之米商輻輳賈更賤民免餓死假以物貸人又休告也社假放翁無丨丨閉户讀殘書斚又馬韻亞衣嫁切説文亞醜也象人局背之衫賈侍中説㠯為次也孟丨聖大賢齊陸慧牋傳内侍我之流丨匹亞新晴百鳥語名自有丨丨谷罷亞鄰婦悲歌㫪丨丨坡一枝亞尚有殘梅丨丨丨坡風吹亞野竹丨丨丨孟管蕭之亞諸葛亮丨丨丨丨婭兩壻相謂曰丨詩瑣瑣姻丨稏擺丨稻多貌罅呼訝切裂也又孔丨天罅嶺石圻丨丨韓縣齋葉罅尤有殘花藏丨丨歐補罅丨苴丨漏進學解活套石丨隙丨竹丨嚇以口拒人詳陌韻迓吾駕切説文本作訝相迎也書旁作穆穆丨衡敬丨天威或作御詩百兩御之掌訝丨邦國之等藉以待賔客禮秋官迎賔客者卿訝諸侯有丨丨丨有大夫丨大夫有士訝禮秋官活套邀丨訝説文注見迓字又疑也活套嗟丨疑丨砑碾也汝陽王戴丨硝㡌打曲丨光㡌舞山香曲並詳㡌張麗華凭臨春閣書小丨紅綃詫丑亞切誇也漢相如生傳子虛過丨烏有先差異也韓搜簸真丨事汊水岐流又鴈丨地名咤陟駕切説文噴也叱怒也本作吒从口乇聲記母丨食淮陰侯傳喑啞叱丨活套悲丨奼美女也韓歸弄小女詐側架切説文欺也从言乍聲語由之行丨又今之愚也丨不逆丨左我無爾丨人窮則丨詳窮狙詐御得其道丨丨咸作使御失其道丨丨咸作敵揚問道巧詐丨丨不如拙誠詳誠飾詐公孫𢎞為布被丨丨以釣名追信詐漢祖曰將軍亡者十數公無所追丨丨丨也史責蕭何王車詐紀信詐乗丨丨降楚詳車善惡詐湛詳言正色或謂偽詐湛笑曰誠詐也人詐惡我詐善不亦可乎後本活套讙丨詭丨醡壓酒具蜡鋤駕切本作䄍索也合聚萬物索饗百神年終凡有功於人者求其神報享之迎猫為其食田䑕迎虎為其食田氶也開元丨臘用戌日大蜡夏曰清祀殷曰嘉平周曰丨丨秦曰臘觀蜡子貢丨丨孔子曰樂乎對曰一國之人若狂家語乍止也暫也活套雨晴丨謝辭夜切説文辭去也从言射聲一曰告也代謝四時選丨丨摧謝湯奏事即譴湯丨丨張湯傳占謝晉何劭有姿望帝輙有所賜觀其丨丨焉本王謝舊時丨丨堂前燕唐詩曹謝文章薦丨丨社鮑謝賦詩何必多徃徃凌丨丨杜二謝南臺丨丨無人繼坡謂瞻及靈運九日詩也詳熙負荆謝㢘頗肉祖丨丨丨罪詳虎免冠謝貢禹丨丨詳冠攝衣謝酈食其曰不宜踞見長者漢祖丨丨丨之髙祖紀舉手謝王子喬於鍭山乗白鶴丨丨丨時人數日而去列仙傳學三謝荆公丨丨丨詩失於巧爾后山詩話靈運惠連𤣥暉詩六十四篇為三謝詩出唐子西語錄豈有私謝漢張安世嘗有所薦其人來謝安世大恨以為舉賢達能丨丨丨丨邪本晉羊祜所薦人皆不知曰拜爵公朝受恩私門吾所不取載歸弗謝晏子贖越石父於縲絏之中丨丨丨丨詳已其嗟其謝丨丨也可去丨丨也可食記黔敖為粥事詳粥後謝前謝梁謝幾卿隋西昌侯藻北伐僕射徐勉曰淮肥之役前謝已著竒功今謝何如幾卿曰已見今徐勝於前徐丨丨何必愧於丨丨史活套多丨花開丨歡意丨事欲丨東山丨西堂丨姓氏陳留商音纘炎帝之𦙍申伯受封於丨今汝南丨城是也詩亹亹申伯王之事于邑于丨後以國為氏魯有丨息丨夷吾字堯卿後漢人才兼四科行包九徳丨安字安石少時放情丘壑人言安石不出如蒼生何圍棋賭墅詳棊折屐齒詳齒携妓遊東山詳妓謚文靖丨鯤字幼輿一丘一壑自謂過庾亮飛梭折齒詳齒丨尚字仁祖八嵗神悟夙成或稱一座顔回牛渚與袁宏談論詳渚為鎮西將軍丨萬字萬石早有時譽謝氏秀彦者封胡羯未丨靈運詩書兼絶每文自寫之文帝稱為二寶屐為永嘉太守名山勝水肆意遊遨西堂詩夢詳草登山去前齒詳屐襲封康樂公丨奕安之兄與兵帥共飲詳兵後為豫州刺史丨𤣥奕之子芝蘭玉樹詳樹肥水之捷𤣥為前鋒封康樂縣公丨混字叔源風華為江左第一與謝晦俱在宋武前帝曰一時􅉐有兩玉人丨朓字𤣥暉文章清麗書草𨽻長五言詩沈約云二百年來無此詩也遷直中書省有蒼苔依砌上紅藥當堦翻句又登三山詩澄江净如練丨藥字敬冲十嵗屬文梁初為尚書令丨惠連十嵗能文靈運云每有篇章對惠連輙得佳語詳章丨莊字希逸宋文帝曰藍田生玉豈虚也哉江東獨秀詳秀丨超宗殊有鳯毛詳毛不衣自煖詳暖丨門無雜賔有時獨醉曰對吾飲者惟當明月詳醴丨覽字景條梁武帝曰此生芳藺竟體丨偃正觀初對髙第嘗為塵影賦二篇時李百藥工詩偃善賦稱李詩謝賦丨顯道趙宋人名良佐學去矜字詳矜嘗云打透名利闗便是小歇處丨諤字昌國新喻人榜所居曰艮齋曰桂山光宗時十嵗除工部尚書丨絳字希深文章典雅有元白風與歐公梅聖俞䓁相從為樂後為制誥丨氏謝小娥報父讐殺賊詳賊謝英妃武夷君㑹于慢亭英妃撫長劍互見亭謝𤣥女妻袁湛謝安女妻王國寳詩謝道韞詠雪事詳雪成謝師厚方檡壻見山谷曰得壻如是足矣遂婚幼女妻壻茂湛榭臺上屋記月令可以處臺丨西都賦長楊之丨風榭丨丨桞微舒杜瀛洲榭帝起丨丨丨趙后登之歌婦風送逺之曲外傳互見裙活套髙丨虚丨人名王丨至烏衣國詳國暇胡駕切説文閒也書不敢自丨詩夫我則不丨孟國家閒丨漢祖紀日不丨給滕閣記十旬休丨唐仇士良謂中人曰天子不可令閒丨史整暇栾鍼曰日臣使於楚也子重問晉國之勇臣對曰好以衆丨曰又何如曰好以丨云云請攝飲焉公許之左成丨六應接不暇王子敬云山陰道上行山川自相映發使人丨丨丨丨世説活套偷丨書丨假美也樂詩丨下降也易以貴丨賤孟膏澤丨於民漢文紀詔書數丨仲舒丨帷詳帷在下之下見馬匀東下乗勝丨丨晉書禮下丨丨賢者周紀齊城下漢酈食其掉三寸舌下丨七十餘丨本鷗不下海翁明日至海上鷗鳥舞而丨丨詳鷗為易慮也馬當下越人結交盟曰我若歩行君乗馬它日相逢丨丨丨詳壇五行並下漢應奉讀書丨丨丨本又北齊邢邵十行俱下梁簡文讀書丨丨丨丨史宋孝武讀書七行俱下並從天而下漢周亞夫擊吳時趙渉曰將軍何不右走藍曰秖洛陽直入武庫諸侯聞之謂將軍丨丨丨丨也本强笑相下丨丨語以丨取丨詳肝蓴羮未下千里丨丨丨丨鹽豉詳蓴騎虎不得下丨丨之勢必丨丨丨詳勢活套信筆丨氣愈丨風露丨鷗鷺丨夏時也春丨非中丨殷丨之丨詩四月維丨燒夏炎風每丨丨韓活套朱丨長丨夜羊謝切詩子興視丨雞鳴丨如何其丨未央夜氣箴冬乃四時之丨五夜甲夜乙夜丙夜丁夜戊夜丨丨漏聲催曉箭賈至詩亦五更獨夜丨丨不能寐攝衣起撫琴王仲宣詩𤣥夜遺思在丨劉公澣詩白夜丨丨月初弦杜夜詩縞夜積李兮丨丨祟桃兮炫畫荆公詩坡云離騷句法今復見之西清詩話專夜妾未滿三十必與五日之御記内則注夫人丨丨分夜斥候士丨丨擊刁斗詳斗問夜士相見禮夜侍坐丨丨儀禮問其時數放夜金吾執金杖掌宫外戒非常