丨成五佩表所能所以丨者丨見丨丨如修道無窮即佩環能决嫌疑即佩玦白虎通願力能李通𤣥華嚴論地前善薩是凡夫故有地前成佛者推為誓丨丨丨非本法柱到天壇丨丨丨谷佛有七能嵩神謂元珪曰我神通亞佛師曰汝神通十句五能五不能佛則十句七能三不能佛能空一切相成萬法智而不能即㓕空業佛能度無量有情而不能盡人从生界佛能知羣有性窮億劫事而不能化導無縁傳燈人名薛丨詩人然句格不高盧恵丨六祖騰徒登切說文傳也从馬􅿯聲又馳也躍也升也記地氣上丨累牛丨馬月令犗馬也韓飛黄丨踏去沸騰百川丨丨十月謗議丨丨選鶱騰草罷鳯丨丨杜崩騰江風吹水雪丨丨蜚騰丨英聲丨茂實詳實軒騰赤雲助丨丨曽子固瞢騰香衾煖處睡丨丨王建宫詞馬騰丨丨于糟平准碑價騰物丨丨踊唐食貨火色騰馬周丨丨丨上恐不能久詳肩活套震丨掀丨雲丨人名天竺國摩丨白馬䭾經詳經滕說文水超踊也从水朕聲又張口騁辭兒左郜雍曹丨孟子丨小國也反齊丨之路易丨口説也長滕左角看破楚南柯聞丨丨坡乃丨丨侯左姓氏南陽宫音周文王子丨侯之後以國為氏丨曇恭父母卒水漿不入口者七日號滕曽子丨元發名甫東陽人仕趙宋知鄆州民有爭公田二十年不决甫曰學無食而以良田飽頑民乎乃請為學田淮南京東饑多流民丨丨丨以城外廢營地為屋二千五百間井竈器用皆具活流民五萬人丨宗諒字子京洛人修岳陽樓范文正公為記謄移鴈也幐囊可帶者藤在草曰􅇠絲在木曰松蘿子紫黒色名榼丨一名象立佛家有四丨閣吟詠先柔後為害有似䛕侫徒居易紫藤莖如竹根重重有皮經時成丨丨可以降神草木狀王屋千霜老丨丨黄赤藤丨丨杖歌韓烏藤莫把丨林笑朝市老夫手裏有丨丨坡鍾藤纒裹樹即死藤成樹大者十圍可為杖為篾勝竹異物志癭藤酌以丨丨文樽坡剡溪藤丨丨古丨甚多可造紙為把粟尾書溪藤坡樹困藤㡬嵗養成為大丨一朝纒繞丨長丨韓䑕咬藤有人逃死入井遇四蛇傷足欲上樹則逢二丨丨丨詳蛇臥古藤秦少游詞云醉丨丨丨隂下杳不知南北後至藤州卒弔剡藤舒元輿丨丨溪丨文今之為文者皆夭閼剡藤生有涯錯為文者無涯所以丨丨溪丨以寄其悲丁公藤齊觧叔謙母疾夜祈福聞空中語云得丨丨丨為酒便差即訪醫及本草皆無識者乃訪至宜都郡山中一老公曰此丨丨丨療風尤驗此公忽不見母病即差史常春藤唐姜撫云服太湖丨丨丨終南山旱藕可長生𤣥宗詔天下使自求之民間以藤浸酒多暴死撫逃去史活套瘐丨翠丨枯丨寒丨話葛丨簟鋪丨縢說文减也家語金人三緘其口則緘是束縳之義緘以金若今釘鐷之不欲人開說文鐷音葉金縢縢束也謂尚之以金書注緘縢攝丨丨固面繘莊緑縢朱英丨丨詩閟宫緄縢竹閉丨丨詩小戎行縢詩斜幅在下注如今丨丨也謂幅束其輕至縢者恒胡登切說文恒常也从心从舟在二之間上下心以舟施當也詩如月之丨又北嶽丨山卦名雷風丨初六浚丨貞凶無攸利九二悔亡九三不恒其徳或承之羞貞吝九四田無禽六五丨其徳貞婦人吉夫子凶上六振丨凶程觧以振動為常故凶縆居登切說文大索也亦作絙高縆梁有丨丨妓謂兩娼女對舞大䋲上相逢比肩不傾事物紀原環縆信知後㑹時日月屢丨丨韓搄說文引急也从手恒聲一曰丨猶亘也横亘之也淮南子大弦丨則小弦絶韻府羣玉卷七
