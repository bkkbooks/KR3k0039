body:
  text: 韻府羣玉卷七元隂勁弦隂復春編下平八庚與耕清同用庚古行切説文位西方象秋時萬物丨丨有實也庚承丨己象人字苑丨嵗名商横爾雅又名上章大横丨横貌詳横長庚東有啟明西有丨丨詩李白母方娠夢丨丨故字太白伏庚秋以金代火故庚日必伏詳伏呼庚丨丨癸乞糧事詳癸先庚丨丨三日後庚三日巽卦夷庚以塞丨丨注來往要道也左傳斗指庚處暑後十五日丨丨丨為白露厯書厯中甲庚丨丨丨丨性中仁義前翼奉傳甲為仁庚為義犯禾請庚季子將葬其妻丨人之丨申祥丨丨之注償也檀弓書篇盤丨詩篇由丨萬物得由其道也小雅鄉飲酒禮笙由丨人名荀丨晉大夫李長丨鶊鶬丨月令作倉庚又名商庚麥黄韵鸝丨韓賡續也説文丨本古文續字書乃丨載歌坡還將清廟什留與野人丨活套韵難丨句共丨更改也一曰歴也記悉數之不能終其物丨僕可也董䇿琴瑟丨張題丨化同上許劭毎月朔輒更其品詳評出謁丨僕詳僕嚴更䘙以丨丨之置西都賦督夜行鼓也鼉更丨宵鳴如桴鼓其數應丨吳越謂丨丨晉安海物記率更掌漏刻官前百官志歐陽詢為太子丨丨令善書踐更古者工卒無常人迭為之一月一更曰卒更富者顧負者月二千曰丨丨天下之人皆直戍邊三日雖丞相子亦在調一嵗一更不行者出錢三百入官以給戍者曰過更漢昭紀注六更宫中有丨丨君王得晏起開元遺事田更野外丨丨謂野老也列子紛更約束丨丨汲黯傳長短更倦聼山城丨丨丨坡蝦蟆更夜行擊柝代更籌曰丨丨丨事物紀源陳三更宋太宗朝陳儀董儼為三司副使毎夕㑹飲樞弟歸常逮夜語曰丨丨丨董半夜三老五更設丨丨丨丨羣老之席位焉記世子取象三辰五星樂記注云老人知三徳五事者又云年老知五行更代事又曰更當作叟以漢顯宗養丨丨丨丨於辟雍鄧展曰漢直三公為丨丨大夫為丨丨年老持更晉劉𢎞夜聞城上持更者嘆甚苦呼之乃一兵年老羸疾無襦遂給袍帽活套寒丨殘丨月三丨人名滕丨孟子不答彭丨問孟子傳食諸侯羮説文本作鬻五味和丨也从鬻从羔一曰羔羊也語疏食菜丨孟簞食豆丨書若作和丨左和如丨焉昭二十蓴羮張翰事詳菰千里丨丨詳跂藜羮孔子厄於陳蔡丨丨不糝豆羮簞食丨丨見於色孟羊羮中山饗士司馬子期在焉丨丨不遍怒走楚説伐中山中山君亡有二人挈戈随後曰臣父餓且死君下壺飡哺之故來死君也君曰吾以一杯丨丨亡國以一壺飡得士二人戰國䇿梟羮漢使東郡送梟五月五日為丨丨賜百官以惡鳥故食之漢武紀大羮丨丨不和有遺味者矣樂記吳羮和酸若苦陳丨丨些楚詞注丨人善作丨鉶羮祭祀共大羮丨丨賓客亦如之禮天官大羮不致五味丨丨則加鹽菜一説云丨以盛丨兩耳三足大之陪鼎三禮圖絮羮客丨丨主人辭不能烹曲禮絮調也芼羮丨丨雉羮内則魚肉為羮丨以菜也受羮丨丨反錦叔向事詳錦懲羮丨丨吹虀詳虀覆羮捩手丨丨乞巧錦帶羮滑憶雕胡飯香聞丨丨丨杜荆湖間有丨丨春末間花紅白如錦苗嫩脆一云錦帶吐綬雞若禽名有練帶繡帶此詩秋作非言花明矣碧澗羮鮮鯽銀絲杜香芹丨丨丨玉糝羮奠將南海金虀膾輕比東坡丨丨丨詳糝黒鬢羮李林甫子壻鄭平鬢髪班白曰上賜甘露羮食之一夕鬢黒明皇雜録骨董羮取飲食雜烹之名丨丨丨詳董轑釡羮高祖過丘嫂嫂丨丨丨佯為羮盡後封其子羮頡侯漢紀知母羮陸績繫獄見餉羮丨丨所調曰母丨葱必寸斷肉必方以此知也本遺母羮穎考叔鄭莊公賜之食食舎肉曰小人有母皆甞小人之食矣未甞君之羮請以丨之左婢覆羮劉寛丨丨丨汙朝衣詳手門如沸羮唐王伾事御手調羮李白召見金鑾殿帝賜食親為調羮互見驢韻烹子遺羮樂羊中山中山人丨其丨丨之丨羊啜之盡一杯禇師譖曰其子食之其誰不食羊下中山文侯賞其功而疑其心戰國䇿分我杯羮項羽為高俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾與若約為兄弟吾翁即若翁幸丨丨丨丨漢高紀秔說文稻屬一曰稻不粘者从禾亢聲或作粳長楊賦馳騁丨稻之地香秔遣兒向市賖丨丨杜淅玉炊丨丨韓種秔淵明二百五十畝種秫三十畝丨丨詳秫長腰秔江南有丨丨丨米詳腰終身不食粳陳徐孝克初貧母患欲粳米不能常辦母亡有遺粳米者對之涕泣丨丨丨丨丨史活套新丨炊丨阬客庚切説文閬也或作坑曾阬佛嶺東西曰丨丨今屬北苑茶多苦亦重濁試茶録君家新致雪阬茶言丨丨也坡茗花浮丨丨俗雪阬見上硯阬端溪有新阬舊阬出石作丨佳詳綆秦坑丨丨儒邪儒坑秦邪司空圖銘焚書坑儒書序溝坑意行信足無丨丨不識五郎呼作卿坡饑坑不得填丨丨亦解堯心憂盧月蝕詐坑丨丨降卒詳降踏坑摴蒱凡子落坑塹者非賞采不出凡一馬打一馬如遇退六踏馬則一馬踏三馬故世指不循理者為丨丨塹詳塹赦外黄不阬項羽降外黄欲阬之外黄令舎人兒年十三日阬外黄則梁之十餘城皆恐莫肯下矣乃丨丨丨丨丨史記活套禍丨焚丨迷丨盲眉庚切說文目無眸子从目亡聲與𦕈瞎韻通看韓問道於丨老五色令人目丨五音令人耳聾青盲公孫述徵賢士任永馮信等皆託丨丨以辭漢獨行傳偏盲今天只兩目何故許食使丨丨韓月蝕心盲豈惟耳目有聾盲㦲心亦有之莊當今盲於籍丨者皆是藉丨於目而心則别是非韓代張書一目盲偏使丨丨丨盧月蝕溪谷盲側身上視丨丨丨詳谷盲黒暗也子夏盲杜欽目偏盲與杜鄴俱字丨丨人呼為丨子夏詳冠免役以盲宋人有行義者三世同居父子俱盲後楚攻宋死者太半此人父子以疾免詳犢蝱說文齧人飛蟲从䖵亡聲大曰蝱小曰䗽通作虻莊蚊虻噆膚孫思邈著千金方後乃取草木代蟲丨水蛭詳戸解飛蝱光武取丨丨箭攻赤眉東觀漢紀采蝱陟彼丘阿言丨其丨詩載馳貝母也治心氣鬱摶蝱愛牛者丨其丨史記横戸盲切說文䦨木也从木黄聲韓未有至寳丨弃道側大横漢文紀代王卜之兆得丨丨占曰丨丨庚庚予為天王庚庚横皃洪範疏云横者是土此文帝有大土之象𤣥璧庚庚有横理谷摘阮歌參横趙師雄寢起在大梅花下月落丨丨惆悵而已詳梅劔横孤丨盡日丨吕仙舟横孤丨盡日丨㓂萊公從衡合從連衡史記蘓秦主丨六國攻秦張儀主丨六國事秦詩衡從其畝注東西曰丨南北曰丨江山為助筆丨丨山谷横與衡同三三横丨丨丨兩兩從習字也詳習白氣横𢎞忍曰廬山丨丨丨分六道莫是横出一枝佛法否師曰善詳枝韻活套眉丨雲丨山丨老氣丨玉繩丨膝琴丨一笛丨大江丨嵗名商丨庚嵗詳嵗人名郭子丨為人剛直詳觥田丨挽歌詳歌璜玉名詳陽黌學舍通作横漢鮑徳傳修起丨舍鍠鋰聲通作喤詩執競鐘鼓喤喤韓鐵鐘孤舂丨喤諠怒也又小兒聲詩其泣丨丨祊鋪盲切廟門内祭也詩祝祭于丨楚茨又邑名左鄭伯請以泰山之丨丨易許田三月使宛來歸丨隱八韓孝思事嚴觥古横切以牛角為之無兕用木為兕形大七升周宣閭胥掌其比丨撻罰之事小胥丨其不敬者是丨罰爵也但卷耳七月稱兕丨皆非罰然則丨爵之大者或用以罰非専為罰也兕觥酌彼丨丨卷耳丨丨其觩桑柔罰觥王羲之蘭亭之㑹詩不成者各受丨丨飛觥元稹云昔曽於解縣飲酒余為觥録事有人頻犯語令連丨十數丨不勝逃去乃黄丞也後奉使東川至褒城驛有黄明府見迎問其前御即黄丞也説前事黄生惘然而悟與之盡懽作贈黄明府詩巨觥宋李仲容侍讀善飲號李萬回真宗飲無敵飲則召公仲容曰告官家免丨丨互見家韻破觥白衣送酒舞淵明急掃風軒流洗丨丨坡觥觥闗東丨丨郭子横後郭憲傳剛直皃彭觥側身上視溪谷盲枝撞玉板聲丨丨韓記夢玉鍾聲也㡬舉觥解襟顧景丨丨丨坡聱牙體活套金丨杯丨彭薄庚切說文鼓聲从壴彡聲詩百兩丨丨出車丨丨駟騵丨丨皆壯盛也嚴氏云詩中彭字並如字惟有行人丨丨逋旁切易匪其丨蒲光切三彭僧契虚過仙人曰爾絶丨丨之仇乎彭者三尸之姓學仙者先絶三尸宣室記殺三蟲即丨丨桞丨丨者彭質彭矯彭居老彭竊比丨丨語殷賢大夫或云即彭祖也黥彭諸葛亮以馬超比丨丨鬬羽傳田彭江淮間語曰貴如郝許富如丨丨史以郭為彭昔以彭為郭今丨丨丨丨謂彭蜞郭索也誠齋蟹賦活套韓丨人名岑丨漢光武將姓氏隴西商音大彭為商伯盖陸終第三子彭祖即大彭也備要史記舜紀注彭祖陸終氏第三子籛鏗之後後為大彭亦為彭祖自堯歴夏殷封於大彭八百嵗甞㑹村人于幔亭詳亭丨宣字子佩淮陽人治易入為右扶風遷御史大夫封長平侯前丨修字子陽㑹稽人年十五拔佩刀向盗盗曰此童子義士也後丨乗字利建益州人宋仁宗曰彭乘恬退之士也遂用之丨汝礪字器資鄱陽人舉進士為禮部第一擢太子中允監察御史裏行首陳十事皆人所難言者丨循仕吳民歌賢令彭子陽丨思永氣宇高爽議論清贍棚説文棧也唐徐商襄州多山丨為盗商取山丨林卒為捕盗將兵所捕必得遂為精卒史錦棚長安富人於林亭内植畫柱以丨結為凉丨召名妹間坐逓請為避暑㑹開元遺事書棚白蛾飛舞地幽蠧落丨丨韓松棚避暑結丨丨選傀儡棚看取人間丨丨丨谷乞巧棚東京七夕家家錦綵結丨丨丨嵗時記夜叉棚潘樓街南大小勾闌五十餘座有蓮花棚牡丹棚丨丨丨象棚最大者可容數十人夢華録活套凉丨戲丨榜輔弓弩者輣兵車也韓威暢捐衝丨搒通作搒笞擊也前漢書丨笞數千活套敲丨亨許庚切易品物咸丨坤卦何天之衢丨大寳箴拯溺丨中彭亨龍頭縮􅀢蠢豕腹漲丨丨韓石鼎君家水茄白銀色硃勝埧裏紫丨丨谷詩亨秀語出寒餓身窮丨乃丨坡小亨丨丨吉旅卦活套震丨元丨泰丨謙丨橕抽庚切説文邪柱也作撑非孤橕浮虚有新斸摧抗饒丨丨韓丨丨有巉絶韓南山拄橕纒索相丨丨坡撐腸丨腹文字五千卷盧搪橕翎獵倒側相丨丨韓月蝕丨音唐搪揬也丨柱也小舟橕桞隂橕出丨丨來萬卷橕丨丨推胷兀丨拄坡活套支丨斜丨瞠直視也莊丨若乎後矣詳亦作上林賦留眎丨眙選鐺釡屬有耳三足温酒器酒鎗齊景陵王子良遺何㸃以徐景山丨丨史鎗與鐺同鼎鐺丨丨玉石阿房半升鐺一粒粟中蔵世界丨丨丨内煑山川吕仙有耳鐺趙宋雷徳驤判大理寺言趙普強市人第宅聚歛財賄上怒叱曰鼎鐺猶有耳汝不聞趙普吾社稷臣乎引柱斧擊折其二齒命曳出止用闌入之罪黜焉太祖紀力士鐺舒州杓丨丨丨李白與爾同死生李耳似鐺鼻似姻窗丨丨丨詳嶺嘲妓李端端醜也煑藥鐺周貫號木鴈子欲欈李生同修仙道不從貫指丨丨丨云頑鈍天教合作鐺從他三脚豈能行雖然有耳不聽法只愛人間戀火坑仙傳煑魚鐺北齊盧思道聘陳聮句先倡者譏云榆生欲飽漢草長不肥驢謂北有榆吳無驢也思道即曰共甑分炊飯同鐺異丨丨謂南人無義同炊異饌也談藪不識盃鐺陳暄曰何水部眼丨丨丨丨而吾口不離瓢杓陳史温酒鐵鐺孟信為太守政寛和有老人遺以肫􅈩信引接自出酒以鐵鐺温之詳􅈩拆脚鐺無業禪師曰看它古得道人得意之後茒茨石室向丨丨丨子煑飯喫過三十年傳活套破丨茶丨月入丨槍攙丨彗星又名天丨大人賦檻攙丨以為旌兮杜戮力掃攙丨英於驚切説文草榮而不實者从艸央聲又華也萼也韓進學解含英咀華淮南子智過萬人謂之丨禮運三代之也丨詩丨丨白雲雲貌麥丨櫻桃瓊英尚之以丨丨乎而著詩石似玉一云玉生如草木之英華芝英咀嚼丨丨兮嘰瓊華相如賦舜英顔如丨丨有也女同車槿花晶英風露發丨丨劉夢得詩𤣥英秋為白蔵冬為丨丨爾雅謂