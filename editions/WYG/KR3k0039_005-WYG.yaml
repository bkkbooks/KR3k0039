body:
  text: 韻府羣玉卷五元隂勁絃隂復春編下平聲一先同用先蘇前切說文前進也从人之記有開必丨詩不自我丨語三者何丨書祗台徳丨丨為之容詳容身先以丨物江統𫝊天下先示朴為丨丨丨漢文著鞭先成佛莫教靈運後丨丨常恐祖生丨坡詳鞭睹争先景星鳯凰争先丨之為快李渤酌誰先丨則丨孟争一先一先争到今言棊得月先近水樓臺先丨丨周恭先作丨丨丨書恭敬後世推先聞道先生乎吾前其丨丨也固丨乎吾韓文酒誰先與君同甲子夀丨合丨丨詳宇太極先道在丨丨之先莊人名邊孝丨名韶張茂丨名華詳送劒陸象丨詳陸葛孝丨名𤣥𠻳飯成蜂詳蜂原巨丨名涉焦丨蝸牛廬事詳廬吁子丨漢人夀百餘嵗詳狗褼褊丨衣貌􅪗石次玉蹮蹁丨旋行貌亦作僊詩屢舞僊僊前昨先切語瞻之在丨參於丨史張良借丨箸賈誼坐丨席劉向封事猶却行而求丨丨車覆詳車丨鋒李勣光前丨丨絶後陸昭王碑無前楊厲丨丨之偉績韓所向丨丨南史盧前王勃楊烱盧照隣駱賓王文章齊名稱王楊盧駱烱曰愧在丨丨恥居王後唐藝文輊前馬援曰居前不能令人丨居後不能令人軒璧至前明月之丨無因而丨丨詳投馬不前雪擁藍闗丨丨丨韓糠粃前簸之揚之丨丨在前詳礫活套君丨王丨畫丨樽丨眼丨十年丨歐郎罷丨谷媊女丨星名也千蒼先切說文十百也从十人孟萬取千焉韓信傳愚者丨慮筆掃丨軍詳陣一以當千李陵答蘇武已千人百之丨丨之記三千孟嘗君食客丨丨人詳履禮樂丨丨字威後宫佳麗丨丨人長恨歌奏牘丨丨史儀丨丨記有臣丨丨書虎賁丨丨人孟蟠桃丨丨年一花丨丨年一實詳桃主家十二樓一身當丨丨后山奏書曽用牘丨丨后山八千大椿丨丨嵗為春詳椿謝𤣥兵丨丨勝苻堅鑑夕貶潮陽路丨丨韓矢千玈弓丨丨左禄二千漢太守丨丨丨石功滿千積丨丨丨雖有過得仙真誥和者數千客歌下里巴人丨丨丨丨詳歌三千大千丨丨丨丨世界詳想活套運半丨人名員半丨唐人阡路南北曰丨東西曰陌又路皆曰丨秦開丨陌前漢志田連丨陌曹公短歌行越陌度丨曹植詩東西經七陌南北越九丨東阡丨丨西陌韓新阡共誰論昔事幾處有丨丨杜京兆阡京兆尹曹氏葬茂陵謂其道曰丨丨丨原涉慕之起父冢表曰南陽阡人不肯從曰原氏阡原涉傳活套周丨秦丨漢丨民丨谸山谷丨丨青也芊丨丨茂貌選積翠葱丨綿丨箋則前切表識書也又詩註曰丨通作牋鸞箋十樣丨丨出益州韓浦事詳樓薛濤箋唐蜀妓丨丨好製小詩惜紙幅大乃狹小之金花箋帝賞牡丹以丨丨丨賜李白令進新詞詳丹布頭箋取丨丨機餘經不及緯者作紙曰丨丨丨名冠天下志林九萬箋王右軍為㑹稽守謝公就求箋紙庫中有丨丨板悉與之衍波箋韋貫夢至宫中有婦人授以牋曰此丨丨丨煩賦宫中曉寒與天公牋查道元丨丨丨丨言其好髙初學記活套尺丨蜀丨雲丨華丨彩丨五色丨王版丨天莫丨湔洗也滌也今當痛自改三釁復三丨谷戔易束帛戔丨委積貌韀馬鞍具通作帴晉張方傳軍入宫割流蘇帳以為馬帴錦韀雪没丨鞍丨杜錯認林花是丨丨谷花韀唐宰相賜繡寶相丨丨參政副樞繡盤鳯雜丨丨談苑馬韀蘇秦與張儀為友秦在趙為相儀至趙秦欲激之令儀於城東門外坐以破丨丨進麄食儀憤入秦拜為相儀嘆曰丨丨之事乃至此乎戰國䇿人來坐丨丨杜蒲韀李宻丨丨乗牛讀漢書詳書羅韀金羈玉勒繡丨丨坡濺丨丨水淺流疾貌或作淺楚辭石瀨兮淺淺天他前切說文丙顛也至髙無上从一大鈞天中央為丨丨楚辭註秦穆公夢至帝所觀丨丨廣樂詳樂冰天文軫薄桂海聲告燭丨丨選江文通南海有挂北方積冰故云木天秘書閣下穹窿髙敞謂之丨丨類說井天坐丨而觀丨韓甕天醯雞守丨丨谷刑天戴丨丨􅀢十戚山海經獸名所天昧死自陳丨丨後梁竦丨傳臣以君為天故曰丨二天後蘇章為冀州刺史行部故人清河太守贓奸乃舉酒叙懽曰人皆有一天我獨有丨丨章曰今日蘇孺文與故人飲者私恩也明日冀州刺史按贓事者公法也遂舉正其罪鑑八天陶侃夢天門九重身登其丨忽墮地詳翼移天丨丨夙喪栁祭六伯母文三十丨所天選注云女子家則父天嫁則夫天故曰移也補天女媧氏鍊五色石以丨丨闕列捧天韓魏公夢丨丨詳捧登天陶侃夢生八翼飛上天詳翼尺五天詳玉壺中天寥落丨丨丨李小有天丨丨洞丨詳有蔚藍天上有丨丨丨杜登金華山劒倚天長丨丨丨立范希文管窺天以丨丨丨東方朔傳盆戴天戴丨何以望天馬遷傳飛冲天三年不飛一丨丨丨詳飛食為天民以丨丨丨漢髙紀木破天王敦謀逆夢將一丨上丨丨許真君曰此是未字未可動爾列仙傳一曰郭璞義薄雲天髙丨丨丨丨解嘲破屋見天丨丨那愁仰丨丨坡先天後天丨丨而天不違丨丨而奉天時易蒼天蒼天鄧隠峯參石頭和尚迭牀三匝振錫一聲石頭云丨丨丨丨隠峯無語詳滑活套九丨堯丨洞丨漏丨朝丨箋丨絮丨漫丨力回丨菊花丨水拍丨翼垂人名白樂丨堅古賢切說文剛也詩實丨實好語鑚之彌丨家語行偽而丨馬援傳窮當益堅攻堅善問者如丨丨木學記被堅丨丨執銳漢祖乗堅丨丨驅良逐狡兎越世家中堅丨丨擁鼔鐸韓中軍曰丨丨謂居丨以丨銳自輔白堅目見其丨不見其丨觸而知其堅而不見其白詳白夷堅丨丨聞而志之列言鵾鵬也洪舍人作丨丨志氷堅履霜堅氷至易春丨無真丨坡霜堅髙林風落子老僧選丨丨谷靈堅鼻坤丨丨黄庭磨兠堅丨丨丨秦人座右三字銘謂謹言也朱子語録氷腹堅丨澤丨丨月令活套甲丨城丨壁丨貞丨清丨人名庭丨八元班孟丨固苻丨黄庭丨豜豕三嵗詩獻丨于公枅屋櫨也肩孔子丨類子産孟失其丨背書永丨一心盤庚雙耳下垂丨杜行輿響擔丨谷弩名黄丨