body:
  text: 韻府羣玉卷十元隂勁弦隂復春編上聲七麌與妺同用麌虞矩切麋鹿羣相聚也本作虞詩鹿鹿丨丨俁説文大也詩碩人丨丨注容兒羽玉矩切説文鳥長毛也象形丨蟲三百六十鳯為之長一曰北方水音十按監韵此丨字聚也舒也丨音及舞丨押在此丨毛之丨在過内韻會辨明甚詳當與上去韻内通押孟一丨之不舉鉤金輿丨詩翽翽其丨積羽羣輕折軸丨丨沉舟史記飲羽能渠子夜見石以為伏虎射之一發丨丨詳石没羽李廣射虎詳虎飛羽丨丨觴而醉月李紙羽此齊呉明徹圍海西鎮将郎基固守削木為箭剪丨為丨竟不克而還鑑梁紀覉羽北極有丨丨南溟有沉鱗北極白羽赤羽子路願得丨丨若月丨丨若曰家語致思篇旌旗也接武簉羽唐上官儀曰御史丨丨䕫龍丨丨鴛鷺隠鱗藏羽龍不丨丨鳯不丨丨後張升引商列羽有歌於郢中者丨丨丨丨雜以流和者止數人詳歌移宫換羽丨丨丨丨未怕周郎古詞麋角鴿羽北齊雀謀從李繪求丨丨丨丨繪曰鴿有六翮飛則冲天丨有四足走便入海詳麋客出振羽丨丨以雍徹丨丨記燕居振羽謂樂章振鷺及雍也眉如翠羽丨丨丨丨登徒子好色賦詩篇鴇丨刺時也大亂五世君子下從征役不得養其父母唐人名行人子丨項丨關丨雨説文雨水从雲下也一象天門象雲水霝其間也於文从天下水古作目作孟沛然下丨左師興而丨衛國詩以祈甘丨縮龍而丨見龍坡喜丨亭記吟詠燈前細丨簷花落杜森森似銀竹膏雨如百谷之仰丨丨焉左靈雨丨丨既零詩善雨也爛雨同州人謂雨沾足為丨丨雜志液雨闌俗諺云丨丨不流蘀高田不要作丨丨亦曰藥雨百蟲飲此雨則蟄詳液涷雨丨丨兮酒塵騷夏月暴雨也丨音東霪雨害稼曰丨丨唐書怪雨盲風丨丨韓南海廟碑劇雨州無怪夙丨丨韓徐偃王廟碑白雨丨丨映山寒杜黒雨龍吸硯水作丨丨詳龍紅雨桃花亂落如丨丨唐李賀三雨丨丨全清六合塵谷喜雨雨三日以徃為霖梅雨江南三月為迎丨丨五月為送丨丨埤雅閩人以立夏後逢庚力日為入梅芒種後逢壬日為出丨得丨乃宜耕耨四時繤要勤雨不雨者丨丨也榖梁僖欲得雨志丨也十雨五日一風十日一雨論衡謁雨丨丨泥塘神所桞濯枝雨六月榆莢雨春月豆花雨八月甲子雨唐俚語云春丨丨丨赤地千里夏丨丨丨乗船入市秋丨丨丨禾頭生耳冬丨丨丨牛羊凍死僉載十日雨詳飯御史雨平原有寃獄顔真卿决獄而雨號丨丨丨隨車雨宋朝陳戩知處州時旱公下車雨沾足人以為丨丨丨與鄭洪事問李徳雨京師久旱丨丨裕拜相即日大丨京中喜曰相公乃丨丨丨也獻替記滴鬃行雨李靖射獵山中宿一朱衣家夜半扣門急一婦人謂靖曰此龍宫也天符命行雨二子皆不在欲奉煩何如命取騘馬一小瓶成曰馬跑地嘶鳴取水一丨馬丨上此一滴乃地下三尺慎無多也既而電掣雲間連下三十餘滴夜半平地水三丈本噀酒為雨栾巴飲酒西南丨之曰臣本縣成都失火故丨丨丨丨以滅火驛書馳問果然雨皆酒臭鉢龍致雨無畏三藏以丨水召丨丨丨詳鉢畫龍作雨開元中大旱馮紹正於殿壁丨一素丨俄有白龍自池中乗雲而起風雨大作明皇雜録桑林禱雨湯禱曰政不一歟民失聀歟宫室勞歟女謁盛歟苞直行歟讒天昌歟言未既大雨史屋成致雨董奉居䂊章時大旱縣令丁士彦請致雨奉曰貧道屋皆見天雨至何堪令曰伹致雨當為架好屋明日丨丨眷大雨仙傳蜥蝪致雨關中求雨沙門善胡法者求丨丨十數羅甕中童男女持柳枝呪曰蜥蝪丨丨興雲吐霧雨令滂沱放汝歸去談苑咸平初用此亦有驗丨丨龍之類熈寧中京師旱不能盡得蜥蜴以蜴虎代之入水即死歌曰寃苦寃苦我是蜴虎似恁昏沉怎生得雨在澤中者為丨丨坡注丨丨音析弈自焚而雨戴封為西京令旱乃積薪卧其上約曰來午不雨燒之至期火發而雨本舊雨今雨杜少陵云卧病長安旅次多雨尋常車馬之客丨丨來丨丨不來杜詩秋述注互見來巫山雲雨楚襄王與宋王遊雲夢望髙唐之觀上有雲氣王曰昔先王遊南唐畫寢夢一婦人曰妾丨丨之女也朝為行丨暮為行丨朝朝暮暮陽臺之下對牀風雨邵知風雨夜復此丨丨眠韋蘓州請客風雨東都周黙未嘗作東一曰丨丨時久旱忽丨丨交作宋温戯曰驕陽為戾已成灾頼有開筵請話周季才莫道上天無感應故教風雨一齊來文酒活套時丨零丨宇天地四方曰丨或作寓荀充盈乎太寓左在君之丨下邊垂也相如傳摎蝎之丨曠逺兒玉宇翟乾祐與十許人翫月或問月中何所有乾祐曰隨我手中看之月䂓半貧瓊樓丨丨蒲焉拾遺記天宇丨丨浮脩眉韓萬宇君臨丨丨唐史器宇龎統云要織家聲先看丨丨高卑徳宇丨丨天覆東京賦眉宇紫芝丨丨詳眉姿宇媿謩丨丨魁秀本韻宇丨丨𢎞深喜愠不見其際禇淵碑文黑宇後魏宇文忠為中書侍郎裴伯茂與同省侮之以忠黒色呼為丨丨史棟宇上丨下丨繫辭衡宇乃瞻丨丨陶詞峻宇丨丨雕牆書胥宇韋來丨丨詩丨相也丨居也隟宇梓人願傭丨丨而處焉栁上去逆切與隙同施宇果臝之實亦丨于丨東山紺宇丨丨山歸然存歐公青蓮宇移戯丨丨丨坡瑞香謂寺宇活套堂丨庭丨境丨同丨壞丨璇丨雖丨僧丨禽名杜丨禹纘禹丨丨舊服書微禹丨丨吾其魚乎左可為禹塗人皆丨丨丨荀人名張丨前從侫臣貢丨彈冠事詳冠鄧丨光武明将瑀石似玉詩經佩玉瓊丨鄅國名左丨子藉稲聚慈痩切事詳去聲甫方矩切説文又男子之美稱从父用徐父子也也又大也詩魴鱮丨丨韓奕某甫臨諸侯畛於鬼神曰有天王丨丨曲禮甫且也不名者不親徃也又雜記註䟽云五十以伯仲是正字二十之時曰丨丨言且為之立字也章甫端丨丨語丨丨適越冠名丨丨薦屨賈賦申甫維丨及丨詩崧高人名仲山丨尹吉丨並周賢臣杜丨唐人王夷丨名衍李林丨唐小人或作父互見父姓氏覆姓皇甫京兆羽音宋戴公之子克石字皇父因氏從興改父為甫居安定為著姓丨皇丨規字威明恥不與黨人列詳黨不迎鴈門太守詳鴈皇嵩從時破黄巾功封槐里侯安請兾州田租贍饑民百姓歌之後拜太尉皇丨謚晉人字士博綜典藉時號書滛一號𤣥晏先生皇丨璠字景瑜仕周為隨州刺史政有簡惠常以清白自處皇丨無逸唐武徳中為益州都督長史亷介宿民家斷帶纊燈炷詳炷皇丨湜字持正作福先寺碑獲縑九千詳碑脯説文乾肉也从肉甫聲記婦贄丨脩語沽酒市丨鹿脯陳蕃拌飯以丨丨芼羮以牛脯未嘗為異饌續豫章記蚌脯丨籍鷸喙曰今日不雨明日不雨必有丨丨詳蚌瓠脯祖逖為豫州刺史耆老歌曰𤣥酒忘勞甘丨丨何以詠思歌且舞紅虬脯上贈同昌公主丨丨丨貯於盤中宛如蛇杜陽編龍根脯橘中一叟曰僕饑虛矣須丨丨丨食之䄂出一草根食訖以水巽之化為一龍共乗之詳橘山羊脯劉阮入桃源下丨丨丨甚美詳源牛作脯牛𢎞弟醉射殺𢎞牛妻曰叔射殺丨𢎞曰丨丨詳牛桑皮脯後徐登趙炳善巫術貴尚清儉禮神以東流水為酌削丨丨為丨但行禁架所療皆除史禁架禁衛也詳皮野蒲脯丨丨變而為丨西征賦趙高欲為亂先設驗以丨丨為丨獻二世言蒲者誅之麻姑麟脯王方平與丨丨至蔡經家各進行厨共設羞膳擘丨丨神仙傳犒師酒脯左慈詣劉表請丨丨有丨一器丨一盤萬人皆周而酒脯不減神仙傳又見羊取人酒脯唐邢邵為西兖刺史縣令妻日暮丨丨斗丨束丨邵稱令責其取受舉州不知所以本待客片脯北齊盧叔彪為尚書魏收訪之食至史但有粟飡葵菜禾盌盛至片脯而已與餓人脯趙宣子見翳桑下有餓人丨脯二朐拜受而不敢食曰臣有母待以遺之宣子更賜之脯二束解衣償失脯看桑虞寄逆旅客失脯疑虞盗之虞便丨丨丨丨丨後尋得之客還衣虞投之不願史黼説文白與黑相次文也从米兩甫聲絲曰其畫形作斧取其威斷也周禮注斧謂之丨謂裳綉斧形以絳帛為質白黑為文司服注䟽云近刄白近上黒取斷割焉或作黼史秦紀天子賀以黼黻通作斧揚斧藻其徳簠説文黍稷圓器也周禮䟽内圓外方受十二升曰丨丨盛黍稷簋盛稲梁禮舎人共丨簋父通作甫男子美稱尚父維師丨丨詩謂可師可丨司丨也仲父管仲稱丨丨又王導人號丨丨史梁父磾丨丨漢志諸葛亮作丨丨吟文父後楊厚字仲相門生三千人本鄉人諡曰丨丨史傖父陸機謂弟曰有丨丨欲作三都賦須成當覆酒甕及賦出機歎以為不能加也史傖士行切吳人謂中國人為丨詩篇圻丨刺宣王也小雅司馬之官也人名尼丨仲尼夸丨逐日事詳日亞丨范増造丨善御馬斧説文斫也从斤父聲廣韵神農作陶治斤丨書注丨重八斤一名天鉞詩匪丨不克賈䇿解牛髖髀之所非斤則丨詳刄栁文丨彼鋸彼詳鋸觀棊爛丨柯詳柯資斧旅于處䘮其丨丨易注刋斧也齋斧凡将帥出必丨戒於廟受丨故云丨丨魏志眉斧鬢雪未昜掃丨丨親自伐玻皓齒蛾丨命曰伐性之丨枚乗七發授斧遣将軍親操斧持頭丨将軍柄曰閫以外将軍裁之淮説山訓投斧孔子習周公者也般丨其丨而曽諸孰曰非也揚藻斧丨丨其徳揚月斧丨乃七寳合成常修之有斤丨鑿詳月庇根縱斧公族公室之枝葉也葛藟猶能丨其本丨庇焉而丨尋丨焉者必不可衣繡持斧曰恭勝之為直指使丨丨丨丨威振州郡肘腋挾燒斧戴就被考掠燒斧使挾於丨丨就云可熟燒斧忽令冷詳𤓰詩篇破丨美周公也周大夫惡四國焉人名許玉丨得道者詳許府説文文書藏也一曰聚也大府羣吏献賢能之書圭十十登之於丨丨地官詳書關中丨丨之國劉敬傳月府明皇遊丨宫見天丨榜曰廣寒清虚之府詳月紫府項曼都言到天上過丨丨抱朴倒影樓臺開丨丨谷洞府夜凉星蒲天疑眠丨丨栁兩府後唐用文事出中書武事出樞宻自此其權甚盛至宋號為丨丨歸田録秘府天下文籍悉在廣内丨丨之室謂之秘書漢書丨書亦曰䇿丨九府周丨丨圜法前食貨周官太府王府内府外府泉府天府聀内聀金聀幣開府樊稠為右将軍丨丨如三公獻帝痩丨丨杜幕府媿尚上功丨丨馮唐傳衛青枉匈奴帝拜大将軍於幕中因號丨丨注軍旅無常居止故張丨居之少府唐縣尉多稱丨丨如杜甫贈華陽李丨丨文苑英華蠻府郝隆謂桓温曰千里投公始得一丨丨何不作蠻語詳語靈府不可入于丨丨莊精神之宅也義府詩書丨之丨也僖十七書府東壁二閨王文藉天下圖丨之丨晉天文册府見羣玉府卜學府梁傅昭傅治古今號丨丨史盟府夫賞國之寳也藏在丨丨左樂府丨丨采詩令孝惠六年使丨丨備簫管始有丨丨之名韻㑹怨府富者丨之丨也左叔孫昭子曰吾不為丨丨昭十二三丨成丨後葢勲傅三錢府楚王毎赦必先封丨丨之丨解詳赦望此府皇甫公義謂華思謙曰屈公史為數旬之客以丨丨丨舊唐太平官府唐崔謩為秦州刺史人喜曰不意復見丨丨丨丨未嘗入城府昔者龎徳公丨丨丨丨丨杜人名廋開丨猫李義丨號李詳猫韻俯説文低頭也亦作頫項藉賛頫首又作俛韓信傳丨出跨下丨窺鵲巢詳巢衡俯文章若懸丨然増之銖兩則丨反是則仰秀才欲令吾俯乎莫若増重其文今所増益者不啻銖兩吾固伏膺而萌矣栁答吳秀才退俯進俯丨丨樂記曲也言不齊一也喬仰梓俯丨高而丨丨卑而丨商子曰喬父道也梓子道也詳梓據地不俯董宣丨丨終丨肯丨腑肺腑劉向日臣幸得假丨丨注謂丨丨相附著脚亦音附詞李格非曰淵明歸去來如丨丨中流出六腑胃為水谷附小腸為受盛府大腸行道之府旁胱津液之府膽為清浄之府三焦為孤府禮疾醫䟽一説小腸胃膽太腸旁胱命門曰丨丨洗臟腑佛圖澄齊時至流水側從腹禮中