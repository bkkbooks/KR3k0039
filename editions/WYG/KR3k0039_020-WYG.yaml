body:
  text: 韻府羣玉卷二十元隂勁弦隂復春編入聲十二錫獨用錫先擊切說文銀鉛之間從金易聲本草臨賀産丨詩如金如丨淇澳丨爾純嘏初筵丨爾介圭崧髙又粉丨胡粉也九錫禮有丨丨榖梁九年蔡謨戲王導曰聞朝廷欲加公丨也丨不聞餘物惟有短轅犢車長柄塵尾詳車譏其妻悍三錫王丨丨命晉卦永錫丨丨爾類詩丨丨難老泮水阿錫被丨丨掄紵縞子虚賦丨細繒也丨細布也錫本作緆飛錫㳺行僧為丨丨安住僧為掛錫要覽行必持錫杖持錫有二十五威儀至室中不得着地必掛於壁掛錫見上卓錫舒州潜山最奇絶而山麓猶勝誌公與白鶴道人欲之同謀於梁武帝俾各以物誌其地者得之云云已而鶴先飛去至麓將止忽聞空中飛錫聲誌公之錫遂泉卓於山麓遂各以所識築室焉寳積寺无水師丨丨於地湧數尺詳泉緇錫梁肅智者大師碑丨丨駭散瓶錫𤣥覺師詣曺溪振錫擕丨遶祖三匝傳燈空中錫唐呉元濟與官軍交鋒未决鄧隠峯禪師擲錫丨丨飛身而過兩軍仰觀繞牀振錫鄧隠峯參謁石頭和尚丨丨三匝丨丨一聲問是何宗旨石頭云蒼天蒼天隠峯无語詳滑緆細布阿丨詳錫蜥丨蜴裼孟袒丨詩袒丨暴虎記子㳺丨裘而弔陳軫傳指甲徒丨以趨敵淅汰米也韓丨玉炊香粳接淅丨丨而行孟矛頭淅丨丨丨米劒頭炊詳炊析說文破木也從木斤又分也左其父丨薪前食貨利丨秋毫劈析殷厪曉諭丨丨指明唐懿宗紀丨匹厯切破也蕩析丨丨離居書儋析析人之圭丨人之爵揚雄傳民析厥丨丨書脾析醢人饋食之豆其實葵苴嬴醢丨丨禮天官牛百乗也晢說文人色白也澤門晢宋築者謳曰丨丨之丨實興我役詳黔謂皇國甫貌白越女晢天下之女白不如丨丨之丨肌丨詳白人名曾丨名㸃字丨聖門髙弟子丨強委禽詳禽束丨補亡詩激古厯切唐史丨濁揚清孟丨而行之電激星流丨丨選矢激水激則悍兮丨丨則逺賈誼賦跪激班固叙事不丨丨丨毁也丨揚也推激風雅共丨丨杜黄魏共丨丨後山沽激唐李渤不茍合於世人咸謂之丨丨史詩長於激樂天諷諭之丨丨丨丨閒適之丨丨丨遣詩苑類格活套忠義丨蕩丨擊說文攴也從手􅌛聲易丨柝節夜丨刁斗詳斗祖逖丨楫詳楫丨詳節鵬擊丨之徙於南溟也水丨三千里詳鵬鷹擊丨隼始丨漢義縱以毛鷙鷹月令丨丨為治史徂擊留侯與客丨丨始皇史丨七預反伺也目擊仲尼曰温伯雪子丨丨而道存矣丨才往意已達又曰丨動也舌擊朱伺曰諸君以丨丨賊伺惟以力爾齒擊後葢延攻破龎萌詔書勞曰龎萌反叛相去不逺營壁不堅殆令人丨欲相丨而將軍有不可動之節史笏擊叚秀實以丨丨朱泚詳笏轂擊臨淄之塗車丨丨人肩摩鑑賞擊王摛𨽻事舉筆便成舉坐丨丨詳簟戞擊丨丨鳴球書橘三擊洞庭君女謂柳毅曰敢寄尺牘於書洞庭之隂君丨樹三當有應者詳酒灌擊趙簡子使太子母䘏從智伯伐鄭智伯醉以丨丨丨母䘏史豫讓請衣擊㐮子獲丨丨豫讓曰臣固伏誅願丨君之丨而丨之襄子與之讓㧞劒三躍而擊之曰可以下報智伯矣詳衣以杖自擊梁沈峻好學臨睡則丨丨丨丨史増擊見細徳之險徴兮遥丨丨而去之賈誼賦言如鳳凰重丨羽而髙去澼匹厯切漂也荘泙丨纊詳纊霹丨靂瀝郎擊切說文浚也从水厯聲楚瀝呉醴曰蘖和丨丨騷大招瀝清酒言使呉人醸醴和白麵作丨丨也餘瀝淳于髠曰親有嚴客侍酒於前時賜丨丨不過二斗徑醉矣互見燭及斗杯杓丨丨晉書淅瀝初丨丨以蕭瑟秋聲賦活套誠披丨滴丨歴說文過也傳也從止􅔦聲多丨年所丨試諸難晉書寂歴寒花踈丨丨枊丨丨幽花晩坡爰厯趙髙作丨丨六章字體活套經丨來丨百年丨厯說文丨象也從日􅔦聲前律丨志治丨明時覆射丨日包橘詳橘鳳厯左少皥摯之立也鳳鳥適至故紀於鳥丨鳥氏丨正也丨知天時故以名丨正之官昭公龜厯堯時越裳國獻千嵗丨背有科斗書記開闢以來事帝録之號丨丨述異記堯厯丨典丨象日月書巧厯丨丨不能得而况其凡乎荘丨於丨數者厯與歴同太初厯漢武丨丨治丨則鄧平唐都洛下閎顔閔楚奏洛下閎作丨丨丨云後當差一日八百年後當有聖者定之史麟徳厯唐髙宗時李淳風作元厯以獻丨丨初頒用唐志為相視厯唐劉瑑宣宗視案上厯曰丨擇一良日瑑曰某日良帝笑曰是日卿可遂丨史山中無厯陶淵明桃源詩雖无紀厯志四時自成嵗唐詩丨丨丨丨日寒盡不知年年號大丨唐大丨中才子詳子櫪說文丨㯕椑指也從木厯聲馬色又木名伏櫪魏武帝曰老驥丨丨志在千里松櫪時見丨丨皆十圍韓詩小兒共櫪馬援與囂將楊書曰今者更欲低頭與丨丨曹丨槽丨乎通鑑櫟通志南多槲北多丨似樗即柞丨也社櫟丨丨以不材故夀詳壽壽櫟范石湖有壽櫟堂苞櫟山有丨丨秦詩捄櫟丨其實丨爾雅上音求子房生於丨鬲鼎屬實穀六斗轢車所踐漢書陵丨唐書抵丨皪的丨吟詩荒涼衆草間露此紅的丨歐割蚌珠的丨曽靂霹靂隋長孫晟突厥大畏之聞其弓聲謂為丨丨史曹景宗拓弓作丨丨聲詳麞柳子作丨丨琴說詳焦舌作丨丨飛韓礫小石也珠礫金塊丨丨阿房賦瓦礫孫綽與習鑿齒並行孫在前謂習曰沙之汰之丨丨在後習曰簸之颺之糠粃在前金沙石礫牛僧孺為尉小灘漲出石礫丨丨有鸂鶒一雙詳鸂瓦礫擊竹香嚴智禪師丨丨丨丨作聲廓然省悟活套沙丨酈說文南陽縣從邑麗聲姓氏析彘徴音黄帝支孫食采於丨因氏丨寄字况周勃刼其父商令况紹吕禄出逰勃乃據北軍誅諸吕詳紿丨食其謁髙祖自稱髙陽酒徒說齊伏軾下齊七十餘城丨炎字文勝漢靈帝時辟命不就詩云抱玉乗龍驥不逢樂與和丨道元字善長守魯陽郡表立文􅓺序崇勸學校山蠻服其威名北史丨氏丨仲隠女幼敏慧作坊使宋公䘮偶聞風迎之族姻皆稱懿行的都厯切說文明也揚立義以為丨質的丨丨張而弓矢至焉荀凖的當代名臣人倫丨丨虞世南傳同的材官騶發矢道丨丨詳發破的隋賀若弼時突厥入朝賜之射一發丨丨文帝命弼射一發而中上大恱史聲謝尚中的事互見去吹愁的古來将月作丨丨推下月來丨始休古詩開門植的呉太史慈初孔融與黄巾圍急遣慈求救於平原慈將兩騎各持一的丨丨直出丨所持丨各射之明晨復如此圍下人或起或卧明晨復如此无復起者因突圍出史活套端丨侯丨靮馬韁記執覊丨馰馬白額的亦作的漢有盧適語無丨無莫詳莫左吾誰丨從鏑矢鋒也過秦論銷鋒丨與鏃韻通看齧鏑昝君謨善射有王靈智學之已曲盡其妙欲射殺君謨君謨時執一短刀矢來輒折末一矢以口承之遂丨其丨謂靈智曰學射三年但未教汝丨丨爾朝野僉載鳴鏑匃奴冒頓作丨丨令曰丨丨所射而不悉射者斬後冒頓以丨丨自射善馬復自其愛妻左右不敢射輒斬之復以射頭曼善馬左右皆射之乃射父曼頭皆随射殺之而自立史筈鏑康保裔三十五矢射丨丨相繼而墜詳康丨與括同矢受弦處滴說文水注也酒滴小糟丨丨真珠紅李馬鬃連滴李靖夜半一婦人托行雨曰馬􅀈地嘶鳴取瓶水一滴丨丨上乃地下三尺矣既而電掣雲間丨下三十餘丨平地水三丈詳雨秋光欲滴蒲院丨丨濃丨丨老僧倚柱青松側只怪髙聲唤不應嗔予踏破蒼苔色僧寶鹿詩佛知雨滴大智度論十地菩薩天名摩醯首羅一念丨三千大千世界丨丨之數龍王降雨時摩醯首羅悉能分别數其滴華嚴曹溪一滴僧問雲門如何是丨丨丨丨水荅云丨丨丨丨水傳燈丨丨六祖也活套空堦丨老淚丨樀屋檐菂蓮中子也嫡正也羊有丨不以其公立丨以長蹢蹄也詩有豕白丨啇木根果蔕皆曰丨與商不同弔至也書惟丨兹檄胡狄切丨以木簡為書長尺二荀濟傳㑹於楯上磨墨作丨文司馬相如諭巴蜀丨羽檄丨丨徴天下兵漢髙紀檄有急事即挿以雞丨府檄見捧檄下傳檄天下可丨丨而定漢髙紀投檄趙宋張宗臣丨丨而去記年録挂檄梁劉訐刺史張稷辟為主簿以檄召訐訐丨丨於柱而逃史七紙檄北齊魏收文襄以侯景叛令收為檄五十餘紙不日而成就又檄梁朝今送景初夜執筆三更便了檄文過丨丨史北山檄只恐先移丨丨丨坡愈頭風檄陳琳草檄曹操見之頓丨丨丨本毛義捧檄丨丨字少莭張奉候之府檄適至以義守令丨丨而入喜動顔色奉心賤之後母死公車徴不至奉嘆曰徃日之喜乃為親屈也史馬上作檄唐薛收在秦王府嘗丨丨丨丨皆如宿構母窺草檄何旡忌等合謀討桓𤣥夜於屏風裏草檄其丨登橙宻丨之曰汝能如此吾復何恨本糧不可檄唐穆寧轉鹽鐵轉運李光弼檄取資丨丨與光弼怒荅曰命寧守糧者敕也公丨丨乎時謂能守官盗留囊中檄唐楊再思丨􅀼其衣囊再思曰苦貧至此囊中檄無所事幸丨他物可持去之史覡說文能齊肅事神明者在男曰丨在女曰巫獥狼子薂的丨即蓮實鶂五厯切丨鳥雄鳴上風雌鳴下風則孕孟丨丨之肉聲亦作鷁六鷁丨丨退飛過宋都風也左文鷁浮丨丨舟也亦曰畫鷁相如賦濯鷁西馳宣曲丨丨牛首丨直孝切舟也上林賦霓雌虹沈約製郊居賦示王筠讀至雌丨連蜷撫掌欣抃曰僕常恐人呼作平聲虉綬草詩卭有㫖丨鷊吐綬鳥詳綬艗江東人船前畫青鷁因名亦作鷁活套文艗畫艗狄徒厯切赤丨本大種又白丨金狄魏明帝徙長安承露盤丨丨折丨丨或泣史銅狄薊子訓與一老公摩娑丨丨人曰適見鑄此已近五百嵗捜神記姓氏天水徴音尼周成封少子於丨城因氏魯大夫有丨虎稱古賢人丨伐仲弟子丨黒衛人漢愽士丨山丨仁傑字懐英并州人唐封梁國公諡文惠孫兼謨恥桃李公門詳門閒立本稱為滄海遺珠武后攘神器丨丨蒙奮忠張柬之等卒復唐室頌曰取日虞淵洗光咸池潜授五龍夾之以飛光望雲思親事詳雲藺仁基美其誼曰北斗以南一人而已丨嗣仁傑薦丨光嗣為尚書郎稱職武后曰祁奚内舉果得人丨兼謨字汝諧仁傑孫剛正有祖風厯三州刺史遷御史中丞白居易香山九老兼謨亦與焉丨青字漢臣汾州人勇於臨敵常為先鋒二十五戰中流矢者八毎戰飾以銅靣敵人望之如神大敗濃智髙遷樞宻覆姓庫丨氏鮮卑叚疋碑之後庫丨峙仕齊中書舍人參掌樞宻庫丨干鯁直少言魏為定州刺史清約自居庫丨盛少有武力從髙歡征伐累遷幽州刺史庫丨士文隋具州刺史清苦不受私謁法令嚴肅道不拾遺荻萑葦也火荻姚光有丨術坐積丨中猛丨焚之丨盡端光坐灰中詳灰千樹荻河濟之間丨丨丨其人與千户侯等貨殖傳偽載荻梁臨賀王正徳怨望侯景反正徳遣大船數千艘丨丨丨實推濟景史養蘆成荻晋童謡云官家丨丨化丨丨徴祥記謂盧修為敵也糴說文市榖也前食貨志丨貴甚則傷民賤甚則傷農乞糴晋丨丨於秦僖十三閉糴秦饑晋丨之丨同上遏糴葵丘之盟毋丨丨僖九丨止也和糴宋長慶初丨丨使増價糴漢宣時穀賤時丨丨丨之以利農貴時減價糶之以利民名曰常平本五升糴曰糴大倉丨丨米史千里不販糴百里不販樵丨丨丨丨丨史貨殖敵說文仇也從支啇聲孟仁者無丨詩則莫我敢丨揚真儒無丨呉起傳舟中皆丨國勍敵宋及楚戰子魚曰丨丨之人隘而不列天賛我也左符堅望見晋兵曰此亦丨丨何謂少乎晉載記匹敵若以丨丨則亦晋君之母左延敵秦人開闗丨丨萬人敵項籍曰劒一人敵不足學學丨丨丨勇大敵光武見小敵怯大敵丨詩無敵白也丨丨丨杜難與慮敵後臧宫願得五千騎伐匃奴帝笑曰常勝之家丨丨丨丨史受降如受敵霍去病時匃奴渾邪王降漢去病曰丨丨丨丨丨史籊詩丨丨竹竿迪道也順也惠迪丨丨吉書也丨順丨道訓迪丨丨厥官書啓迪丨丨我後人書覿見