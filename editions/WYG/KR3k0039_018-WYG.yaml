body:
  text: 韻府羣玉卷十八元隂勁弦隂復春編入聲四質與術櫛同用質之日切實也朴也正也語文勝丨則史侯質鄉射禮天子熊丨白侯諸侯麋侯丹丨大夫布侯畫虎豹士布丨畫鹿豕凡畫者丹丨儀禮羊質丨丨虎皮見革而悦見豺而戰揚子馬質有丨丨周禮夏官質平也賈丨平其價者郢質眷然思丨丨谷委質䇿名丨丨左猶丨身影質後魏徐遵明好聚歛聚徒教授懸納絲粟留衣物以侍之名曰丨丨損儒者風史蒲柳質顧愷之曰丨丨之丨望秋先零詳髪圭璋質漢書儒有丨丨之丨詳辨斵斤死質郢人垔漫鼻端匠石丨之而鼻不傷曰臣能斵之而臣質死乆矣詳斤無半千質丁晉公謂白稹豈丨丨丨丨物邪詳去聲當活套的丨弱丨郅北地有郁丨縣姓氏丨都仕漢直諌行法不避貴戚號蒼鷹日中尉丨揮字君章建武中為上門候帝獵夜還拒闗不開明賜揮布帛遷長安守一子夀字伯孝以亷能稱官尚書令丨伯尚與黄叔度等為汝南六孝亷仕漢太守鑕斧丨礩丨柱下石礎也蛭水丨入人肉者又大者為馬丨亦曰馬蜞又有石丨草丨泥丨桎足械又窒也莊窮丨不行隲牡馬又定也書隂丨下民又􅀈也日人質切説文太陽之精十日堯時丨丨並出草木燋枯堯命羿仰射巾九烏皆死堕羽翼淮南天有丨丨左十干也旭日丨丨始旦詩初出日也御日羲和丨丨詳御傾日葵藿丨丨曹宴表捧日魏崔昱少時夢上泰山兩手丨丨史吠日庸蜀之南恒雨少日日出則犬丨桞文逐日夸父不量力欲返日景丨之嵎谷之際道渴而死列化日丨國之丨舒以長故民間暇而有餘力潜夫論剛日甲丙戌庚壬主外事柔日乙丁己辛癸主内事並記上日正月丨丨書朔也人日北齊魏收云一日為雞二日狗三日豬四日羊五日牛六日馬七日丨史古丨此丨貼人形於帳翼日越丨丨癸巳武成隻日唐制丨丨視事李遜奏陳不必擇辰本疾日辰在子卯謂之丨丨昭九長安日晉明帝幼聰年數嵗屬長安使來元帝曰日與丨丨孰近對曰長安近不聞人從日邉來可知也明日宴羣臣又問之曰丨近帝失色對曰舉目則見日未聞舉目見丨丨帝竒之本八磚日唐李程為學士性懶日過八磚乃至號丨丨學士本戈麾日魯陽公與韓戰酣日暮援丨丨之丨退三舍淮南劒指日虞公與夏戰日欲落公以丨丨丨日退不落淮南虹貫日荆軻發後太子見白丨丨丨不徹曰事不成矣史記互見虹語移日滕公與髙祖丨未嘗不丨丨史兒辯日孔子與小丨問丨一兒曰丨始出近日中時逺初出如車輪其中如盤葢不為逺者小而近者大乎一兒曰日初出時蒼蒼涼涼其中如探湯不為近者熱而逺者涼乎孔子不能决列宰相三日劉禹錫和牛僧儒詩侍公三日拂塵埃丨丨丨丨後主印可以升降百官詳塵京兆五日詳兆破敵三日五代梁王彦章晉人取鄆州末帝問丨丨之期對曰丨丨左右失笑彦章馳兩日至滑州乗流而下破城葢三日矣史生子三日崔待御丨丨丨丨白樂天詩洞房門上掛桑弧香水盆中浴鳯雛還似初生三日魄嫦娥滿月即成珠一日敵二日徐知諤曰吾生長王家窮極讙樂丨丨可丨世人丨丨南唐書坡題息軒云我來此静坐一日當兩日若活七十年便是百四十年泠齋夜話慧日曜丨丨於康衢頭陀寺碑亦云佛日窓就日有老宿見日影透窓因問百丈惟政師曰丨丨丨邪日就窓邪詳窓詩萹吉丨美宣王田也之能慎㣲接下小雅東方丨刺時也齊衵女人近身衣馹驛轉也實神質切誠也滿也黄霸傳有名无丨武侯傳循名責丨當桂華不丨詳去聲谷種桃無季丨萍實楚昭工渡江有物大如斗圓而赤直觸王舟取之問之孔子曰此丨丨也可剖食之惟霸者獲焉家語軍實以數丨丨左𨼆五堕丨丨而長㓂讎僖三十三竹實阮籍遊薊門山有隠者莫知姓名惟丨丨數斛桕杵而已魏志鳯凰非丨丨不食橡實摯唐飢甚拾丨丨食之又杜甫事並詳橡草實蘇武掘野鼠去丨丨食之史去藏也茂實蜚英聲騰丨丨相如賦琇實充耳丨丨詩口實自求丨丨易頥卦以台為丨丨書反是實唐索元禮訊囚作大枷有求破家丨丨丨等名號史詳心虚腹實聖人虚其丨而實其腹詳腹皮膚真實娑羅林中有一樹足一百年其樹丨丨枝葉悉皆脫落惟丨丨在湼槃經人名叚秀丨笏擊朱泚詳笏秩直一切説文積也詩徳音丨丨假樂丨丨斯干注流行貌書咸丨无文洛誥執秩晉文公作丨丨以正其官左主爵之官平秩丨丨東作書丨丨者地因髙下之宜民稱强弱之力適其平安之序於耕作也望秩丨丨于山川書名山大川以秩次望祭之求歸老秩沈約老病百日欲謝事而丨丨丨之丨詳臂禾失為秩後蔡茷夢取得中穗末復失之郭喬卿曰丨丨丨丨失之得禄秩也旬日徴為司徒史活套品丨禄丨人名劉丨房琯曰賊安能當我劉丨詳河帙書衣也或作表莊子散其天袠緗帙名人才子名益於縹囊飛文染翰卷盈乎丨丨丨序縹青白色湘淺黄色隱帙唐李邕李嶠試以奥篇丨丨史書帙色侵丨丨晩杜姪左丨其從姑一馬援戒子丨書詳狗杜牧之詩小丨名阿宜訓姪謝幾卿兄才卿卒子孤幼幾卿撫育甚厚晉史任瓌卑孤任忠撫愛之曰吾子雖多庸保爾所以寄門户者瓌也棄兒全姪魏張範子陵及弟子戩為賊所得範詣賊請二子賊以陵還範曰人情雖愛其子然吾怜戩之小請以陵易之賊義其志悉以還鄧攸事同詳兒督軍舉姪符堅侵㓂謝安舉兄子𤣥為前鋒戰却之相才薦姪宋真宗過洛幸吕蒙正宅問諸子孰可用對曰臣諸子皆豚犬惟有姪夷簡任頴川推官宰丨丨也遂至大用聞見録膝息七切荀朗陵坐子丨前詳聚鶴膝丨丨犀渠唐王志愔傳丨丨含霜張鷟集矛膝也詩沈約謂詩病囬曰丨丨謂弟五字不得與第十五字同聲苑類格抱膝長嘯丨丨諸葛亮傳容膝審丨丨之易安陶詞促膝夜如何其初丨丨杜捫膝後魏賈景興棲遲不仕葛榮䧟兾州稱疾不拜每丨丨曰吾不負汝以不拜榮故也史趙宋喻汝礪號丨丨先生婢膝陸龜䝉散人歌奴顔丨丨真乞丐反以正直為狂癡手下膝蜀先主垂丨丨丨顧自見其耳史腹下膝安禄山丨緩丨丨史加諸膝進人若將丨丨丨記不負膝見捫膝下不屈膝郭子儀遣使至魏田丞嗣西望拜曰兹膝丨丨於人乆矣今為公拜本駕囓膝丨丨丨驂乗旦膝馬良者能自囓及其詳輿羝屈膝左慈化為老丨丨前兩丨詳羝枕天子膝李泌曰臣絶粒旡家皆非所欲但丨丨丨丨睡一覺使有司奏客星犯帝座足矣鄴侯家傳坐楊妃膝劉晏年八嵗獻東封書明皇命入殿内丨丨丨丨上親為畫眉總髻傳信記渭川兩膝太公垂釣丨丨丨丨遺跡猶存水經隨身兩膝萬里丨丨惟丨丨坡抱子置膝王述愛子坦之長大猶丨置膝上為桓温長史因言温欲為子求昏於述述大怒排下曰汝竟癡邪本墮馬傷膝後吳漢圍蘇茂丨丨丨丨還营諸將曰大敵在前而公傷卧衆心懼矣漢勃然起齊鼓而進大破之本佞人枕膝魏蘇則董昭嘗枕其膝則推下之曰蘇則膝非丨丨枕史活套危丨擁丨吟揺丨琴横丨悉選難可詳丨一於悉切書惟精惟丨孟耕者九丨中庸行之者丨丨漢武發十策𢎞不得詳策太一丨丨者天地未分混沌之元炁記疏又漢武祠天祚泰一天一星名在紫垣端門之左位真一守丨丨篤者頭今白秃髪更生真誥坡云予在白鶴軒居遇一偉人如吕洞賔以丨丨酒法授之仇池筆記坡有丨丨酒詩米麥水三一而已故曰丨丨尺一丨丨選舉陳審傳漢以丨丨板冩詔書抱一營魂丨丨能无離乎老子丨丨无窮年坡四十二畫一曹參代蕭何為相一遵何約束百姓歌曰蕭何為法講若丨丨曹叅代之守而勿失載其清靖民以寜臺本借一收拾餘燼背城丨丨成二通一丨于丨萬事畢莊得一晉裴楷曰天丨丨以清地丨丨以寜侯王丨丨以為天下貞史六一歐公曰吾集古録一千卷藏書一萬卷有琴一張棊一局置酒一壺吾老其間是為丨丨居士第一漢書論功行封蕭何丨丨居又公孫𢎞時百餘人對策奏𢎞第下天子櫂為丨丨詳又丨丨流人流營什一劉伯龍將丨丨丨之方鬼在旁大笑詳笑萬分一有如丨丨丨張釋之傳得彪三十一裴旻善射一月丨丨丨丨丨詳彪萬法歸一丨丨丨丨一歸何處詳衫壹寧壹民以丨丨漢書詳一專壹若琴瑟之丨丨誰能聴之左志壹丨丨氣壹孟人名班丨秦末避地樓煩以財雄邉故北方多以丨為字者伏趙丨為皇甫規所敬史聶丨漢㕍門馬邑豪也請兵擊匃奴七親吉切語童子六丨人孟賢聖六丨作武侯傳丨縱丨禽四七丨丨之際大王光武紀謂二十八將虞七丨丨學書以手畫肚詳腹謂世南殷七七仙人重九日開杜䳌花事詳䳌侍御七鑿八丨丨丨詳御謂糲米一石舂得七斗也建安能者七韓丨丨丨丨丨卓犖變風操末孔融陳琳王粲徐幹阮瑀應㻛劉穆皆漢建安時人食鮭二十七庾杲之丨二十七種丨菜詳韭不識六與七淵明責子詩雍端年十三丨丨丨丨丨身十七第三祖問四祖汝年幾耶荅曰十七師曰丨丨丨邪性十七邪云云曰我丨丨丨也傳燈漆詩山有丨癩椅桐梓丨乞巧文擬歩如丨史豫讓丨身為本作黍監趙襄子丨智伯頭為飲器服漆浮漆不粘者服之通神抱朴華佗服丨丨葉事詳枯千畆漆陳夏丨丨丨其人與千户封君等貨殖傳燈盞漆古冡有漆一盞篆文曰漆丨猶未滅留待沈彬來詳燈城欲漆秦二世欲漆其丨優旃曰佳哉漆城蕩蕩冦來不可上顧未為䕃室二世笑而止史眼如漆杜乂丨丨㸃丨詳眼髪如漆幼子眼如畫丨漆黒詳珥墨如漆浮提國金壼中丨汴丨淳丨洒地成字詳汁殿上髹漆中庭彤朱丨丨丨丨趙飛燕傳以漆物曰髹髹許求切雷陳膠漆丨義與丨重為友義舉茂才讓於重刺史不聴義遂不應命後同舉孝亷俱拜尚書郎語曰丨丨自謂堅不如雷與陳漢本傳作器先種漆奬宏父重欲丨丨丨丨丨樹人嗤之後皆得用向之笑者咸求假焉貲至鉅萬本活套暗如姓氏魯相丨雕開之後出為青州北海望族丨沈為魯相其先居雍州丨水因姓丨季直晉永嘉中為洪州刺史丨凱之仕宋為郎中令與謝濕談論謝𢎞㣲傳丨登豫章人釣于蜀水得金鎻引之不絶俄盈舟有物浮水黒色登了无怖述異記丨李髙仕唐為江西觀察使匹譬吉切俗作疋四丈也馬光景一疋長故亦曰疋王丹賻友人縑一丨詳縑疇匹少有丨丨後博該傳楚辭注二人為匹四人為丨靈匹謝靈運詠十女云雲漢有丨丨羣匹率由丨丨假樂丨臣行能丨偶也亞匹諸葛亮識治之良才管蕭之丨丨史無匹淵明責子詩阿舒已二八懶惰故丨丨未遭良匹後袁隗娶馬融女隗曰處姊未適先行可乎曰妾姊髙行殊兒丨丨丨丨不似鄙薄茍然而已史絲累成疋樂羊子廢學妻趍機曰一丨而丨至寸至寸不已遂成於尺累尺不已遂丨丈丨羊感之勤學詳絲毎字三匹皇甫湜作福先寺碑云丨丨丨丨絹更減不得詳碑夢絹兩疋沈慶之年八十丨人與兩疋丨寤曰今年不免矣詳絹紫纈四百疋鄭雲丨丨丨丨丨得刺史詳纈吉居質切説文善也書動罔不丨子孫其逢丨禮正月之丨始和習吉卜不丨丨禹謨謂不再吉卜元吉温嶠令郭璞丨已與庾亮吉凶璞曰丨丨嶠曰景純毎筮不敢盡言今曰元吉是事有成也於是恊同滅王敦晉志人名丙丨漢賢相王丨三世清亷漢人李長丨唐詩人名賀姓氏馮翊徴音黄帝之𦙍一云尹吉甫之後丨挹字祖冲仕晉西朝傾覆隕身守節丨士瞻字梁容少有志氣為西陽武昌二郡清約家无私積梁史丨翰字休文為益州刺史著美績甚得方伯体丨翂字彦霄孝行淳至父為吏所誣翂年十五撾登聞鼓乞代父命帝稱竒童梁史丨中孚大厯才子中人官至户侍丨旼唐九老㑹中人官衛尉卿詳老丨項唐武后時擢中丞能抑武興唐丨温與羅希