鏃骨瓝小𤓰犦即封牛抵觸百獸故金吾仗刻丨牛於槊首鰒海魚一曰石決明王莽傳但飲酒㗖丨魚璞疋角切鹽鐵論玉丨抵鵲詳鵲獻璞卞和玉璞獻楚王王以為欺刖其足詳玉渾璞丨金丨玉詳金鼠璞丨丨一云璞當作朴詳朴人名郭丨精丨䇪詳囊朴亦作樸前酷吏傳斵琱為璞孝經其風丨略示朴丨丨為天下先文帝紀馬援兄況曰良工不丨人以丨史䑕朴鄭人謂玉未理者璞周人謂丨未者丨周人懷朴遇鄭賈曰欲買朴乎出示之乃鼠也因謝不敢戰國策朴一作璞才厚朴盧端為莊宗管記草陳𤣥醫學傳士制既懷厚朴之才宜典從容之職紀異録干將璞巧治鑄丨丨之丨王褒傳火龍朴梁范述曾為永嘉太守為政清平罷鄀惟得白桐木丨丨丨十餘枚而已史人名葛𤣥號仙翁又號抱朴子殻苦角切亦作殻素也又皮甲也龜殻盧敖至北海見一土卷丨丨而食蛤蜊詳龜有類丨縮丨歐蟹殻善化國貢丨長九尺百足四丨以為丨丨勝鳯喙洞冥記蚶殻丨丨龍牙詳牙茘枝名蝸殻蟻適于垤丨体于丨乞巧文卵孚也又烏卵鵠丨丨攢瓌橙韓聨句禽盤饋丨丨韓納凉確繫辭丨然示人唐史王珪丨論雅志彌丨埆丨又地不平愨選懐忠抱丨活套愿丨端丨濁直角切説文不清也詩涇以謂丨騷舉世皆濁士丨流詳流黄憲傳撓之不丨激濁丨丨揚清王維鄰醪濁陶侃家貧客至丨人宻於牆頭送以丨丨隻雞詳醪又飲客謂濁酒為賢人詳酒滄浪濁丨丨之水丨兮可以濁我纓孟黃鍾濁詞歌白苧清琴弄丨丨丨坡心源濁新詩為寫丨丨丨坡將軍號濁明亮曰授臣勇武丨丨其丨至丨詳逺五濁劫濁見㻿煩惱濁衆生濁命濁彌陀經摩尼照濁惟有丨丨珠可丨丨水源杜詩丨丨珠入濁水而不為河濁所累也詳照濯詩可以丨罍澣丨之衣孟清斯丨纓鹿丨丨若彼丨丨逝不以丨鐲征也禮以金丨節鼔握於角切説文猛持也易萃卦一丨為笑注小兒也東都賦丨乾符尚書丨蘭含香詳香吐握躬丨丨之旁王褒傳掌握漢陸賈謂陳平曰為社稷計在兩君丨丨爾夲朴握坡游徑山寒窻緩足來丨丨兔也把握屈伸丨丨柳正傳牛角握祭宗廟之丨丨丨記王制握謂用長不出膚天一握興元南山絶頂謂之孤雲兩角諺云孤雲兩角去丨丨丨廣異記覺來五鼔日三竿始信孤雲丨丨丨坡髪三握周公一沐三握丨史記幄説文幬也漢書運籌帷丨虎幄衛侯為丨丨於藉圃左哀十七裙幄長安士女遊春遇名花則藉草而坐解裙四圍謂之丨丨天寶遺事活套葉丨翠丨渥詩顔如丨丹注丨厚責也優渥既丨既丨詩霑也殊渥文彩承丨丨杜渥潤澤也新渥丨丨照乾坤杜形渥覆公餗其丨丨鼎卦丨丨赧汗也大臣覆敗故其丨丨也喔雞聲又丨咿强笑貌剭刑也易其刑丨前哀敘傳㡳丨鼎臣注重誅也踔勑角切跣丨不常卓踔汗瀾丨丨韓文序吟踔丨丨而行莊逴逺也犖吕角切史天官書此其丨丨大者注事之明也卓犖竒逸丨丨陳澄傳丨丨為傑進學解駁犖韓詩大壁曠疑淨古畫竒丨丨緯涼駁牛雜色廣韻注赤瑕丨丨亦瑕赤玉也丨丨㸃采也軋犖禄山母檮子丨丨山遂字丨丨後姓安名禄山誰如犖有力丨丨丨坡十二卷圉人犖自牆外與之戲子般怒使鞭之公曰是不可鞭犖有力馬能投葢于稷門左解詳益學胡覺切説文覺悟也記獨丨無反語好丨仕優則丨孟幼丨壯行樸學兒寛武帝曰吾始以尚書為丨丨弗好聞寛説可觀史宦學以君卿之材何不丨丨漢婁護孤學唐楊瑒曰習春秋三家禮議者才十二請能通者加優官奨丨丨史耳學宋沈慶之手不知書目不識字粗有口辯嘗謂蕭斌曰節下有一范増而不能用斌曰沈公乃更學問慶之曰人不如下官丨丨也皮斆學丨丨半記劒學項籍曰丨一人敵不足丨詳劒晚學孔子五十學易曽子七十荀卿五十乃學公孫𢎞四十方讀春秋皇甫謐二十始受孝經論語顔氏家訓曲學公孫子母丨丨以阿世史青箱學王氏丨丨之丨詳箱不負所學陸贄曰下丨丨丨丨詳負鷽山鵲知來事又小鳩莊蜩與丨鳩笑之翯鳥白肥澤貌詩白鳥丨丨确磽丨韓山石犖犖行徑㣲齪側角切開孔具又齷丨迫也酈食其傳齷丨好竒相如傳委瑣握丨義同韻府羣玉卷十七
