body:
  text: 韻府羣玉卷十七元陰勁弦陰復春編入聲一屋獨用屋烏谷切説文居也記富潤屋大學董䇿徒彼牆丨塞破丨子詳孔金屋丨丨貯阿嬌漢武事詳嬌黄屋丨丨非堯心選項羽圍漢滎陽紀信誑楚乗王車丨丨左纛曰漢王降楚以故漢王出遁黄繒葢裹也白屋白葢之屋以茅覆之蕭望之傳注周公下丨丨樂府烏屋曕丨爰止于誰之丨詩爰屋及丨詳胥海屋丨丨添籌詳柭板屋在其丨丨亂我心曲詩西戎之俗以丨為丨秦亦然葺屋匠人丨丨三分瓦屋四分禮茅茨屋也蒲屋唐楊於陵教民陶瓦易丨丨比屋堯舜之世丨丨可封王莽傳寓屋趙宋汪龍溪為鄭圍道作丨丨記古文矮屋張彖為華陰簿為守令所抑笑曰若亡身丨丨之下使人擡頭不得棄官而去天實遺事破屋丨丨數間而已矣盧仝雪屋髙浪翻丨丨坡帽屋江左時野人已著丨但頂員爾後乃髙其丨云夏屋丨丨渠渠詩古註大俎食具也作巨室用非神屋龜甲也南越志道人獨藏丨丨谷賦茅屋杜甫有茅屋為秋風所破歌已公茅屋下可以賦新詩杜已上人茅齋脩刺牛屋褚公裒遷記室參軍送故吏投錢塘亭同時吳興沈縣令送客至亭吏公移牛屋下沈問牛屋下是何牧人褚曰江南褚季野逺近久承名令大遽便於牛屋下丨丨詣公鞭撻亭吏陸處無屋張融曰臣丨丨丨丨水居無舟詳舡書掛牆屋陳子昻曰陛下詔書不得其人則委棄掛牆屋爾史屋下架屋牀上疊牀丨丨丨丨詳牀地理王丨山名剭誅也易其刑丨牘徒谷切書板前原涉傳削丨為疏左大事書於䇿小事簡丨而已尺牘漢陳遵善書異人丨丨皆藏去以為榮本晉宋兵革之間禁書疏非弔喪問疾不得行丨丨故羲之首云死罪雜志累牘連篇丨丨不出月露之刑積案盈箱盡是風雲之狀李諤書舂牘笙師掌教丨丨應雅周禮牘樂竹大五六寸長七又短者一二尺虚中筩無底其端兩孔春者以兩手築地取聲賓醉而出以為行節應樂雅樂互見應雅句尺一牘漢遺單于書以丨丨丨中行説教單于為尺二寸牘報漢匈奴傳陳留牘帝見丨丨吏丨止曰河南南陽不可問詳問三千牘東方朔初上書凡用丨丨奏丨讀之二月乃盡史獄吏書牘周勃恐不知置辭丨丨乃丨丨背示之史讀説文誦書也記冬丨書邊孝先懶丨書詳笥三過讀遺州手札適復至紙長要自丨丨丨詳暄不再讀過眼丨丨丨韓五車丨丨丨坡唐蕭頴士與李華陸據游龍門讀道旁碑頴士即誦華再據三乃能盡記本十年讀曽知事大繆恨不丨丨丨坡燈火讀搜攪十年丨丨丨黄詳書七分讀郭功父詩見東坡先自吟誦聲振左右既罷問此詩幾分來地坡曰十分丨丨來是丨三分來是詩古今詩話行且讀李宻掛漢書牛角丨丨丨詳書官書竊讀陳城不能得書求於集賢寫書乃竊丨丨讀之六年無所不通書貴熟讀晦庵云丨丨丨丨多自然曉摸碑暗讀蔡邕能暗手丨曹娥丨文而讀之犢説文牛子也白犢宋有行義者三世黑牛生丨丨孔子曰此吉祥也居一年其父盲牛復生丨丨其于又盲後楚攻宋丁壯死者大半此人父子有疾皆免列黑犢劉毅樗蒲餘人並丨丨惟毅得雉詳盧互見雉犢黄犢眠分丨丨草荆公孤犢列禦寇于見犧牛手衣以衣綉食以芻菽及牽入大厦雖欲為丨丨得乎莊三犢愛之逺徙向幽谷曳以丨丨載兩輪歐溪大石詩去國尚能丨丨載坡佩犢龔遂為渤海太守盜起民有帶刀劒者使賣劒買牛賣刀買犢曰何為帶牛丨丨本留犢魏時苗為壽春令生一犢丨淮南本舐犢漢太尉楊彪子脩為曹操所殺操見之彪問曰公何痩之甚曰悔無日磾光史見明猶懷老牛丨丨之愛操為改容牧犢堯以天下讓巢父巢父曰君之牧天下亦猶予之丨孤丨焉用惴惴然以所牧而與予予無用天下為也牽犢而去莊子抱犢丨丨山在上黨後魏葛榮亂百姓丨丨於山因名王維詩入雲中兮養雞上山頭兮丨丨道書福地記嬰犢或問太古徳懷不禮懷丨兒慕駒丨從焉用禮曰丨丨母懷不父懷母懷愛也父懷敬也獨母而不父未若父母之懿楊子羔犢以牛子之弱而捍虎狼之敵鄒陽書羊犢後魏濟南王暉業不復圖全惟事飲啗一日三丨三日一丨史禽犢小人之學也以為丨丨荀子謂饋獻之物雉犢傳塞有梟廬丨丨為勝負之采詳廬繭栗犢後趙熹更始引見曰丨丨丨豈能負重致逺乎後降武陰更始大悦史惠莊謂朱雲粟犢反能爾邪西京雜記妄認犢晋王延生牛犢人認之延與之後知丨丨還延不復取也本與晉宋沖事同上流飲犢堯召許由為九州長不欲聞之洗耳於水濱巢父牽犢欲飲之見由問其故巢父曰子若處髙厓空谷誰能見子子故浮遊俗間茍求名譽汙吾犢口牽丨丨而丨之髙士傳魄兔焱犢徐彦伯為文以芻狗為卉犬竹馬為篠駿月兔為丨丨風牛為丨丨後進效之謂之澁體僉載人名牧丨子七十無妻作雉朝飛操竇鳴丨趙賢大夫簡子殺之孔子作將歸操韓文殰胎敗也記胎生不丨髑丨髏瀆四丨江河淮濟皆獨發源注海故稱丨易再三丨韻㑹作黷孟溝丨汚瀆我寧遊戲於丨丨之中莊尋常之丨丨兮騷枯瀆宻雨溟沐潤于丨丨太𤣥央瀆入其丨丨荀子中瀆也黷説文握持垢也又濁也慁也威黷恩褺丨丨選潤黷林木為之丨丨選呉都賦􅀈兒也活套喧丨讟痛怨也春秋民無怨丨匵丨也函也又小倌也語㺯玉韞丨通作儥玉櫝龜丨踐於丨中語漦櫝夏后之衰二神龍止於庭乃請其漦藏之龍亡而丨在丨夏殷周傳此器莫教發至厲王發而觀之漦流于庭化為𤣥黿後宫童妾遭之而孕褒姒周紀活套劎丨獨孟丨善丨樂樂記丨學而無友學記中庸謹丨丨酌詳酌丨清詳清丨醒詳醒丨步詳步蘧伯玉恥丨為君子詳半黄獨丨丨无苗山雪盛詳械本草曰赭魁似芋可食亦曰土卯夜提長鑱掘丨丨谷羈獨閉門把丨丨谷煢獨無虐丨丨書洪範猿獨有獸名獨似猿而大食猿猿性羣獨性特猿鳴三獨鳴一説文瀆言獨唐許敬宗曰丨丨丨也不因餘水獨能赴海狀雖微獨而再也有犬為獨蜀使張奉使吳以姓字相嘲吳薛綜云蜀者何也丨丨丨丨無犬為蜀横日茍身蟲入其腹奉無以對三國志蜀犬為獨丨中丨丨丨字詳館即獨眠孤館事惟松柏獨受命於地丨丨丨丨也正詳正活套幽丨轂古禄切輻所凑也三十輻共一丨渾天儀天運如車丨之運長轂丨丨雷野後漢書轂徑一尺有奇長三尺二寸三分暢轂文茵丨丨詩暢長也華轂三氏乘朱輪丨丨者二十三人劉向傳笠轂伯棼射玉汏輈貫丨丨宣四兵車無葢尊者則使人執丨依丨而立輦轂入侍丨丨選擊轂馳車丨丨嚴安書車轂擊鑑接轂方章門車常丨丨前游俠傳丹轂客欲朱丹吾轂不知一跌將赤吾之族也太𤣥炙轂丨丨輠髠史言淳于髠之智如丨丨輠然詳輠及奭偏轂丨丨不可行隻翼不可翔孟郊柴轂袁紹愛士養名輜軿丨丨填接街中本賤者車推轂王者之遣將也跪而丨丨曰門以外將軍制之馮唐傳鄭當時丨丨上常引以為資於己薦人如車轂運轉轉轂碌碌復碌碌百年雙丨丨賈島鹿挾轂漢鄭𢎞為太守白丨丨丨本谷説文泉出流則為丨孟幽丨書暘丨韓文謙受之丨秦紀塹山煙丨湯谷右以丨丨為界相如賦日所出處熱如丨丨嶰谷黄帝使伶倫取竹之丨丨生其竅厚均者斷兩節問吹之以為黄鍾之宫漢律歴志又曲水詩序作解谷注解脱也谷潛也取竹之無谷節者甘谷南陽酈縣有丨丨水左右生甘菊花墮其中飲此水者無不壽抱朴子黍谷燕有谷寒不生五谷鄒衍吹律而温氣至堪丨劉向别録金谷石崇有别館在河陽之丨丨鄭谷鄭子真耕於谷口故曰丨丨空谷在彼丨丨詩丨丨足音詳音壑谷鄭伯有嗜酒為窟室雨夜飲酒擊鍾焉朝至未已朝者曰公焉在曰吾公在丨丨襄三十維谷進退丨丨詩谷窮也陵谷髙岸為谷深谷為陵十月之交煖谷道州有丨丨在寒亭之旁蔣之奇記云盛寒入此谷其氣温然康王谷丨丨丨水簾飛泉天下第一詳簾武一谷武行徳業採樵有力謂可負一谷之薪號丨丨丨五代史補子午谷故人今居丨丨丨杜通子午道從杜陵直絶南山徑漢中王莽傳王官谷唐司空圖隠中條山丨丨丨作亭名休休盜賊所過獨不入丨丨丨史互見休天下谷知其白守其辱為丨丨丨詳溪分肉溪谷肉之大㑹為谷肉之小㑹為溪丨丨之問丨丨之㑹以行榮衛以㑹大氣古今注地理夾丨齊魯㑹處亟丨秦關盤丨李愿隠處鉶丨秦坑儒處人名鬼谷子居鬼谷墟因號蘇秦習其術於鬼谷黄山丨詳黄姓氏上谷羽音漢衛司馬丨吉代居長安生求丨求字子雲舉直言極諫之士永為第一擢光禄大夫子雲筆札詳札善言災異專攻上身丨軍字元仲父逺彎弓三百斤勇冠一時仕慕容垂位廣武將軍丨耶律博識羣書褚遂良稱九經庫唐遷諫議大夫榖説文續也百丨之總名也書農殖嘉丨吕刑詩食我場丨白駒始播百丨七月古詩五月糶新丨又禄也語邦有道丨不志於丨丨又善也詩丨旦于差九穀三農生丨丨禮天官黍稷稻麻大小豆大小麥諸説不同五榖麻黍稷麥豆一穀不升曰歉二曰饑三曰饉四曰康五曰大侵穀梁方榖凡厥正人既富丨丨書洪範正直之人當以爵禄富之又以善道接也旅榖野榖丨生光武紀雨榖漢宣帝時江淮饑饉丨丨三日述異記辟榖張良學丨丨本館榖晉師三日丨丨左館者舍也食楚庫穀三日僖廿八戩榖俾爾丨丨詩天保丨盡也穀善也問錢榖漢文丨丞相勃天下丨丨一嵗出入幾何勃謝不知本五臟穀李守愚侵晨并花水吞黒豆五七粒謂之丨丨丨至老視聽不衰荆朔近事人名臧丨亡羊事詳羊禽獸布丨禽名穀楮也詩其下維丨書桑丨共生于朝萬榖王羲之制窮丨丨之皮晉書種穀居之一嵗丨之以丨丨十嵗種之以木史貨殖傳縠胡谷切縐紗坡詩世味薄如丨霧縠丨丨之組麗女工之蠧矣楊輕靡如丨也霞縠氷綃丨丨選綺縠賈人毋得衣丨丨髙帝紀方空縠漢章帝詔省水紈丨丨丨吹綸絮本謂紗薄如空也人名郤丨説禮樂敦詩書晉使將中軍斛説文十斗也杯斛何諷夢渇賦俄據河而俯瀆乃器舟而丨丨舟萬斛萬斛之丨行疾風杜珠三斛石崇珠丨丨買緑珠詳珠愁萬斛且將一寸心能容萬斛愁庾信愁賦螢數斛隋煬帝徴丨火丨丨光偏岩谷詳螢酒三百斛阮籍聞步兵厨貯丨丨丨丨求為步兵校尉詳厨米三千斛魯肅與周瑜丨丨丨丨詳困檳榔一斛劉穆之以丨丨丨丨遺妻兄詳榔算酒一斛趙違丨主人東壁下有美丨丨丨詳肉覔米千斛陳壽丨丨丨作佳傳詳傳給軍小斛太祖患廪穀不足主者請以小斛給之太祖曰善後軍謂欺衆太祖謂主者當借汝死以厭衆軍遂斬之魏志胡椒八百斛元載事詳椒觳丨觫槲唐則天赦曰置金雞於大丨樹號金雞樹史北齊李元忠時葛榮起兵元忠坐大丨樹下斬違命者三百人賊至輒却之史哭空谷切説文哀聲也語子哭之慟孟善丨其夫賈誼傳可為痛丨者與泣啼通看巷哭子産死鄭人丨丨三月孔叢子羊祜死西州罷市丨丨本濕哭何須乾帝丨丨北齊丨景秦庭哭吳入郢申包胥如丨乞師勺水不入口七日依於丨牆而丨日夜不絶聲秦師乃出大敗吳師定四互見甲鄒衍哭丨丨被譖仰天而丨六月降霜詳霜哀猿哭月峽丨丨丨坡窮途哭阮籍率意獨駕車跡所丨慟哭而返詳途天魔哭宴坐丨丨丨坡神應哭詩人雕刻草木攫抉肝腎丨丨丨坡一路哭趙宋參政范文正取班簿視不才監司一筆勾之富公曰范十二文則是一筆勾去焉知一家哭矣公曰一家哭何如丨丨丨邪言行録抱璞哭卞和丨玉丨畫夜丨詳玉壞麻哭陽城曰以裴延齡為相吾當取白麻裂之慟哭於庭史蹇叔哭秦召孟明襲鄭丨丨丨之曰孟子吾見師之出不見其入也僖二十二年互見陵鳩婦哭村暗丨丨丨