洛陽令䃴礛丨礪也可以攻王􅀈蜛丨蟲名一名螳丨選江賦蜛丨森衰以垂翹注南越志蜛丨一頭尾有數條長二三尺左右有腳狀如蠶可食除直魚切説文殿陛也王粲賦循階丨而不降又去也左蔓草猶不可丨韓朝蒲久已丨玊除凝霜倚丨丨選時雨㵼丨丨黃皆謂殿階椒除南下丨丨王莽傳殿陛之道椒取其芬香之名詔除谷永曰免不正之丨丨糞除張躍曰小人丨丨先人之敝廬昭三年風除霆掃丨丨大宗紀半除隋內官多服丨丨即今長袖唐減為半臂炙轂子活套蠲丨掃丨解丨破丨剪丨拔丨嵗丨階丨庭丨新丨習氣丨酒破丨豪氣丨儲説文待也一曰積聚以為副二也太子副君故謂之丨也東儲太子也南齊書倉儲唐司農掌丨丨飲儲下酒物謂之丨類説儋石儲家無丨丨之丨而樗蒲一擲百萬劉毅傳重寶儲金璧雖丨丨費用難貯丨韓五斗儲雍容丨丨丨歐活套軍丨祕丨逐丨姓氏河東羽音孟丨子為相羲後漢丨太伯檢汜水尉丨光四世孫丨隱校郎中筡簡丨草似竹篨蘧丨竹席坡醺人臥蘧丨陳後山時須一俯仰君可貸蘧丨躇韓作詩勸􅀈丨猶豫也屠休丨胸奴王號休音朽滁水名又州名歐環丨皆山也如人諸切説文從隨也從女從口徐曰女子從父之教從夫之命故從口一曰而也又然也易突丨其來丨語吾不丨老農又往也左丨棠丨齊之類去不如就其所以如舜者丨其所以丨丨舜者韓繡不如倚市懸知丨丨丨坡詳市門女相如吳絳仙才調丨丨丨也南部煙花記真如丨丨有變易如向無明作大智之類若丨丨無變易是外道也傳燈如如智隍問以何為禪定玄策曰妙湛圓寂體用丨丨五隂本空六塵非有曰又云性相丨丨常住不遷名道傳傳燈曇如白足和尚也本覺為如丨丨丨丨今覺為來道院集活套申丨弗丨翼丨闕丨純丨晏丨稟丨翕丨豁丨㶧丨慊丨威丨焚丨紛丨人名司馬相丨藺相丨茹相牽引貌又茅根易運丨音如又食也王莽傳不丨園葵又詩來咨來丨鴽􅀈屬月令田鼠化為丨蛆子余切卿丨蜈蚣韓蟲鞭背生丨丨韓玉蛆桑落初嘗艷丨丨坡浮蛆丨丨灧金碗坡謂酒夢蛆髙唐祖舉兵丨身死墜床下為羣丨所食智蒲禪師曰公得天下矣羣蛆食􅀈兆趍附也紀異録腰蛆隋煬帝造船人自丨以下皆生丨史雪蛆娥媚丨丨湄內熱雜志蝍蛆騰蛟之神始於丨丨史龜筵騰蛇龍屬丨丨似䗌食蛇且語助詩籩豆有丨丨椒聊丨逺條丨丨既亟只丨乃見狂韓不係父母芭且芭蕉也諸柘丨丨相如傳人名龍丨項羽將余丨漁者余音預詳龜夏無丨秦醫人栁太史徴無且沮長丨事見論語苴履中草履藉也賈䇿冠雖敝不以丨履記飯腥而丨熱注包也詩如彼棲丨七加反補丨鏬漏子加反互見七余反苴勻苞苴湯禱旱曰丨丨行歟荀於木瓜見丨丨之禮行詳瓜凡丨丨問人者禮墟去魚切大丘也通作虛賈䇿社稷為虛郊墟新涼入丨丨韓丘墟晉志翔為丨丨歸墟勃海之東有大壑名曰丨丨列湯問參墟鳯翔丨丨選東京賦村墟喬木丨丨古崑崙墟朝倚扶葉枝莫宿丨丨丨歐郭氏墟齊桓公問丨丨曷為丨野人曰善善不能行惡惡不能去是以為墟新序逍遙墟孔宿於義以遊丨丨之丨莊活套幽丨楚丨荒丨故丨鄧丨舜地狐免丨坡豺豕丨谷嶇路崎丨也袪衣袂夫丨猶在詳宿詩執子之丨遵大路豹袪羔裘丨丨詩塵袪丨丨又一摻韓化人袪西極之國有丨丨來王執化人之丨騰而上者中天而止阹依山谷為牛馬圈揚羽獵賦泰山為丨周祛以罔為丨丨長楊賦注丨遮禽獸圍陳也胠脅也又旁開曰丨莊丨篋詳篋又去也茍丨於沙而恩水右胠狼蘧疏為丨丨左軍左翼曰啓丨翼曰丨袪却也兒寬傳合丨於天地注開也又詩以車袪丨注強健貌韓其蔽豈可丨髙適開之鄙吝丨菹側魚切孟放之丨詩是剝是丨信南山漢刑法志梟其首丨其骨內於市太守孟信以木盤盛羌菁丨與人飲詳膞蒲菹享有昌歜左注丨丨也七菹五齊丨丨禮醢人非菁芹葵茒菭筍梅菹桃菹丨丨詳諸蜍署魚切蟾蜍蝎模也背黑壽三千嵗者頭有角頷下丹書八字水羿妻切藥奔月為丨丨詳月廣川王發塜得玉丨丨容五合以為書滴詳冡又駑馬也韓不能顧丨丨不見龍蛇筆新乾硯滴蜍山谷心知死諸葛終不羡曹蜍後山詳氣袽女居切説文本作袽袽􅀈也今作丨謂塞舟漏孔之故帛易儒有衣丨通作帤黃庭經人間紛紛臭如帤帤大巾又曰幣巾又考工記弓人厚其丨則木堅謂弓中禆也拿説文持也又牽引也又煩也霍去病傳胸奴相紛丨注亂相摶持也又聖德詩獸盾騰丨又楚辭丨黃粱些注揉也韻府羣玉卷二
