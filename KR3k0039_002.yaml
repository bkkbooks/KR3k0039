body:
  text: 韻府羣玉卷二元隂徑弦隂復春編上平聲四支支章移切分也度也持也又庶也詩本丨百世又離丨自異之意又纎丨鮮丨縞也韻會樂不可丨張堪分支韓愈以雙􅊦之一贈崔立之詩云異日期對舉當如台丨丨元魏行臺給劵當中竪裂一支給有功人一支送門下防巧偽也探支丨丨六月涼風坡六言預借也析支丨丨渠搜書禹貢三支支謙受業於支亮支亮受業於支纎世稱天下博知不出丨丨髙僧傳暫息丨丨論重參二祖禪陳燕支國名古詩多用代作胭脂字西河歌失我丨丨山婦女無顔色黃支丨丨獻犀牛前平紀在日南之南月支萬里戎王子何年别丨丨杜洪支雕落丨丨漢哀序傳猶言大族四支暢於丨丨易坤反支後明帝以丨丨日不受章疏衛大論用月朔日為正戌亥朔一日丨丨申酉朔二日丨丨中戟支吕布謂袁術將曰布射戟小支中者各解兵一發正丨明日罷兵詳戟斬郅支陳湯使外國丨單于丨丨首還本置度支魏丨丨丨尚書令户部一木支大厦之顛非丨丨所支文中雞不支魯丨之不期蜀丨之丨丨韓煩撑支病骨丨丨丨坡姓氏邵陽徵音丨雄傳一其先月丨胡人今琅琊有丨氏丨遁晉天竺人字道林髙僧也丨叔才母亡廬墓白鶴止其旁唐髙宗表異其家枝説文木别生條從木支聲一曰丨柯也通作丨漢相如賦答還離丨即荔枝也晃錯傳支葉茂接桂林一丨詳桂身如蜩甲化枯丨谷標枝上如丨丨民如野鹿莊天地樹丨之丨無心在上為君者亦然野鹿者放而自得也孫枝梧桐生丨丨為琴甚清風俗通南枝庾嶺梅丨丨已落北枝方開折枝為長者丨丨孟莫待無花空丨丨詳縷親枝身也者丨之丨也記辭枝中心疑者其丨丨易駢枝丨拇丨指莊丨拇拇指連二指丨指手有六指瓊枝折丨丨而繼佩騷附枝桑無丨丨詳桑狂枝韓魏公門客踰墻宿妓公因詠竹云莫遣丨丨亂出牆詳牆賜玉枝漢武帝得西那國玉枝賜近臣年髙者病則枝汗詳汗連理枝願為丨丨丨長恨歌萬年枝風動丨丨丨謝玄暉冬青樹也借一枝李義甫烏詩上林無限樹不丨丨丨栖太宗曰將與卿全樹何只一枝鳳凰枝碧梧栖老丨丨丨杜鷦鷯枝丨丨巢林不過一丨莊珊瑚枝忽驚明月鈎釣出丨丨丨孟郊唱栁枝白樂天寵姬善丨楊丨丨因名楊栁枝詳栁舞柘枝黃通纍舉不第年將耳順應舉嘲曰老婦丨丨丨剩員呈手藝雜志本拓拔舞誤作柘枝歌竹枝北窗見月丨丨丨黃贈一枝江南無所有聊丨丨丨春范曄傲霜枝菊殘猶有丨丨丨坡橫出一枝道信大師曰廬山紫雲如蓋下有白氣橫分六道汝等會否𢎞忍曰莫是和尚化後丨丨丨丨佛法否師曰善傳燈灑楊枝水石勤子暴死佛圖澄取楊栁沾水丨之遂蘇又滕永文兩腳癴屈耆域取楊栁枝拂水而呪者三即起行髙僧傳松枝談柄詳見松草木荔枝果名獻貴妃好丨丨南海飛馳以杜牧之詩一騎紅塵妃子笑無人知是丨丨來得蔡君謨譜云興化軍太重陳紫陳氏採摘先閉户隔牆入錢者為幸樂天在忠州姻舊于財率不答但畫丨丨圖與之中張九齡賦紫紋紺理黛乘佛枝坡詩海山仙人綘羅𥜗紅紗單白玉膚炎雲馴火實瑞露酌天漿巵説文巵圜器也一名觛所以節飲食象人日在其下古以角作樊噲曰丨酒安足辭莊寓言丨言日出玉巵髙祖春丨丨為壽漏巵江河不能實丨丨淮汜論訓射巵後周宇文貴丨中金丨魏帝因賜之史與後魏宇文順事同金屈巵御宴酒盂皆丨丨丨如菜琬而有手把子夢華録匏子巵李適之飲器名卯飲巵敢乞餘圭刀歸和丨丨丨黃鸂􅥩巵唐昭宗有此巵五代人名玉丨娘子王母女肢説文本作肢體四肢也從肉只聲一曰肢支也文子曰天有四時五行九解三百六十六日人有四肢五臟九竅三百六十六節茍子如四肢之從心今文作丨孟春色柔四丨黃歸臥酸體丨通作支易坤卦暢於四支榰柱砥又丨牾詳梧氏張騫使月丨西域國名在宛西人名閼丨單于后姓氏烏丨史酈商傳破雍將軍烏丨又前貨殖傳烏丨嬴畨牧烏於然切移弋皮切説文遷徙也本作移從辵多聲今作丨語下愚不丨孟丨民丨粟梁惠王貧賤不能丨滕文上風移世變丨丨畢命山移南丨可丨此判不可搖動詳判愚公移山詳山北丨丨文詳文帶孔移沈約革丨常移丨詳孔活套星丨影丨文丨權丨推丨酏飲也四酏酒正辨四飲一清二醫三醬丨丨禮饘酏婦事舅姑丨丨酒體禮內則粥稠曰丨稀曰丨栘説文棠棣也爾雅棠棣注似白楊江東呼夫丨陸佃曰其華反向後合詩偏其反而凡木之華先合後開此華先開後合又前紀移中監蘇武使還如淳曰丨圜之中有馬廄扅扊丨門關説文日行丨丨也久日施聲樂浪有東丨縣蛇詩委丨委丨自公退食羔羊注自得委曲貌漢書作逶丨選作蜲丨音義並同貤移也移與爵賞漢注受爵又師古曰丨物之重次第鉹甑也説文曲丨一曰􅑄􅀈氷室簃説文樓閣邊小屋也䔟草萎丨兒匜説文盥器似羮魁柄中有道可以注水奉匜懷嬴丨丨沃盥左傳槃匜公食大人小臣具丨丨儀禮為公盥也巵匜敦牟丨丨內則酒漿器􅑲丨丨自得之貌孟丨丨之聲音顔色注自足其智不嗜善言之貌亦作施孟施施從外來注扁扁喜悅之貌為逺支切説文罵母猴也其為禽好爪下腹為母猴形爾雅作造也亦姓魯昭公子公為之後翼為汝丨汝丨益稷猷為有丨有丨洪範百為至於丨丨何能為鄭丨丨丨左石碏曰老夫耄矣無能為也隱四用意為文如翻水成初不丨丨丨韓奚南為丨以之九萬里而丨丨媯俱為切姓也説文虞舜居丨汭因以為氏從女為聲又州名古上谷郡地唐初置北燕州改媯州涿鹿阪泉皆在此又姓後漢有丨覽溈説文水名從水為聲出河東虞鄉縣厯山西西流至蒲版通作媯書釐降二女于媯汭史記注河東青山東山中有二泉不南流者丨水此曰丨麾許為切旌旗所以指丨楊在夷貊則引之倚門墻則丨之旌麾自可持丨丨杜旄麾右乘白丨以丨牧誓指麾立而丨丨西京賦一麾顔延之守永嘉怨憤作五君詠五薦不入朝丨丨乃出守招麾往來付造物未用相卜丨坡丨之不來丨之不去汲黯傳戈麾魯陽公逐日援丨而丨之撝裂也手指也又易謙丨痿於危切痺濕病逶説文丨􅑲庶去貌委丨丨行丨曲也倭順貌詩周道丨遲萎草木枯記哲人其丨乎榮萎草木明覆載妍臭齊丨丨韓枯萎老眼欲丨丨坡䴧􅀈鹿糜忙悲切説文糝也從米麻聲黃帝初教作丨徐曰丨即粥也孟丨爛其民賈至言萬鈞所壓無不丨滅陳子昻疏軀灰骨丨后山吹黍作丨甘勝蜜粳糜飫於肥甘慕彼丨丨韓送窮食糜髙陽氏子好衣弊丨丨晦日巷死世於是日將破衣作糜棄於巷今送窮之義詳窮肉糜晉惠帝時民飢帝曰何不食丨丨隃糜漢尚書令僕丞郎日給丨丨墨大小二枚丨丨給上方坡飯成糜陳太丘有客使元方季方炊二子聽客議論忘著箄丨落釡皆丨丨太丘曰如此但糜自可何必飯也世説沙作糜炊丨丨丨終不飽詳沙􅭷乘輿金飾馬耳􅓱穄北醿酴丨酒名唐宰相寒食宴用酴丨酒草木酴醿花名一頴三葉曽端伯十友丨丨韻友谷亦作茶䕷遲賈島詩莫教葉落西風後荆棘滿庭君始知山詩日色漸風力細倚闌偷舞白霓裳又露濕何郎試湯餅日烘荀令炷爐香又名姓因壺酒縻説文牛轡也又繫也亦作靡易好爵與爾靡之漢文紀為酒醪以靡榖者多注散也羈縻丨丨不絶丐奴贊綆縻淚如丨丨選纓糜請受丨丨選胥縻傳説丨丨莊刑徒之人以鐵鎖相連繫歲縻丨丨廩粟韓劘分也墮許規切説文本作隓敗城阜曰隓從􅎧􅀢聲徐曰從二左衆力左之今經傳作墮亦作隳壞也書益稷萬事丨哉左孔子為司冦丨三都昭公又丨郈丨費過秦論七廟丨睢仰目莊盱盱丨丨坡嚴徐不敢連􅥑丨觿説文佩角鋭專可解結記小丨注以象骨為之又詩童子佩丨户圭切鐫説文瓽也一曰鼎也又曰大鍾又禮視祲掌十輝之法一曰祲二曰象三曰丨垂是為切説文本邊垂字又幾也將及也又自上縋下也易丨衣裳禮運丨日星鄧禹傳丨功名於竹帛馮異傳丨翅回溪活套釣丨簾丨淚丨雲雨丨杜斗杓丨谷人名丨舜臣陲逺邊也説文本作巠從土􅑰聲又危也漢文紀休兵北丨谷永曰三丨晏然桞荷鍾西巖丨坡北行間看古黃丨谷君居天南丨倕重也又黃帝時巧人韓雕鐫妙工丨坡意思巧妙般與丨羸力為切説文瘦也從羊嬴省聲徐曰六畜中駿馬多瘦牛亦瘦狗亦細形雞之瘦亦不至於劣唯羊則丨也千斤大牛負重不若丨牸詳牛又易大壯羝羊觸藩丨其角注大索也又井丨其瓶老羸山東布詔令丨丨癃疾扶杖而往聽之賈山傳疲羸列郡蘇丨丨坡飢羸衆人尚肥華志土多丨丨孟郊吹昌垂切説文噓也從口從欠詩鹿鳴丨笙鼓簧何人斯丨塤丨箎齊物丨萬不冏懲羹丨虀丨毛求疵丨律氣至詳律孤吹栁子詩如髙秋獨眺霽曉丨丨詩評布毛吹道林禪師拈起丨丨吹之侍者大悟詳毛炊㸑也從火吹省聲又族人炊神名前郊祀志師古曰族人炊古炊母之神炊謂饎㸑丨沙作糜詳沙食玉丨桂詳桂數米炊韋莊性慳嗇丨丨而丨詳炭坐甑炊如丨深丨遭蒸丨坡劒頭炊晉桓玄作危語曰矛頭淅米丨丨丨顧愷之傳劒米有危炊針氊無穩坐坡詩十八卷黍一炊蓋世功名丨丨丨谷扊扅炊詳撤屋炊梁阮孝緒童妾竊鄰人樵續㸑孝緒不食更令丨丨而丨臼中炊夢丨丨丨是無釡也詳臼嫂不炊蘇秦憔悴而歸妻不下機丨丨為丨活套新丨欲斷丨披攀羈切説文旁持曰披從手皮聲一曰開也分也鄧禹傳丨輿地圖員半干傳丨露肝膽宋玉風賦丨襟而當之樂廣傳若丨雲霧而睹青天陸士衡文賦朝華已丨杜公堂宿霧丨王恭丨鶴氅行雪中吳隱之丨故絮昌披何桀紂之丨丨兮惟捷徑以窘步騷紛披凱風丨丨選海天風雨看丨丨坡離披驚風正丨丨不停披手丨丨丨於百家之編活套一蓑丨復心丨人名寺人丨晉人詳袂鈹大針又刃戈或作鉟前功臣表長丨擊項籍㱟割肉旇旗靡翍張羽耚耕也陂彼為切禹貢九澤既丨杜為愛西丨好月陂唐教坊前有丨丨形如偃月教坊記鄭陂太守丨渾興丨開田號丨丨三國葛陂費長房投杖化龍處詳杖憲陂郭林宗謂黃丨汪汪若干頃丨澄之不清撓之不濁渼陂杜甫丨丨行末云少壯幾時奈老何向來哀樂何其多杜鴻隙陂汝南有丨丨大丨翟方進奏罷之苦旱謡曰反乎覆陂當復誰云者兩黃鵠本羆似熊有黃丨赤丨詩吉夢維何維熊維丨非羆文王畋于渭濱卜曰非熊丨丨孤羆深叢見丨丨韓虎畏羆貙畏虎丨丨丨羆披髮人立絶有力犬逐羆晉人以五丨丨一丨丨􅋧而力長於用大犬弱而健巧於用小陳無巳羆説人名王丨韓執等襲華州丨大呼詬曰老丨當道卧貛子那敢過敵驚退北史藣筍簴節碑豐碑公室視丨丨三家視桓楹記斫大木形如石碑於槨四角樹之穿中為鹿盧下棺以繂天子六繂四碑諸侯四繂二碑士二繂無碑雞碑學慚鼠獄智乏丨丨芝田録丨丨是平蔡事詳酉棠棣碑賈敦頥為洛州司馬弟敦實為長史人立碑號丨丨丨水中碑杜預好為後世名刻碑一立峴山一沈丨丨曰安知後不為陵谷乎黨人碑宋宣政殿立元祐丨丨丨一夕雷擊碎墮淚碑晉羊祜守襄陽卒百姓為建碑望者莫不流涕名丨丨丨本記惡碑盧奐纍任大郡凡治惡以所犯刻石再犯必致之死籍時謂丨丨丨謝作碑裴度修福先寺將立碑求文於白居易判官皇甫湜怒曰近捨湜而逺取居易請從此辭度謝之湜飲酒揮毫立就裴酬以車馬器玩約千緡湜怒曰碑三千字每字三匹絹更減不得裴笑依數酬之唐闕史唐李雍長碑頌受納金帛巨萬杜詩云干謁滿其門碑板照四裔豐屋珊瑚鈎麒麟織成罽紫驑隨劒几義取無虛歲悔作碑姚崇病戒諸子曰